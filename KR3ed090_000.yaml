body:
  text: 退思集類方歌注傷寒金匱方後漢張仲景著傷寒金匱兩書為後世醫方之祖其方治病雖千頭萬緒而條理不紊方中之藥少者僅一二味而又無所不包括多者至二三十味而又無一味不緊切所以謂之方祖此卷所輯皆其方也間附後世數方使人從流溯源知夫熔古化新之妙學者能於此卷諸方精思而熟讀之應變無窮矣麻黃湯類麻黃湯治太陽病風寒在表頭項強痛身疼腰痛骨節疼痛發熱惡寒惡風無汗胸滿而喘其脈浮緊或浮數者宜此發汗若脈浮弱汗自出或尺脈微遲者俱不可服若風寒濕三氣成痹及冷風哮嗽最效也麻黃三兩去節桂枝二兩去皮杏仁七十個去皮尖甘草一兩炙以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合復取微似汗不須啜粥麻黃加朮湯治濕家身煩疼麻黃湯原方加白朮四兩麻黃髮汗之峻劑監以桂草斯無弊麻黃開竅發汗性最猛烈故以桂枝監之不使其大汗亡陽甘草和之不使其劫陰脫營如馭馬防其放逸耳麻黃入肺杏入心發汗必通營與衛麻黃輕清入肺杏仁重濁入心仲景治太陽初病必從心營肺衛立方也先煮麻黃取力專麻黃先煮取其力專不僅為去上沫已也不須啜粥恐留滯不須啜粥恐留戀麻黃之性也減去大棗與生薑恐礙杏麻升降制仲景發汗方中每加薑棗此不用者以生薑橫散解肌礙麻黃之上升大棗緩中膩膈礙杏仁之下降故耳其精切又如此要知麻桂性辛溫仲景原為風寒制無論傷寒與中風衛實麻黃表虛桂麻黃湯治衛實桂枝湯治表虛在有汗無汗上分不在風寒上分也後人妄用治溫暑無怪下咽人即斃麻黃桂枝二方原為冬月即病之正傷寒而設後人誤以之治溫暑無怪乎下咽即斃也傷寒初病在太陽頭項強痛此經系頭項強痛為太陽經的證發熱惡寒無汗喘脈浮而緊麻黃諦以上為麻黃湯的證要訣麻黃治無汗杏仁治喘桂枝治惡寒甘草和諸藥無一味不緊切故謂經方寸關浮弱表虛尺遲微裡虛誤汗亡陽禍不細若浮弱微遲之脈誤用麻黃必召亡陽之禍三氣成痹用亦靈風寒濕三氣成痹非麻桂溫通關節宣發寒邪不效虛者同補氣血藥服冷風哮嗽還堪濟冷風哮證由風寒客於背俞屢止屢作用此散寒利肺最效病哮喘雖服麻黃而不作汗也金匱麻黃加朮湯濕家身體煩疼詣濕外盛者陽必內郁故煩疼也寒濕在表汗之宜麻術相須功益濟麻黃得術自不至於過汗術得麻黃並可以行表裡之濕此治寒濕在表之正法也發散方中白朮加海藏神術湯從此例發散方中加白朮潔古謂之開鬼門王海藏仿此意而制神朮散以代麻桂自云神妙安道辨論頗精明王安道著醫經溯洄集辨傷寒溫熱甚悉活人加減休拘泥朱肱類證活人書載夏至後用麻黃湯須加知母石膏黃芩後學多宗其説亦見之不明可見暑濕何可更用麻黃此乃傷寒第一方讀書勿被書瞞蔽旭高按麻黃湯或謂專治傷寒或謂通治雜病只緣未識正旨也若知明為寒傷營之主劑非惟溫暑不取用即邪淺在衛亦何至於誤用而凡寒邪在營者何不以通用也麻黃杏仁甘草石膏湯治太陽溫病無汗而喘大熱大渴麻黃四兩去節杏仁五十個去皮尖甘草二兩炙石膏半斤打碎綿裹以水七升先煮麻黃減二升去上沫納諸藥煮取二升去滓溫服一升麻黃杏仁薏苡甘草湯治風濕一身盡疼發熱日晡所劇者麻黃半兩去節杏仁十個去皮尖薏苡仁半兩甘草一兩炙銼麻豆大每服四錢匕水一盞半煎八分去滓溫服有微汗宜避風此方分兩甚輕疑類唐人校訂金匱加減仲景之方非原方也不然漢時四錢匕以今稱計之只得八九分而欲以治發熱身疼之證有杯水車薪之誚矣麻杏甘草石膏湯泄肺存陰定熱喘麻黃湯治寒喘也此去桂枝而重用石膏治熱喘也無汗汗出休拘泥按傷寒論原文本作汗出而喘無大熱者柯韻伯傷寒來蘇集改作無汗而喘大熱者頗屬理正辭明蓋汗出何可更用麻黃無大熱何可更用石膏其説良是然以余閲歷喘病肺氣內閉者往往反自汗出外無大熱非無熱也熱在裡也必有煩渴舌紅見證用麻黃是開達肺氣不是發汗之謂重用石膏急清肺熱以存陰熱清喘定汗即不出而陽亦不亡矣且病喘者雖服麻黃而不作汗古有明訓則麻黃乃治喘之要藥寒則佐桂枝以溫之熱則加石膏以清之正不必執有汗無汗也暴病多從實證看此要訣也不獨喘病百病皆然雖未明言治溫病此湯清散頗相安太陽病發熱而渴不惡寒者為溫病仲景雖未出方治而此湯清散正是治溫之法也除去石膏加薏苡名麻黃杏仁薏苡甘草湯發熱身疼風濕搏此與麻黃加朮法大同小異別風寒麻黃加朮湯治寒濕麻黃杏仁薏苡甘草湯治風濕越脾湯治風水惡風一身悉腫面目腫大有熱色發熱無汗脈洪浮而渴續自汗出無大熱者麻黃六兩去節石膏半斤打甘草炙生薑各二兩大棗十二枚以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服越脾加朮湯治里水一身面目黃腫脈沉小便自利而渴者並治風寒客於脈而不去營氣熱腐而肉極熱則身體津脫腠理開汗大泄癘風氣下焦腳弱越脾湯原方加白朮四兩越脾加半夏湯治肺脹咳喘脈浮大者越脾湯原方棗加三枚薑加一兩加半夏半升越脾湯越脾中氣發汗生津涼散委越脾者發越脾中之津氣而為汗是涼散法也麻石甘草棗生薑金匱以之治風水惡風身腫脈洪浮面赤熱渴乃堪使旭高按金匱此條頗有舛錯今方下主治是旭高從水氣門校正刪改者肺主皮膚脾胃主肌肉是風水者乃肺脾胃三經受風熱之陽邪痹其營衛之氣升降不得自如斯水飲入胃不能輸脾歸肺下達膀胱而反外溢肌膚故一身悉腫其證惡風發熱脈洪浮而渴故知為風熱亦嘗驗之矣然必兼有無汗而喘見象與此湯一服亦未必汗出其水反從小便去真匪夷所思者里水黃腫其脈沉便利亡津加朮餌名越脾加朮湯旭高按水在裡當不渴渴則可徵水去今渴而黃腫不去是水未去也水未去何以渴小便自利亡津液故也蓋脾氣實者小便利則水去脾氣虛者小便利則亡津亡津令渴病雖始於里水其實里已無水水只在皮膚中故亦用越脾使從表解但加白朮一味補脾氣生津液以固其里則意無不到矣營氣熱腐為癘風俗號大麻瘋即是清疏營衛最相宜加朮緣其腳弱爾按癘風因風客久而化熱營氣被其煽灼血肉腐壞故使鼻柱壞而色敗皮膚瘍潰即俗所謂大麻瘋是也喻嘉言有見及此故曰汗宜頻發血宜頻刺但未有其方旭高觀此湯清疏營衛與嘉言之説合符石膏清熱生津液麻黃疏風通血脈甘草解熱毒薑棗和營衛若不腳弱則白朮亦可不加後人遇此證絶不知用此湯何也溫邪挾飲填肺中為脹為喘加半治散邪清熱越脾佳蠲飲消痰半薑美名越脾加半夏湯肺脹咳喘為外邪內飲相搏之證越脾湯散邪清熱之功多蠲飲消痰之力少故加半夏輔其未逮更加薑一兩以助半夏之功周密之至矣此與青龍加石膏佐使寒溫相對峙此與小青龍加石膏湯相為對峙小青龍湯中有半夏無石膏越脾湯中有石膏無半夏觀二方所加之意全重在石膏半夏二物協力建功石膏清熱借辛溫亦能豁痰半夏豁痰借辛涼亦能清熱前越脾加朮湯生津止渴借白朮入清熱藥中此越脾加半夏湯下氣定喘又借半夏入清熱藥中仲景加減成方無非化裁後學矣又與越脾加朮湯下氣生津分彼此千古醫方仰仲師一加一減皆精義大青龍湯治太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁無少陰證者若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也麻黃六兩去節桂枝去皮甘草各二兩炙杏仁四十枚去皮尖生薑三兩切大棗十二枚石膏雞子大一塊打以水九升先煮麻黃減二升去沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也大青龍湯桂麻黃杏草石膏薑棗藏發熱惡寒太陽病無汗煩躁力能攘發熱惡寒無汗煩躁八字是大青龍著眼一服汗出停後服汗多溫粉撲之良仲景溫粉方失成無己傷寒明理論用白芷藁本白朮川芎米粉撲之寒之淺者僅傷衛風而甚者營亦傷中風衛實因煩躁清火發汗此方強按風傷衛寒傷營中風脈浮緩傷寒脈浮緊是大法也此大青龍脈證俱屬傷寒而去中風者全在煩躁上看出若寒邪則但嘔逆惟風為陽邪乃煩躁耳然既屬中風而得傷寒之脈證又何也蓋風寒中傷各有淺深又各隨其人之體氣虛實而為病是以寒之淺者僅傷於衛風而甚者並及於營衛之實者風亦難泄衛而虛者寒猶不固正是互文見意處此湯治中風衛實之法乃清火發汗之重劑也證較麻黃為尤重預保陽明聖法彰柯韻伯傷寒來蘇集曰此麻黃證之劇者故於麻黃湯倍麻黃以發汗加石膏以除煩諸證全是麻黃而有喘與煩躁之別喘是寒鬱其氣升降不得自如故多用杏仁之苦以降氣煩躁是熱傷其氣無津不能作汗故特加石膏之甘以生津用石膏以清胃火是仲景於太陽經中預保陽明之先著加薑棗以培中氣又慮夫轉屬太陰一汗而表裡雙解風熱兩除此大青龍清內攘外之功所以佐麻桂二方之不及也少陰煩躁脈微弱惡風汗出不相當少陰亦有煩躁證以脈微弱汗出惡風為辨不可服此仲景立此方即垂此戒叮嚀之意深矣熱因寒用方堪救誤服青龍陽必亡少陰煩躁當熱因寒用如四逆湯加豬膽之例方可救其萬一若誤服青龍必召亡陽之禍慎之小青龍湯治傷寒表不解心下有水氣咳而微喘乾嘔發熱不渴或渴或利或小便不利少腹滿者並治溢飲身體重痛肌膚悉腫麻黃去節芍藥細辛乾薑甘草桂枝各三兩半夏五味子各半升水一斗先煮麻黃減二升去沫納諸藥煮取三升去滓溫服一升此方有加減法另詳余所著古方餘論中小青龍加石膏湯治肺脹咳而上氣煩躁而喘脈浮者心下有水氣也小青龍湯原方加石膏二兩煮法同強人服一升虛人減之小青龍湯治水氣喘咳不渴嘔利慰凡水停心下之證多喘咳而不渴此要訣也其餘下利與小便不利或然或不然也薑桂麻黃芍藥甘細辛半夏兼五味備舉辛溫散水寒兼用酸苦以安肺此方專治水氣蓋汗為水類肺為水源邪汗未盡必停於肺胃之間病屬有形非一味發散所能除故備舉辛溫以散水兼用酸苦以安肺於麻桂二湯內不但留白芍之酸收拘其發散之猛再復五味乾薑攝太陽之氣監製其逆細辛半夏溫散水寒從陰出陽庶幾水從汗解而不傷陰此發汗散水之聖方也溢飲水腫服之奇發汗散水此所謂溢飲者水腫也水飲外溢於肌膚旁流於四肢故一身悉腫然亦必有喘咳見證用此發汗散水其效乃奇肺脹煩躁加石膏寒溫並進斯為貴肺脹咳喘多因水飲而煩躁則挾熱邪故於小青龍湯加石膏寒溫並進水熱俱蠲於法尤為密矣甘草麻黃湯治里水脈沉面目黃腫小便不利甘草二兩炙麻黃四兩水五升先煮麻黃去上沫納甘草煮取三升溫服一升慎風寒麻黃附子湯治里水脈沉小者屬少陰也麻黃三兩去節甘草二兩炙附子一枚炮水七升先煮麻黃一二沸去上沫納諸藥煮取三升去滓溫服一升日三服甘草麻黃湯治里水水從汗解斯方美金匱要略水氣病篇云水病發其汗即已脈沉小者屬少陰溫固必須加附子名麻黃附子湯麻得甘草緩中焦汗不傷陰厥有旨王晉三古方選注曰甘草緩麻黃於中焦取水穀之津為汗則內不傷陰邪從表散深得厥旨水之為病殊多端表裡陰陽非一致腰以上腫當發汗腰以下腫當分利單單腹脹最難醫青筋突起無生理旭高按前一方用甘草內助土氣後一方用熟附溫固腎液而外散水氣則皆君以麻黃蓋麻黃氣味輕清無微不入故能透出肌膚毛孔之外又能深入積痰凝血之中凡藥力所不到之處惟此能達之故不特在表之風水可用而在裡在腎之水咸可用之也金匱要略水氣病篇云水病發其汗即已而發汗之法又各有淺深不同如此可謂簡而該矣然又云諸有水者腰以下腫當利小便腰以上腫當發汗乃愈可見水病利小便一法原不可缺但以腰上半為陽及一身悉腫者為表當發汗耳若單腹脹青筋突起為土敗木賊之候難治麻黃附子細辛湯治少陰病始得之無汗惡寒頭不痛但欲寐反發熱脈沉者麻黃去節細辛各二兩附子一枚炮以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升日三服麻黃附子細辛湯發表溫經兩法彰無汗惡寒與太陽同頭不痛脈沉欲寐俱少陰證少陰殃若無發熱當溫補用附子湯反熱邪猶連太陽故用麻辛兼發表溫經熟附恐亡陽少陰主裡應無表證今始受風寒即便發熱則邪猶連太陽未盡入陰猶可引之外達故用細辛引麻黃入於少陰以提始入之邪仍從太陽而解然恐腎中真陽隨汗外亡必用熟附溫經固腎庶無過汗亡陽之慮此少陰表病無里證者發汗之法也麻黃連翹赤小豆湯治傷寒瘀熱在裡但頭汗出小便不利身發黃者麻黃去節連翹各二兩赤小豆生梓白皮各一升杏仁四十枚甘草生薑各二兩大棗十二枚以潦水一斗先煮麻黃再沸去沫納諸藥煮取三升去滓分溫三服降注雨水謂之潦水取其味薄不助濕熱也麻黃連翹赤小豆湯杏仁甘草梓皮湊煮以潦水加薑棗瘀熱身黃功克奏泄濕從陰出太陽此表裡分解法或太陽之熱或陽明之熱內合太陰之濕乃成瘀熱發黃病雖從外之內而黏著之邪當從陰以出陽也杏仁赤小豆泄肉裡濕熱生薑梓白皮泄肌表濕熱仍以甘草大棗奠安太陰之氣麻黃使濕熱從汗而出太陽連翹導濕熱從小便而出太陽潦水助藥力從陰出陽經云濕上甚為熱若濕下行則熱解熱解則黃退也黃從汗解無留垢緣其有表此方施若無表證茵陳究本方使黃從汗解茵陳蒿湯使黃從下解乃有表無表之分也麻黃升麻湯治傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治也麻黃二兩半升麻當歸各一兩一分知母黃芩葳蕤各十八銖白朮石膏乾薑芍藥天冬桂枝茯苓甘草各六銖水一斗先煮麻黃去沫納諸藥煮取三升分溫三服麻黃升麻湯桂枝芍草苓冬薑朮知玉竹黃芩歸與石辛溫寒潤互兼施厥陰錯雜邪難解陰中升陽用此宜此方升散寒潤收緩滲泄具備推其所重在陰中升陽故麻黃升麻名湯也膏芩知母苦辛清降上焦之津芍藥天冬酸苦收引下焦之液苓草甘淡歸術甘溫玉竹甘寒緩脾胃以致津液獨是十味之藥雖有生津泄熱之功不能提出陰分熱邪故以麻桂升薑開入陰分與寒涼藥從化其熱庶幾在上之燥氣除在下之陰氣堅而厥陰錯雜之邪可解吐血咽疼肢厥逆泄利不止頗難醫此乃傷寒之壞病下寒上熱涉危疑此乃傷寒之壞病寒熱互見上下兩傷故藥亦照證施治病證之雜藥味之雜古方所僅見觀此可悟古人用藥又有此一格厚朴麻黃湯治咳而脈浮者厚朴五兩麻黃四兩去節石膏雞子大一塊杏仁去皮尖半夏五味子各半升細辛乾薑各二兩小麥一升水一斗二升先煮小麥熟去滓納諸藥煮取三升溫服一升日三服厚朴麻黃湯石膏細辛杏半味薑邀還加小麥宜先煮下氣祛邪止咳標小麥甘平緩心氣用醫心咳法殊超咳而心痛為心咳仿此臨時加減調金匱此方不詳見證而但云脈浮浮為邪氣居表固宜驅之外散然觀其藥品泄熱下氣散邪固本之功皆備或者為外邪鼓動下焦之水氣故方即從大小青龍變法歟余嘗以此湯加減治心咳頗有效並附及之附心咳湯旭高新制治心咳咳則心痛喉中介介如梗狀甚則咽腫喉痹北沙參三錢石膏三錢同薄荷頭研牛蒡子錢半杏仁三錢去皮尖桔梗五分甘草五分麥冬三錢去心半夏一錢茯神三錢遠志五分小麥五錢水三盞先煮小麥減一盞納諸藥煎至一盞服痰多加川貝母咽喉腫痛去半夏汗多加五味子心咳湯用北沙參牛蒡甘桔石杏仁茯神遠志麥冬夏小麥煎醫心咳珍按五臟六腑皆令人咳究不離乎肺經此心咳一證雖屬心火上逆以余驗之其始多由外感夫外感溫邪必先肺衛而及心營觀經文咳則心痛句義可推矣逮至咳嗆不已震動心胞之火勢必上逆而為咽腫喉痹前人謂生脈散加茯神遠志能治心咳遵用不甚見效余因參入開泄肺經之藥重用小麥煎湯代水治之乃驗蓋小麥甘平為心之谷緩心寧氣大有殊功即從厚朴麻黃湯意化出故附於此以就正於當世射干麻黃湯治咳而上氣喉中如水雞聲者射干細辛紫菀款冬花各三兩半夏五味子各半升麻黃生薑各四兩大棗七枚水一斗二升先煮麻黃兩沸去沫納諸藥煮取三升分溫三服射干麻黃湯細辛紫菀款冬味夏朋薑棗同煎療肺冷咳而上氣水雞聲酸收苦泄兼辛散肺氣宣通痰自平此治形寒飲冷傷肺之要方也喉中水雞聲者痰氣出入而嗘咯也由肺中冷陽氣不能宣其液鬱於肺而生聲乃復用本經主治咳逆上氣之品大泄陰液宣通肺氣射干紫菀以苦泄之也麻辛款夏生薑以辛瀉之也五味子酸以收其正氣大棗甘以緩其下行則射干細辛五味之性從麻黃外達肺經內通肺臟泄肺之苦遂肺之欲補肺之正溫肺之陽俾氣道平而肺得陽和之致自無嗘咯之聲矣古今録驗續命湯治中風痱身體不能自收持口不能言冒昧不知痛處或拘急不得轉側並治咳逆上氣但伏不得臥面目浮腫者麻黃桂枝石膏甘草乾薑人參當歸各三兩川芎一兩五錢杏仁四十枚以水一斗煮取四升溫服一升當小汗薄復脊憑几坐坐則升發陽氣足以敵邪外散汗出則愈不汗更服無所禁勿當風此亦唐人校訂金匱附方非仲景方也然其方頗合仲景之旨故選之録驗續命湯麻桂薑芎歸杏草石參勷中風拘急風邪入絡成風痱痱廢而不用也今古相傳此法良方名續命者有卻病延年之功也風入絡中痰火壅驅風自必佐清涼兼調氣血扶其正絡痹通而拘急康風入經絡則內風與外風相煽以致痰火一時壅塞惟宜先驅其風繼清痰火而後調其氣血則經脈可以漸通此方即從大青龍加減借川芎佐桂枝以治風痹乾薑佐麻黃治寒痹杏仁佐石膏治熱痹更用人參補氣當歸活血甘草和諸藥蓋邪風中人身痱必由表虛絡脈弛縱必由裡熱故氣宜固血宜活風寒宜散絡脈宜涼自當內外施治以辟邪風非處方之冗雜也證既屬風風藥主因人加減法當商誤投溫補將邪斂輕則偏枯重必亡凡古人定病之名必指其實既曰中風則其病屬風可知既為風病則主病之方必以治風為本其中或有陰虛陽虛感熱感寒之別則於治風方中隨所現之證加減之即使正氣內虛亦宜於驅風藥中少加扶正之品以助驅邪之力從未有純用溫補者今人一遇此證即用參地桂附等溫補將風火痰涎盡行補住輕者變重重者必死或有元氣未傷而感邪淺者亦必遷延時日以成偏枯永廢之人此非溫補誤之耶續命湯中風之祖劑若無絶證用皆臧口開眼合兩手撒直視搖頭面赤妝遺溺汗淋俱絶證陰陽離決命難長續命為中風之祖方苟非中臟之絶證皆可治之惟口開眼合手撒鼻鼾遺尿吐沫直視搖頭面赤如妝汗出如珠此為絶證則難挽救耳附小續命湯孫思邈千金要方治中風喎斜不遂語言謇澀及剛柔二痙厥陰風泄此六經中風之通劑防風一兩半生薑五兩桂心麻黃杏仁川芎白芍人參甘草黃芩防己各一兩附子一枚水一斗二升先煮麻黃三沸去沫納諸藥煮取三升分三服筋急語遲脈弦倍人參加薏苡當歸去白芍煩躁不大便去桂附倍芍藥加竹瀝身痛發搐加羌活日久不大便胸中不快加大黃枳殼口渴加麥冬花粉臟寒下利去防己黃芩倍附子加白朮汗多去麻黃加朮嘔逆加半夏語言謇澀手足戰掉加菖蒲竹瀝煩渴多驚加犀角羚羊角舌燥去桂附加石膏小續命湯桂附芎麻黃參芍杏防風黃芩防己兼甘草六經風中此方通麻黃杏仁麻黃湯也治寒桂枝芍藥桂枝湯也治風參草補氣芎芍養血生薑散寒防風治風淫防己治濕淫附子治寒淫黃芩治熱淫故為治中風之通劑劉宗厚玉機微義曰此方無分經絡不辨寒熱虛實雖多亦奚以為汪訒庵醫方集解曰此方今人罕用然古今風方多從此方損益為治旭高按此方即從古今録驗續命湯加減蓋病來雜擾故藥亦兼該也附定喘湯張時徹攝生衆妙方治肺虛感寒氣逆膈熱而作哮喘麻黃半夏款冬花桑白皮各三錢蜜炙蘇子二錢杏仁黃芩各一錢五分甘草一錢白果二十一枚炒黃加薑煎定喘湯白果與麻黃款冬半夏白皮桑蘇杏黃芩兼甘草肺寒膈熱喘哮嘗此定喘之主方也凡病哮喘多由寒束於表陽氣並於膈中不得泄越故膈間必有痰熱膠固斯氣逆聲粗而喘作矣治之之法表寒宜散膈熱宜清氣宜降痰宜消肺宜潤此方最為合度白果收澀二十一枚恐太多宜減之附九味羌活湯張元素方治傷寒傷風憎寒壯熱無汗頭項腰脊強痛嘔吐口渴及感冒四時不正之氣溫病熱病此解表之通劑羌活防風蒼朮各錢半細辛五分川芎白芷生地黃芩甘草各一錢加生薑蔥白煎自汗去蒼朮加白朮胸滿去生地加枳殼桔梗喘加杏仁夏月加石膏知母汗下兼行加大黃藥備六經治通四時用者當隨證加減不可執一九味羌活湯張元素辛防蒼芷蔥薑互羌活入足太陽理遊風細辛入足少陰散伏寒蒼朮入足太陰去濕白芷入足陽明散風防風蔥薑通發周身之汗益以芩草監辛溫諸藥氣味辛溫恐其僭亢故用黃芩苦寒以監製之甘草以調和之地芎入血調營故生地川芎引諸藥入血祛邪即藉以調營徐靈胎嫌生地寒滯易以當歸甚是宜遵之三陽解表通用靈四時感冒兼能顧此方原以代麻黃氣弱陰虛人禁哺汪訒庵醫方集解引張元素曰有汗不得用麻黃無汗不得用桂枝若差服則其變不可言故立此方使不犯三陽禁忌為解表效方冬可治寒夏可治熱春可治溫秋可治濕是諸路之應兵代麻黃等湯誠為穩當但陰虛氣弱之人在所禁耳附大羌活湯張元素方治兩感傷寒羌活獨活防風細辛防己黃芩黃連蒼朮白朮甘草各三錢知母川芎生地各一兩每服五錢水煎熱飲大羌活湯即九味己獨知連白朮暨即九味羌活湯去白芷加上藥散熱培陰表裡和羌獨蒼防細辛發表散邪芩連防己知母芎地清裡培陰白朮甘草以固中州而和表裡傷寒兩感差堪慰兩感傷寒者一日太陽與少陰俱病則頭痛口乾而煩滿二日陽明與太陰俱病則腹滿身熱不欲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死蓋以表裡陰陽俱病故必死也吳鶴皋醫方考曰易老意謂證雖有表裡之殊而無陰陽之異傳經者皆為陽邪一於升陽散熱滋陰養臟則感之淺者尚或可平也按錢禎曰兩感者本表裡之同病似若皆以外感為言而實有未必盡然者正以內外俱傷便是兩感今見有少陰先潰於內而太陽繼之於外者即縱情肆欲之兩感也太陰受傷於裡而陽明重感於表者即勞倦竭力飲食不調之兩感也厥陰氣逆於臟而少陽復病於腑者即七情不慎疲筋敗血之兩感也此言最切此病誠發前人所未發或謂兩感不多見者蓋亦見之不明耳其治法亦在乎知其由而救其本也附神朮散王好古陰證略例治外感寒邪內傷生冷發熱而無汗者此代麻黃湯並治脾泄腸風蒼朮二兩制防風二兩甘草一兩炙生薑蔥白水煎服如前證有汗者去蒼朮蔥白加白朮二兩名白朮湯代桂枝湯按二術主治略同特有止汗發汗之異耳附神朮散太平惠民和劑局方治傷風頭痛無汗鼻塞及風寒咳嗽時行泄瀉蒼朮五兩川芎白芷羌活藁本細辛炙草各一兩每服四錢加蔥薑煎又有太無神朮散叔微神朮散俱編入平胃散類鎮按今缺平胃散類海藏神術散蒼草防蔥薑發汗代麻黃除卻蒼蔥加白朮太陽有汗此為良喻嘉言醫門法律曰此王海藏得意之方蓋不欲無識者輕以麻黃桂枝之熱傷人也汪訒庵醫方集解曰按神術白朮二湯乃海藏所制以代桂枝麻黃二湯也然此是太陰之劑可以理脾胃之風濕而不可治太陽之風寒素問陰陽應象大論所謂春傷於風夏生飧泄者宜之若所謂冬傷於寒春必病溫者則非所宜也今人恐麻桂峻猛得此平和之劑恃為穩當不知營衛不和非調和脾胃者所可代胃家之實者非補虛之品所能投肝膽之相火往來少陰之水火相射者不得以燥劑該攝也用方者審諸局方神術散蒼羌芷芎辛藁草與蔥薑各走一經祛風濕太陰蒼朮少陰細辛厥陰少陽川芎太陽羌活藁本陽明白芷各走一經祛風發汗而勝濕加薑蔥者助其散用甘草者緩其中也風寒泄瀉總堪嘗風藥升清故兼能治泄瀉附神白散衛生家寶治一切風寒初起皆可服白芷一兩甘草五錢淡豉五十粒薑三片蔥白三寸水煎附蔥豉湯葛洪肘後備急方治傷寒初覺頭疼身熱脈洪便當服此蔥白一握豉一升水煎服神白散芷甘薑蔥豉一切風寒皆可施肘後單煎蔥白豉名蔥豉湯用代麻黃功不慚蔥通陽發汗豉升散發汗邪初在表宜先服此以解散之可代麻黃之用衛生家寶加入白芷甘草生薑其功尤捷勿以平淡忽之附麻黃人參芍藥湯李東垣脾胃論治虛人傷寒麻黃白芍黃耆炙甘草各一錢人參麥冬各三分當歸桂枝各五分五味子二粒水煎服麻黃人參芍藥湯桂枝五味麥冬襄歸耆甘草汗兼補虛人外感服之康東垣治一貧士內蘊虛熱外感大寒而吐血法仲景麻黃湯加補劑制此方一服而愈原解曰麻黃散外寒桂枝補表虛黃耆實表益衛人參益氣固里麥冬五味保肺氣甘草補脾芍藥安太陰當歸和血後人用治虛人感冒頗效若吐血衄血麻桂究在所忌勿因東垣之偶效而遂信之以誤施也附再造散陶節庵傷寒六書治陽虛傷寒不能作汗人參黃耆甘草桂枝各一錢附子炮五分羌活防風川芎各八分細辛五分煨薑五片棗二枚加炒白芍一撮夏加黃芩石膏冬月不必加再造散用參耆甘桂附薑防芎芍參細辛加棗煨薑煮陽虛無汗法當諳陶節庵傷寒六書曰頭痛發熱惡寒無汗用發汗藥二三劑汗不出者庸醫不識此證不論時令遂以麻黃重劑劫取其汗誤人死者多矣殊不知陽虛不能作汗故有此證名無陽證因立此湯以參耆甘薑桂附大補其陽氣佐芎羌防辛散寒發表加芍藥者陽中斂陰散中有收也又云人第知參耆能止汗而不知其能發汗以在表藥隊中則助表藥而解散也此是節庵明見處附麻桂飲張介賓新方八陳治傷寒陰暑邪不能散此麻桂二湯之變方也官桂一二錢麻黃二三錢當歸三四錢甘草一錢陳皮隨宜用或不用亦可生薑五七片或十片水一鍾半煎八分去浮沫不拘時服若元氣大虛陰邪難解者當以大溫中飲更迭為用附大溫中飲張介賓新方八陳治陽虛傷寒並一切四時勞倦寒疫之證身雖發熱時猶畏寒即在夏月亦欲衣被覆蓋或喜熱湯或兼嘔泄但六脈無力者此為元陽大虛正不勝邪之候所謂溫中自可散寒即此方也熟地三五七錢人參二五七錢甚者一兩或不用亦可肉桂一二錢白朮三五錢當歸三五錢如泄瀉者不宜用或以山藥代之柴胡二三四錢麻黃一二三錢炙草一錢乾薑炒熟一二錢或用煨生薑三五七片亦可水二鍾煎七分去浮沫溫服或略蓋取微汗如氣虛甚加黃耆二三錢如寒甚陽虛者加附子一二錢按方中柴胡熟地與溫中之義不符嘔惡泄瀉者非所宜也必與附子同用庶乎不寒不滯麻桂飲中歸草陳加薑煎服汗津津但取津津微汗透出為度傷寒陰暑邪難散用此醫之效甚佳旭高按此亦麻桂二湯之變方較海藏神朮散尤為得旨當歸陳皮入發汗藥中是調血而理氣蓋汗由血化亦必氣機通達而後能透出凡患傷寒體氣稍虛者當引用之大溫中飲再加朮人參熟地柴胡倫大溫中飲即麻桂飲加參柴地術脈細畏寒陰氣勝陽虛溫托始回春凡陽虛陰勝非用溫中托邪則寒凝日深必致不救桂枝湯類桂枝湯治中風傷寒太陽病頭項強痛發熱惡風惡寒鼻鳴乾嘔脈浮弱汗自出者雜病自汗盜汗虛瘧虛痢皆可治之若脈浮緊而無汗者不可用酒客及亡血家雖病風寒而汗出者亦忌之桂枝去皮芍藥各三兩甘草二兩炙生薑三兩大棗十二枚擘水七升微火煮取三升去滓溫服一升服已須臾啜熱稀粥以助藥力桂枝湯方是解肌傷寒論太陽篇云桂枝本為解肌明非發汗也芍藥甘草薑棗維啜粥漬形充胃氣桂枝本不能發汗故須助以熱粥充胃氣以達於肺肺主皮毛汗所從出是漬形為汗也觀於此可知傷寒不禁食矣調和營衛汗斯滋此方桂芍相須薑棗相得是調和營衛之方營衛和則汗自出故曰解肌中風傷寒太陽病虛瘧調和營衛之功虛痢和陽斂陰之效悉治之大凡發熱脈浮弱惡寒汗出最相宜桂枝一味治太陽發熱惡寒之的藥因脈浮弱汗自出故加白芍斂陰護營生薑佐桂以解表大棗佐芍以和里更用甘草和諸藥凡發熱惡寒脈浮弱汗自出者合此證即用此湯勿拘風寒雜證也若然無汗脈浮緊是麻黃證酒客血家切忌施無汗忌酸斂酒客忌甘血家忌辛熱故皆不可用夏月黃芩加入劑改名陽旦湯宜知夏月用桂枝湯加黃芩名陽旦湯桂枝加桂湯治傷寒燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與此湯桂枝湯原方桂加二兩桂枝加桂湯治奔豚氣從少腹上衝心奔豚病象如此太陽藥桂枝湯乃太陽經藥也治少陰病奔豚病少陰腎邪上逆也病起燒針寒氣侵水邪實由外寒召重散外寒便泄陰用太陽經藥治少陰病者水邪上逆實由燒針外召寒入故仍從表治惟加桂二兩不特禦寒且制腎氣又藥味重則能達下凡奔豚病此方可加減用之桂枝加芍藥湯治太陽病下之後因而腹滿時痛者屬太陰也桂枝湯原方芍藥加三兩桂枝加大黃湯治太陽病下之後腹中大實痛者屬陽明也桂枝加芍藥湯內更加大黃二兩桂枝加芍湯和里此用陰和陽法升舉陽邪出太陰病本太陽醫誤下誤下引邪入於太陰因而腹痛此方斟雖見太陰證而太陽之證尚未罷故仍用桂枝湯但加芍藥三兩監桂枝深入陰分升舉太陽陷入太陰之邪大實痛者陽道實腹滿時痛不過傷太陰之氣大實痛則邪氣結於太陰而轉屬陽明之燥實矣桂枝湯內大黃臨名桂枝加大黃湯此雙解表裡法也大黃入於桂枝湯中欲破脾實而不傷陰也大黃非治太陰之藥脾實腹痛是腸中燥屎不去顯然太陰轉屬陽明故以薑桂入太陰升陽分殺太陰結滯則大黃入脾反有理陰之功俾燥屎去而陽明之內道通則太陰之經氣出注運行而腹痛減不因誤下而禁下見症施治無不盡然凡妄下必傷胃氣胃氣虛則陽邪襲陰故轉屬太陰胃氣實則兩陽相搏故轉屬陽明太陰則滿痛不實陰道虛也陽明則大實而痛陽道實也滿而時痛下痢之兆大實而痛燥屎之徵桂枝加芍藥小試建中之劑桂枝加大黃微示調胃之方桂枝加附子湯治太陽病發汗太過遂漏不止其人惡風小便難四肢拘急難以屈伸者並治寒疝腹痛手足冷身疼不仁桂枝湯原方加附子一枚炮桂枝加附湯急溫經止汗回陽即救津此治外亡陽而內脫液熟附雖能補陽終屬燥液仲景以桂枝湯輕揚力薄必借附子剛烈之性直走內外急急溫經復陽使汗不外泄正以救液也漏汗汗出不止仍復惡風表邪未盡者溲難津液少肢急陽虛液脫而骨屬不利可回春漏不止與大汗出同若無他變證仍與桂枝湯若形如瘧是玄府反閉故加麻黃此玄府不閉故加附子若大汗出後而大煩渴是陽陷於裡急當滋陰故用白虎加人參此漏不止而小便難四肢拘急是陽亡於外急當扶陽故用桂枝加附子仲景辨證之確用藥之精如此桂枝加黃耆湯治黃汗發熱兩脛自冷身體疼重汗出而渴從腰以上有汗腰下無汗汗沾衣色正黃如柏汁腰臗弛痛如有物皮中狀劇者不能食身重而煩躁小便不利宜此主之並治諸病黃家脈浮者桂枝湯原方加黃耆三兩桂枝加耆湯治黃汗因汗色黃故病即名黃汗身熱脛冷心煩亂濕傷於下故脛冷濕上甚為熱故身熱心煩腰臗弛痛腰下無汗之故小便難濕熱交混氣機不化汗出但從腰上半和其營衛以祛邪濕鬱皮中從汗散此方治濕鬱皮中陽氣內郁而又表氣不固故用黃耆固表氣桂枝湯宣陽氣和營衛令黃從汗解也假令諸黃其脈浮此方亦可相參贊浮為在表當從汗解若脈沉者又當利其小便黃汗沾衣色正黃致病之由濕熱斷歷節風水頗相同臨證推求理自判黃汗與歷節相似但歷節一身盡熱黃汗則身熱而脛冷又與風水相似但風水惡風黃汗不惡風為異且歷節風水汗色不黃為可辨也黃耆桂枝五物湯治血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀桂枝湯去甘草加黃耆三兩生薑加三兩耆桂五物湯治血痹黃耆芍藥桂薑棗脈微細緊是陽虛臥出風吹病之旨素問五藏生成篇曰臥出而風吹之血凝於膚者為痹狀若風痹身不仁風痹則走注疼痛血痹則不痛而但不仁為異所謂營氣虛則不仁也因其脈細宜煎此祛風固表和營衛陽氣宣通痹自已旭高按此方以桂枝湯加重生薑佐桂枝領黃耆行陽通痹既以祛風且以固表庶幾血中之風出而血中之陽氣不與之俱去不用甘草者欲諸藥周衛於身不欲留頓於中也然金匱血痹虛勞篇又別出一條云宜針引陽氣令脈和緊去則愈蓋血中之邪始以陽氣傷而得入終必得陽氣通而後出而痹之為證血既以風入而痹於外陽亦以血痹而止於中故必針引陽氣令脈和緊去乃愈以是知血分受痹必以宣通陽氣為首務矣此五物湯和營之滯助衛之行亦針引陽氣之意以脈陰陽俱微故不可針而可藥經所謂陰陽形氣俱不足者勿刺以針而調以甘藥也桂枝加厚朴杏仁湯治太陽病下之後微喘者表未解故也桂枝湯原方加厚朴二兩炙去皮杏仁五十枚去皮尖桂枝加朴杏湯治寒喘麻黃湯治表寒之喘此湯治裡寒之喘下氣消痰溫散攢寒氣留中邪在表此因下後寒氣留中肺氣失降猶幸表邪未解故只微喘仍用桂枝湯解表但加厚朴溫胃散寒杏仁定喘下氣鼻鳴不渴始相安按此方治喘必外有頭痛鼻鳴形寒畏冷口無燥渴等因始可服之桂枝去桂加苓朮湯治太陽病服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿痛小便不利桂枝湯去桂枝加茯苓白朮各三兩此方宜入五苓散類桂枝去桂加苓朮湯約陰利水行陽綴苓芍約陰利水甘棗培土製水薑術行陽化水為利中焦水氣之法汗下亡津水飲停胸滿溺澀病之訣以其無汗去桂枝頭痛發熱桂枝證仍在也而去桂枝者何也以解肌或下邪未能去而津液已傷故反無汗則不宜更用桂枝辛溫燥液以發其汗矣心下滿則加白朮小便不利則加茯苓此乃亡津液而有停飲者也小便通時汗斯徹凡表未解者必當先解其表此因小便不利故專利其小便俾小便利則邪亦從而解矣所謂發汗利小便為治太陽兩大法門以此夫桂枝加芍藥生薑人參新加湯治傷寒發汗後身疼痛脈沉遲者桂枝湯原方芍藥生薑各增一兩加人參三兩桂枝新加人參湯曰新加者申明表邪未解無補中法今因脈沉遲而始加故曰新加更妙在薑芍各加一兩不使人參有實邪之患仍是和營衛法仲景方一絲不亂如此補中益氣以和陽人參補中益氣桂枝和陽解肌身疼表邪未盡脈息沉遲者氣虛已甚體虛過汗始堪嘗邪未盡宜表而氣虛不能勝散藥故用人參凡素體虛而過汗者方可用桂枝加葛根湯治太陽病項背強𠘧𠘧汗出惡風者桂枝湯原方加葛根四兩先煮桂枝湯中加葛根名桂枝加葛根湯太陽邪乍及陽明喻嘉言曰太陽而略兼陽明則以方來之陽明為重故加葛根𠘧𠘧音殊引頸難伸之象汗出惡風者斷入陽明是定評張元素曰桂枝湯加葛根所以斷太陽入陽明之路若太陽初病便服葛根是反引邪氣入陽明也慎之余義詳葛根湯桂枝去芍藥湯治太陽病下之後脈促胸滿者桂枝湯原方去芍藥桂枝去芍藥加附子湯治太陽病下之後脈促胸滿而微惡寒者桂枝湯去芍藥加附子一枚炮桂枝去芍湯和陽誤下中焦陽氣傷芍藥專益陰氣桂枝湯去芍藥者誤下陽虛濁陰必僭於中焦故去芍藥之酸寒存一片陽和甘緩之性得以載還中焦陽氣成清化之功胸滿脈促邪猶在中虛而表邪仍在故仍用桂枝微惡寒加附子良名桂枝去芍藥加附子湯微惡寒則陽亦虛矣故加附子以杜亡陽之機栝蔞桂枝湯治太陽病身體強𠘧𠘧然脈反沉遲此為痙也宜此主之桂枝湯原方加栝蔞根二兩喻嘉言謂栝蔞為君分兩當重桂枝為臣分兩當減其意頗通栝蔞桂枝湯治痙桂枝湯內栝蔞進太陽證備項背強脈反沉遲痙將振太陽之脈本浮今脈沉遲故曰反沉遲非內寒乃營衛之行不利津液少而經脈滯故知將欲作痙也痙為風病亦津傷古稱痙為風強病然風行必燥津液必傷風自宜驅津必潤桂枝湯和營衛以驅風栝蔞根濡津液而治痙按傷寒項背強𠘧𠘧汗出惡風者用桂枝加葛根湯其脈必浮數為邪風盛於外也此身強𠘧𠘧然脈反沉遲為風淫於外而津傷於內故用桂枝則同而一加葛根以散表一加栝蔞根以滋內則不同也桂枝甘草湯治發汗過多其人叉手自冒心心下悸欲得按者桂枝四兩去皮甘草二兩炙水三升煮取一升頓服桂枝甘草湯補心陽止汗除煩功獨良此方採取桂枝之半便另有精義桂枝復甘草是辛從甘化為陽中有陰故治胸中陽氣欲失且桂枝輕揚走表佐以甘草留戀中宮載還陽氣仍寓一表一里故得外止汗而內除煩發汗過多心下悸悸而欲按是陽亡發汗不誤誤在過多汗為心之液多則心氣虛故悸而欲按此乃陽虛之輕者甚而振振欲劈地則當用真武湯矣半夏散及湯治少陰咽痛半夏洗桂枝去皮甘草炙各等分各別搗篩已合治之各研另稱則分量準白飲和服方寸匕日三服若不能散服者咽痛能咽者用散不能咽者用湯以水一升煎七沸納散兩方寸匕更煎三沸下火令小冷少少咽之半夏散及湯此一方二法咽痛能咽者用散不能咽者用湯桂甘草少陰咽痛服之好此即桂枝甘草湯加半夏一味但分兩不同便治證迥別後人何得以古方輕於加減也身不發熱脈細微惡寒欲吐方堪搗按少陰病三字所該者廣必從少陰諸現證細細詳審然後咽痛知為少陰之咽痛否則何以知其非君相火炎與風溫燥火之咽痛耶此方所主咽痛脈必緊細身不發熱必惡寒欲吐咽雖痛而不紅腫蓋陰寒之氣上逆濁痰痹阻咽喉故用半夏之辛溫豁其痹阻之痰濁桂枝之辛熱散其上逆之陰寒緩以甘草之甘平和以白飲之穀味使少陰之邪由經脈而出肌表悉從太陽開發則桂枝半夏治咽痛庶無劫液之虞芍藥甘草湯治傷寒脈浮自汗出小便數心煩微惡寒腳攣急者並治腹中不和而痛芍藥四兩甘草四兩炙水三升煮一升五合分溫再服芍藥甘草附子湯治傷寒發汗病不解反惡寒者虛故也芍藥甘草各三兩炙附子一枚炮水五升煮一升五合分溫三服芍藥甘草湯平劑此亦桂枝湯之變偏於營分純一不雜之方也和營止腹痛功無比氣血不和肝木乘脾則腹痛白芍酸收苦泄能行營氣而瀉肝木甘草甘緩能和逆氣而補脾土甘酸相合甲己化土故治腹痛芍藥功專止汗煩芍藥和營益陰功專止煩煩止汗亦止故傷寒論反煩更煩心悸而煩者皆用之心煩腳攣陰虛致腳筋攣急屬陽明兩足脈陽明居其六行故腳攣急屬陽明不從標本從中治芍藥止煩汗甘草緩攣急斯合乎陽明不從表本從乎中治之法又有芍甘附子湯汗後而反惡寒使腳攣急與芍藥甘草湯是治陰虛此汗後反惡寒是陰陽俱虛故加附子桂枝去芍藥加蜀漆龍骨牡蠣救逆湯治傷寒脈浮誤以火迫劫之亡陽驚狂者桂枝湯原方去芍藥加蜀漆三兩洗去腥牡蠣五兩熬龍骨四兩為末以水一斗二升先煮蜀漆減二升納諸藥煮取三升去滓溫服一升桂枝甘草龍骨牡蠣湯治火逆下之因燒針煩躁者桂枝甘草各一兩龍骨牡蠣各二兩水五升煮取二升半去滓溫取八合日三服桂枝龍骨牡蠣湯治失精家少腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交桂枝湯原方加龍骨牡蠣各三兩水七升煮三升分三服桂枝去芍加蜀漆龍骨牡蠣救逆湯火迫古人治傷寒有火尉水攻之法心經陽欲越肢寒汗出必驚狂按亡陽驚狂必有肢寒汗出見證神明散亂行將脫固脫安神此劑彰火迫心經之陽非酸收可安故去芍藥而用龍牡鎮攝借桂枝蜀漆疾趨陽位以救猝然散亂之神明故先煮蜀漆使其飛騰劫去陽分之痰並賴其急性引領龍牡從陽鎮驚固脫方寸無主難緩須臾故曰救逆徐靈胎傷寒論類方曰此與少陰汗出之亡陽迥別蓋少陰之亡陽乃亡陰中之陽故用四逆輩回其陽於腎中今乃火逼汗亡其陽中之陽故用安神之品鎮其陽於心中各有至理不可易也桂甘龍牡湯同意火逆燒針煩躁良鎮其陰氣散其火邪上下同治前方驚狂治重在心故用蜀漆此無驚狂故蜀漆不用其證大段相同金匱桂龍牡蠣湯失精亡血夢交嘗脈微遲芤陰陽弱鎮攝精神使斂藏此心腎不交精傷氣竭神不斂藏之證桂枝湯外感用之能祛邪和營衛內傷用之能補虛調陰陽加龍骨牡蠣收斂其浮越之神固攝其散亡之精小建中湯治虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥等證並治黃疸小便自利及傷寒陽脈澀陰脈弦腹中急痛又傷寒二三日心中悸而煩者並主之桂枝湯原方芍藥加三兩加膠飴一升水七升煮三升去渣納飴更上微火消解溫服一升日三服黃耆建中湯治虛勞裡急諸不足及傷寒汗後身疼表虛惡寒脈遲弱者小建中湯原方加黃耆一兩半附當歸建中湯孫思邈千金要方治産後諸虛不足腹中痛引腰背少腹拘急者小建中湯原方加當歸三兩附樂令建中湯太平惠民和劑局方治臟腑虛損潮熱自汗將成勞瘵前胡細辛黃耆人參桂心橘皮當歸白芍藥茯苓麥門冬甘草半夏薑棗水煎附十四味建中湯太平惠民和劑局方當歸白芍藥白朮甘草人參麥門冬川芎肉桂附子肉蓯蓉半夏黃耆茯苓熟地黃薑棗水煎小建中湯芍藥多桂薑甘草大棗羅更用飴糖建中氣於桂枝湯重用芍藥加飴糖義偏重於酸甘專和血脈之陰僅能建中焦營氣故曰小陽虛勞損徐靈胎蘭臺軌範曰此方治陰寒陽衰之虛勞正與陰虛火旺之病相反庸醫誤用害人甚多此咽乾口燥乃津液少非有火也疸黃瘥此脾虛發黃之證觀方下所云小便自利非濕熱可知矣陽澀陰弦腹急痛中宮之陽氣虛則木來乘土故陽澀陰弦而腹痛不瘥更與小柴和腹痛服建中治太陰不愈者更與小柴胡治其少陽疏土中之木也以陰脈弦故用此法悸煩無熱方堪服悸而煩為虛煩可知故用建中以補心脾之氣蓋梔子湯治有熱之虛煩此治無熱之虛煩也嘔家禁與用毋訛酒家忌甘嘔家亦忌甘黃耆建中湯補不足表虛身痛效無過此因過汗虛其衛陽故汗後身痛用此湯固衛氣以和營則愈又有當歸建中法産後諸虛屬婦科黃耆建中補中益衛氣當歸建中補中益營氣樂令建中湯退虛熱此藥大能退虛熱生氣血柴胡歸芍細辛多參耆苓草陳半夏肉桂門冬薑棗和更有建中十四味陰斑勞損起沉疴亦有陰證發斑者淡紅隱隱散見肌表此寒伏於下逼其無根之火熏肺而然誤服寒藥立斃十全大補湯加附子麥夏蓯蓉仔細哦喻嘉言醫門法律曰十四味建中湯治臟氣素虛以之兩建其脾腎之陰陽蓋虛勞病多本脾腎故引伸建中之法以治之乃後人超出之方也又曰樂令建中湯柴胡細辛為君意在退熱而陰虛之熱則不可退十四味建中湯用附桂蓯蓉意在復陽而陰虛之陽未必可復又在用方者之善為裁酌耳桂枝芍藥知母湯治諸節疼痛身體尪羸腳腫如脫頭眩短氣溫溫欲吐桂枝四兩芍藥三兩甘草麻黃各二兩附子二枚炮防風知母各四兩白朮生薑各五兩水七升煮二升溫服七合分三服桂枝芍藥知母湯甘術麻黃薑附防此桂枝湯合朮附湯去大棗加麻黃防風知母濕熱外傷肢節痛上衝心胃嘔眩攘腳氣衝心為惡候漢時已有此方詳旭高按此與腳氣衝心之候頗同諸家謂唐以前無腳氣勿致思爾金匱要略中風歷節病篇云諸肢節疼痛身體尪羸腳腫如脫後人不知脫字之音義遂置此條於不論故此方從未有詮釋之者抑知脫字北音讀作腿字試一提出則形瘦頭眩短氣豈非多因腳腫之所致耶腳腫至如腿則病非一日矣揆其致病之由金匱於此方左右論列數條一則由汗出入水熱為寒鬱一則由風血相搏血為風動一則由飲酒汗出當風風濕相合更推及筋骨並傷營衛俱微身體羸瘦獨足腫大一條而殿之曰假令發熱便為歷節則知風寒濕三氣無不因虛阻襲筋骨而歷節腳氣總由風寒濕三氣而成為同源異流之證但以獨足腫為腳氣諸節痛為歷節焉耳是方用麻防薑桂宣發衛陽通經絡以驅外入之風寒附子白朮暖補下焦壯筋骨而祛在裡之寒濕然三氣雜合於筋骨血脈之中久必鬱蒸而化熱而欲束筋利骨者必須滋養陽明故又用芍甘知母和陽明之血以致太陰之液斯宗筋潤機關利而腳氣歷節可平平則眩嘔悉已矣此為濕熱外傷肢節而復上衝心胃之治法也附桂枝黃耆鱉甲湯旭高新制治久瘧營虛衛弱汗多灑淅惡風桂枝白芍黃耆生防風秦艽當歸各一錢鱉甲酥炙浮小麥各三錢炙草五分薑一片棗一枚水煎桂枝黃耆鱉甲湯秦艽芍藥草歸防浮麥棗薑療久瘧營虛衛弱汗多嘗旭高治一人病後元氣未復復感風邪舍於腠理與衛氣並居而病為瘧發於夜而汗多余思瘧發於夜是邪在營分營氣不能與衛氣和諧故多汗惡風宗仲景桂枝湯合玉屏風散參入秦艽鱉甲湯意一服而汗減三劑而瘧輕轉方減去黃耆防風秦艽復入四君調理十日全愈後凡用治久瘧營衛虛微而邪仍留戀者隨證加入補氣血藥一二味少佐柴胡以提之無不應手輒效然其中用法自有操縱之妙有連服數劑者有間日服一劑者或有今日服此方明日服消導藥一劑後日再服此方者蓋久瘧之人脾胃虛薄飲食稍有不節便生脹滿故藥必疏補兼施此又管窺之一得敢以質之高明桂麻各半湯類兩方合為一劑內經謂之復方桂枝麻黃各半湯治太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微者正虛也面色反有熱色身癢如蟲行皮中邪未解也以其不得小汗出故也宜此汗之桂枝湯麻黃湯各取三分之一合為半服桂枝二麻黃一湯治太陽病服桂枝湯後大汗出風乘汗入玄府反閉形如瘧狀日再發者桂枝湯二升麻黃湯一升合為三升分再服桂枝二越脾一湯治太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗桂枝湯二分越脾湯一分合二升溫服一升桂枝麻黃湯各半助正驅邪小發汗太陽如瘧脈雖微熱多無汗仍須散太陽如瘧脈微為陰陽俱虛汗吐下皆在所禁然熱多寒少面有熱色身無汗膚癢如蟲行皮中以邪氣怫鬱在表欲自出不得雖脈微不可發汗而熱多無汗又不得不汗故立此法助正之力侔於散邪但取小汗即已庶無大汗亡陽之慮風瘧緣何屬太陽因其止作無間斷太陽如瘧一日二三度發不似少陽之瘧一日一發也因風邪客於皮膚中欲出不出故止作無定後人因名之曰風瘧又有桂二麻一湯主治略同微有判此因有汗桂枝多發散之功更和緩此與各半湯意略同但此因大汗出之後故桂枝略重而麻黃略輕若夫桂枝二越脾一法體虛邪亦輕微按無陽是亡陽分津脈弱熱多義當玩此無陽與亡陽不同無陽者即陽分亡津之謂蓋其人本非壯盛而邪氣亦輕故身有寒熱而脈微弱若發其汗必致有叉手冒心臍下悸之變故用桂枝湯四分之二以行陽越脾湯四分之一以行陰行陰者發越脾氣而行胃中之津俾陽和津生而脈復令得似汗而解蓋凡暴病發熱脈雖弱而治從外感久病脈弱熱雖盛而治從內傷此其要也尤在涇傷寒貫珠集曰桂枝湯不特發散邪氣亦能補助正氣以其方甘酸辛合用具生陽化陰之妙與麻黃合劑則能盡麻黃之力而並去其悍與石膏同用則能資石膏之益而不撓乎權是雖麻石並行而實以桂枝為主蓋非滋養營衛則無以為發汗散邪之地耳凡正氣不足邪氣亦微而仍須得汗而解者宜於此三方取則焉後人不能盡桂枝之用而求之人參歸地之屬立意則同而用藥懸殊矣桂枝去芍藥加麻附細辛湯治氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥湯合麻黃附子細辛湯水七升煮麻黃去沫納諸藥煮二升分溫三服當汗出如蟲行皮中則愈桂枝麻附細辛湯去芍原來是復方心下如盤堅大者水寒結聚此能攘又方枳朮為湯飲枳朮湯亦治此證歌訣另編法別陰陽義益彰喻嘉言謂心下即胃之上也胃中陽氣不布心下乃為水飲之陰占據雖總一陽氣之權不伸所致然有陰陽二候陽氣虛而陰氣乘之結於心下必用桂枝湯去芍藥之酸寒而加麻黃附子細辛共散胸中之水寒以少陰主內水寒上入即從少陰溫經散寒之法而施治也所以方下云當汗出如蟲行皮中則愈可見胃中之陽不布即胸中之陽亦虛胸中陽虛並衛外之陽亦不固故其汗出時如蟲行皮中尚顯陽氣滯澀之象設非桂麻辛薑協附子之大力心下水寒能散走皮中乎水寒散斯重云見睍而心下之堅大者豁然空矣其有陽邪自結於陽位陰寒未得上入者但用枳術二味開其痰結健其脾胃而陽分之陽邪解之自易易耳金匱雖未明言究竟氣分之水不越此陰陽二治也柴胡桂枝湯治傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者柴胡四兩黃芩人參桂枝芍藥生薑各一兩半甘草一兩半夏二合半大棗六枚水七升煮三升溫服一升小柴胡合桂枝湯名柴胡桂枝湯太少二陽合病方和其營衛通津液二湯合用之功如此肢節煩疼太陽證痞嘔少陽證康太陽熱重寒輕者脈弱陽微宜此匡陽微切勿重發汗誤汗傷津陽必亡太陽熱多寒少脈弱無陽之證仲景主以桂枝二越脾一湯柯韻伯曰脈弱陽微不可發汗何得更用麻黃石膏重竭其陽審證用方惟柴胡桂枝湯為恰當葛根湯類葛根湯治風寒在表頭項強痛背亦強牽引𠘧𠘧然脈浮無汗惡風而下利者並治太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根四兩麻黃三兩桂枝芍藥甘草各二兩生薑三兩大棗十二枚水一斗先煮麻黃葛根減二升去沫納諸藥煮取三升去滓溫服一升覆取微汗不須啜粥葛根加半夏湯治太陽陽明合病必自下利而兼嘔葛根湯內加半夏半升先煎葛根湯內麻黃勷二味加入桂枝湯即桂枝湯加麻黃倍葛根以去營實小變麻桂之法輕可去實因無汗徐之才曰輕可去實麻黃葛根之屬是也有汗加葛無麻黃即桂枝加葛根湯一條治證與此同但彼因汗出故無麻黃此因無汗故加麻黃也項背𠘧𠘧太陽病才及陽明用此方此治太陽之邪才及陽明之方此方並可醫剛痙無汗為剛痙有汗為柔痙口噤頭搖背反張痙病之象如此表有風寒下利者解表則下利自止此為表實下利而非裡實故也兼嘔宜加半夏良名葛根加半夏湯太陽陽明合病下利用葛根湯兼解兩經之邪若嘔者加入半夏一味以止嘔隨證立方各有法度本草葛根除大熱大熱乃陽明之證故用之耳升津止渴利相當葛根甘涼生津體輕而升能引胃中清氣上行故凡口渴下利多用之正陽明病何嘗用葛根為治陽明經病表藥若陽明腑病當下不當汗故仲景於正陽明病篇中無葛根之方易老東垣尚未詳易老東垣分經定藥以葛根為陽明主藥未分經腑是其説尚有未詳也葛根黃芩黃連湯治太陽病桂枝證醫反下之利遂不止脈促表未解喘而汗出者葛根八兩甘草二兩黃芩黃連各三兩水八升先煮葛根減二升納諸藥煮取二升分溫再服葛根黃芩黃連湯甘草四般治二陽太陽誤下邪入陽明解表葛根清裡黃芩黃連兼和胃甘草喘汗脈促利為良此條喘汗為輕下利不止為重故藥亦先治其利但下利乃寒熱虛實俱有之證脈促急者則為熱邪無疑表雖未解則不當用桂枝之辛熱故用葛根之甘涼以解表因喘汗而利用芩連之苦以堅陰甘草不特和胃且以和表裡也若脈微弱則屬桂枝人參湯證矣附柴葛解肌湯陶節庵傷寒六書治太陽陽明合病目痛鼻乾不得臥頭痛惡寒無汗脈浮而洪柴胡乾葛羌活白芷黃芩赤芍桔梗甘草石膏生薑棗柴葛解肌湯節庵節庵自云此代葛根湯羌膏芷桔芍芩甘三陽經病邪居表合解三陽法可參按此湯以羌葛柴胡並用而石膏黃芩等為佐乃統治三陽經表證寒將化熱之法若謂太陽陽明合病則柴胡尚不宜用而節庵用之何也附升麻葛根湯錢仲陽閻氏小兒方論治陽明傷寒中風頭疼身痛發熱微惡寒無汗口渴目痛鼻乾不得臥及陽明發斑欲出不出寒暄不時人多疫證升麻乾葛細銼芍藥甘草銼炙各等分同為粗末每服四錢水一盞半煎至一盞量大小與之溫服無時頭痛加川芎白芷川芎為通陰陽氣血之使白芷專治陽明頭痛身痛背強加羌活防風此兼太陽故加二藥熱不退春加柴胡黃芩防風春為少陽司令柴芩少陽經藥夏加黃芩石膏清降火熱頭面腫加荊芥防風連翹白芷川芎牛蒡石膏升散解毒咽痛加桔梗清肺利咽膈斑出不透加紫草茸紫草涼血用茸取其升發脈弱加人參胃虛食少加白朮腹痛倍芍藥升麻葛根湯芍藥草此即仲景葛根湯去麻桂加升麻轉溫散為涼散乃後人超出之方也升散陽明表證好葛根湯治太陽將入陽明之表此湯治陽明自病之表微寒壯熱與頭疼太陽表病初起則惡寒甚且發熱而仍畏寒陽明表證初起則微惡寒及至壯熱則寒不復惡矣又太陽則頭項痛陽明則頭額眉稜骨痛此為辨也熱迫下利均堪保暴注下迫皆屬於熱此因邪熱內陷於太陰是表實裡虛故用升葛升陽散表白芍斂陰甘草和里表解里和下利自止亦治時疫與陽斑升麻甘草解毒之功痘疹已出慎勿搗痘疹初起熱自內達表故亦宜於涼散若已出者勿用恐升散重虛其表也附歸葛飲張介賓新方八陳治陽明溫暑大渴大熱津液枯涸陰虛不能作汗等證當歸三五錢乾葛二三錢水煎以冷水浸涼徐徐服之得汗即解歸葛飲須冷水浸陽明溫暑時邪甚陰虛無汗渴而煩服此汗流功獨任旭高按葛根湯用芍藥收陰是監麻葛之發汗也此用當歸養血是助乾葛以為汗也葛根湯證表尚惡寒故藥以溫散此證表裡俱熱故以藥冷飲所謂生津自能作汗清裡亦能解表為治溫暑之大法此葛根湯之變局又白虎湯之先著也瓜蒂散類爪蒂散治實積寒痰填塞上脘胸中痞硬寸脈微浮氣逆上衝咽喉不得息或心下滿而煩飢不能食手足厥冷脈乍緊者或飲食入口即吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者及猝然發黃胸滿氣喘命在須臾皆宜用此瓜蒂熬黃赤小豆各等分別搗為末取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之吐時須令閉目緊束肚皮吐不止者蔥白湯解之良久不吐者含砂糖一塊即吐諸亡血虛家老人産婦俱不可服此為峻劑故詳審叮嚀如此按瓜蒂時珍綱目不載故後人不知為何物遂致此藥廢棄遇當吐之證不吐因而夭枉者多矣可勝悼哉不知瓜蒂即神農本草苦瓠之蒂治面目四肢浮腫下水令人吐正是此物即今夏月之菜瓜帶苦味者一種是也去瓤及蒂漬於醬內為家常啜粥之小菜但有甘苦二種苦瓜之蒂則吐耳無錫東門楊氏貨水腫黃疸藥令嗅鼻中出黃水則愈甚有奇效疑即是此今世所謂名醫者反不知用即知之而亦不敢用噫是誠何心哉瓜蒂散中赤豆豉逐邪湧吐堪稱奇此酸苦湧泄重劑以吐胸寒者邪結於胸不涉太陽表實只以三味為散煮作稀糜留戀中焦以吐之能事畢矣瓜蒂性升味苦而湧赤豆性酸斂味苦而泄恐其未必即能宣越故復以香豉湯陳腐之性開發實邪定當上越而吐矣真奇方也實積寒痰填上脘胸中痞硬脈弦遲脈弦遲或乍緊者寒實也飢不欲食手足冷欲吐不吐無寧時皆寒格於上熱不得越之故此皆瓜蒂之見證亡血虛家切忌施亡血虛家而吐之則虛陽上越有厥脫之危又有急黃猝然發黃名曰急黃與水腫可將此藥鼻中吹或加丁香吹鼻更妙上者越之為效捷病在上者因而越之比汗下為效為捷長沙以後少人知仲景以後之醫但知汗下而不知吐法知吐法之妙者不過數人而已附三聖散張子和方治猝中痰迷壅盛癲狂煩亂人事昏沉五癇痰潮痰厥頭痛及食填太陰欲吐不出瓜蒂藜蘆鬱金等分為末酸齏水調量人虛實服之以鵝翎探吐附參蘆散李時珍本草綱目治虛人痰潮壅塞人參蘆研末水調下一二錢或加竹瀝和服附燒鹽探吐方孫思邈千金要方治傷食痛連胸膈痞硬不通手足逆冷尺脈全無通治霍亂蠱毒冷氣中惡食鹽燒以熟湯調飲以指探吐或用熱童便調服更佳三聖散瓜蒂除豉豆瓜蒂散中去香豉赤小豆加入藜蘆鬱金湊此吐實熱與風痰瓜蒂吐實熱藜蘆鬱金吐風痰五癇癲狂痰厥咎五癇昏迷癲狂迷亂皆痰之咎虛者參蘆一味投名參蘆散人參補陽中之陰蘆反瀉陰中之陽亦猶麻黃之根節不同劇痰烏附尖方透丹溪治許白雲用瓜蒂三聖之屬屢吐不透後以漿水和烏附尖服始得大吐千金尚有燒鹽方一切積聚功能奏鹽能軟堅可破頑痰宿積燒之則苦故能湧吐更用童便引火下行上越下行塞者通矣千金云凡病積聚宜先服此大勝用藥吐法從來誰擅長子和張氏為魁首張子和長於用吐據儒門事親云吐痰之法自有操縱卷舒不得浪用一吐不已而再而三非有膽敢者不能知也又云諸汗法古方多有之惟以吐發汗者世罕知之不知吐中就有發散之義故余嘗曰吐法兼汗以此附霹靂散王燾外臺祕要治癡癲病痰迷心雄黃雌黃冰片牛黃各五分人言四分生山梔二十枚急性子一錢生緑豆一百八十粒先將緑豆冷水洗去皮同餘藥各生曬乾為末大人用七分十五六歲者用四分或粉面糕餅令其食少頃吐出頑痰為妙晚以稀粥補之霹靂散治癡癲病湧吐風痰泄濁陰內經癲病分骨筋脈三種難經謂重陰者癲明系癡癲是臟病多由肝經風痰上逆於心迷亂神明故宜湧而吐之破泄陰霾之氣雌雄西黃冰急性人言緑豆山梔尋重用緑豆山梔所以解砒毒也若然不吐吞糕餅鼓舞陽明氣上臨方中雖用緑豆解人言毒然有服之其毒內攻而不吐者又必以食物如粉面糕餅鼓舞胃氣則無不吐者矣山梔輕揚上浮急性子下氣透骨雄黃入肝之陽分殺精闢邪雌黃入肝之陰分祛風殺蟲牛黃入肝臟引風外出冰片入骨髓搜風可盡人言燥烈劫痰善吐剛猛毒藥無微不入即有固結頑痰亦必倒倉吐出其神明得以歸舍而清矣附稀涎散許叔微普濟本事方引孫兆方治中風暴僕痰涎壅盛氣閉不通先開其關令微吐稀涎續進他藥亦治喉風牙關緊閉皂角四挺去皮弦炙白礬一兩共為末溫水調下五分或加藜蘆附通關散朱震亨丹溪心法附余猝中痰迷用此吹鼻皂角細辛等分研末吹稀涎散皂角白礬班或益藜蘆微吐間不可令大吐但使咽喉疏通能進湯藥便止若盡攻其痰則無液以養筋令人攣急偏枯此其禁也風中痰升人眩僕當先服此通其關白礬酸苦能湧泄咸能軟頑痰皂角辛能通竅咸能去垢專制風木藜蘆吐風痰善通頂令人嚏此奪門之兵也風初中時痰盛宜先用此令吐稀涎續進他藥通關散用細辛皂吹鼻得嚏保生還有嚏者可治無嚏者為肺氣已絶不治附甘草常山散汪訒庵醫方集解引張子和方吐瘧痰稀涎散加甘草常山藜蘆附如聖散汪訒庵醫方集解治纏喉風痹牙關緊閉前方去甘草常山加雄黃為末嗅鼻或以杜牛膝搗汁灌之甘草常山散吐瘧痰常山善吐瘧痰得甘草則功更捷藜蘆皂角白礬參若除常草雄黃入名如聖散喉風痰壅此能探喉風脹急湯水難進必先吐去其痰續進他藥余友陳正陽謂白礬酸澀難堪不如易以月石甚有道理並識之附吐法張介賓新方八陳代瓜蒂三聖之屬蘿蔔子搗碎以溫湯和攪取淡湯徐徐飲之少頃即當吐出即有吐不盡者亦必從下行矣吐法新方最平穩搗研卜子用宜生溫湯和攪徐徐飲上越還能使下行按景嶽此方凡邪實上焦或痰或食或氣逆不通等證皆可以此吐之最為平穩然恐未必即吐必以指探之乃能上越而吐愚意加入香豉橘紅激而行之則無有不吐者矣梔子湯類梔子豉湯治發汗吐下後虛煩不得眠反覆顛倒心中懊憹者梔子十四枚生用擘香豉四合綿裹以水四升先煮梔子得二升半納豉煮取升半去滓分為二服溫進一服得吐止後服梔子生薑豉湯治梔子豉湯證中若加嘔者此湯主之梔子豉湯原方加生薑五兩先煮梔子生薑余如前法梔子甘草豉湯治梔子豉湯證中若少氣者主之梔子豉湯原方加炙甘草二兩先煮梔子甘草余如前法梔子乾薑湯治傷寒醫以丸藥大下之身熱不去微煩者梔子十四枚乾薑二兩以水三升半煮取一升半去滓分二服溫進一服得吐止後服梔子厚朴枳實湯治傷寒下後心煩腹滿臥起不安者梔子十四枚厚朴四兩薑炙枳實四枚水浸去瓤炒以水三升半煮取一升半去滓分二服溫進一服得吐止後服枳實梔子豉湯治大病瘥後勞復者枳實三枚梔子十四枚豉一升以清漿水七升空煮又一煮法漿水即淘米之泔水久貯味酸為佳取四升納枳實梔子煮取二升下豉更煮五六沸去渣溫分再服覆令微似汗若有宿食者加大黃如博棋子大五六枚梔子大黃湯治酒疸心中懊憹或熱痛者梔子十四枚大黃一兩枳實五枚豉一升以水六升煮取二升分溫三服取微利此不取吐而取下梔子柏皮湯治傷寒身黃髮熱者梔子十五枚甘草一兩黃柏二兩水四升煮一升半去滓分溫再服附豉薤湯汪訒庵醫方集解引張文仲方治傷寒下利如爛肉汁赤滯伏氣腹痛梔子豉湯原方加薤白一兩梔豉湯治陽明表太陽之表證當溫散陽明之表證當清泄葛根湯治太陽傳入陽明之表而無汗者桂枝加葛根湯治太陽傳入陽明之表而有汗者升麻葛根湯治陽明自病之表而無汗者此梔豉湯治陽明自病之表而有汗者脈浮緊而咽口燥發熱汗出不惡寒氣喘胸滿心懊憹以上皆陽明表證非因誤治而得者虛煩反覆不得眠胸中窒痛舌胎皓此因汗下之後虛其正氣而邪熱仍擾於上焦故胸中滿者變為窒痛心中懊憹者變為虛煩不得眠然仍不出陽明之表觀舌胎白邪熱在上焦可知以上皆宜梔豉療本經梔子清胃中熱氣綱目豉能調中下氣便溏勿與當參考按梔子豉湯清泄上焦熱邪與腸胃亦無大害而傷寒論云病人舊微溏者不可與服未知何故想因大腸之氣滑脫者肺氣不可更泄也此治溫邪之的方按溫邪上受首先犯肺肺與胃近故溫邪之證初起便在陽明不似傷寒之必始於太陽而後及陽明也夫溫則宜清宜泄而葉天士溫熱論未出主方但云挾風加入薄荷牛蒡之屬挾濕加入蘆根滑石之流試思加入何方之內當知主治不出此方矣但世俗治時證不辨傷寒溫熱不分有汗無汗開手輒用梔豉則又大失制方之義矣清泄陽明是其要旭高謂梔子豉湯是陽明清泄之法不是上湧之劑觀傷寒論梔豉湯證數條並未言及吐字但云病人舊微溏者不可與則梔子之性可明矣至其方末之得吐止後服一句焉知非衍文錯簡編書者誤收之耶柯韻伯謂梔子之性苦寒泄熱並非吐藥惟豉之腐氣上熏心肺能令人吐以瓜蒂散取用豉汁和服為證據不知瓜蒂本為吐藥其用豉汁和服者以豉能調中下氣恐過吐傷其中氣耳非瓜蒂必得豉而吐也按瓜蒂散證心下痞硬而煩欲食不食欲吐不吐是寒食並結於胸中故引而越之梔豉湯證心中懊憹虛煩與舌胎頭汗是濕熱鬱蒸於心下故苦以泄之一屬有形而可吐一屬無形而不可吐何得混同為吐劑哉試令單煮瓜蒂服必吐但服香豉則不吐不辨可知矣余義見卷四雜説前證懊懷虛煩舌胎等證兼嘔加生薑名梔子生薑豉湯若然少氣加甘草名梔子甘草豉湯嘔則加生薑以止嘔少氣便加甘草以益氣見證施治古人每不出此梔子乾薑湯去豉下後微煩熱不了下後寒氣留中故用乾薑身熱微煩故用梔子不懊懷故去豉又有梔子朴實湯下後心煩梔子腹滿飽厚朴枳實以泄腹滿枳實梔豉湯勞復宜勞復乃病後氣虛餘邪猶未清楚因勞即發其證不一故不著其病形惟輕清泄卻上焦之邪足矣後人以補為治反致變證百出食復再加大黃討此指食復之重者言耳若宿食不甚枳實已能為效酒疸心中熱痛懊懷梔子大黃湯亦好治疸之法甚多此治心中懊憹熱痛者傷寒發熱身為黃梔子柏皮甘草妙名梔子柏皮湯梔子柏皮以寒勝熱以苦燥濕已得治黃之要而乃緩以甘草者黃必內合太陰之濕化若發熱者熱已不瘀於裡有出表之勢汗下皆所不必但當奠安脾土使濕熱分解其黃自除梔子厚朴湯言熱梔子乾薑湯言寒治皆在裡此章之治則在表也張文仲方豉薤梔下利穢臭用之效薤白辛通滑利上能開胸痹下能泄大腸氣滯蓋肺與陽明藥也前云舊微溏者不可服梔子是指脾虛寒滑者言此下利穢臭如爛肉汁是為熱邪故可用也附越桃散劉完素素問病機氣宜保命集治下利後腹中虛痛不可忍者越桃即山梔之大者高良薑各三錢研每服三錢米飲或酒調下痛立止越桃散梔子與良薑等分研和酒服良痢後腹中虛痛甚溺紅短數始相當痢後腹中虛痛非有實邪若小便清利者此下焦有寒也若小便短赤者明是肺氣下鬱於大腸積而成熱寒熱混而痛也寒熱混淆因作痛通陽泄熱痛斯忘山梔從肺入腸泄其鬱熱良薑宣發胃陽闢除冷氣陰陽和痛立止白虎湯類白虎湯治陽明病脈洪大而長不惡寒反惡熱舌上乾燥而煩躁不得臥渴欲飲水數升者及脈滑而手足逆冷此熱厥也亦主之若表未解而無汗者忌服石膏一斤碎綿裹知母六兩甘草二兩粳米六合以水一斗煮米熟湯成去滓溫服一升日三服白虎加人參湯治傷寒服桂枝湯後大汗出大煩渴不解脈洪大者並治太陽中暍汗出惡寒身熱煩渴及火熱傷肺傳為膈消最良白虎湯原方加人參三兩煮服同前法白虎湯清氣分火白虎湯清陽明氣分之熱邪調胃承氣湯導陽明血分熱邪石膏知母甘草佐再加粳米煮成湯石膏清火知母滋陰甘草緩陽明之津氣因石膏性重知母性滑恐其疾趨於下另設煎法以米熟湯成俾辛寒重滑之性得粳米甘草載之於上逗留陽明而成清肅肺胃之功止渴除煩功用播汗多熱盛最相宜汗多熱盛是白虎之的證無汗惡寒大不妥無汗惡寒是白虎之大禁脈滑洪長舌燥干陽明邪熱之為禍縱使肢寒亦用清此名熱厥醫休左脈滑而四肢厥冷內有煩渴譫語等見證此謂熱厥治宜清解誤用熱藥則死病久津枯胃火焚原方加入人參可名白虎加人參湯補虛清火以生津白虎加參功用若此中暑膈消力能荷中暑即中暍暍者暑熱之氣也膈消即上消消者為能消水也白虎加桂枝湯治溫瘧其脈如平身無寒但熱骨節煩疼時嘔者白虎湯原方少粳米四合加桂枝三兩煮服法同白虎加桂枝治溫瘧但熱無寒白虎酌但熱是陽明經熱故用白虎清泄之骨節煩疼加桂枝寒在骨節故加桂枝通營泄衛邪斯卻白虎清氣分之熱邪加桂枝一味通營泄衛則白虎並能清營分之熱方義原在心營肺衛立法也嘔因胃熱舌無胎白虎湯中薑汁著胃熱作嘔舌必無胎而口渴集驗於白虎湯中加薑汁七匙後人遵用效疸瘧溫瘧俱無寒但熱俱嘔而因不同疸瘧者肺素有熱而加外感為表寒裡熱之證緣陰氣內虛不能與陽相爭故不作寒也溫瘧者邪氣內藏腎中至春夏而始發為伏氣外出之證寒蓄久而變熱故亦不作寒也附蒼朮白虎湯劉完素素問病機氣宜保命集治濕溫病兩脛逆冷胸腹滿身疼重發熱汗多譫語苦渴渴不多飲脈沉細而數者蒼朮五錢石膏三錢知母一錢五分甘草一錢水二盞煎一盞服蒼朮白虎湯治濕溫立夏後濕土司令暑濕相搏病成濕溫不可發汗治在太陰脈沉細為濕數為熱好推論身疼脛冷為濕胸腹滿濕熱瀰漫三焦氣機不達發熱汗多苦妄言濕上甚為熱熱與濕合鬱蒸肌表則多汗蒙痹清竅則苦妄言矣口燥渴而不欲飲雖渴而不欲多飲濕溫之義尤明剛柔相濟此方尊方中甘草佐蒼朮知母佐石膏剛柔相濟用以燥濕清熱不傷臟腑之正氣前白虎加桂枝湯治寒化為熱乃太陽陽明同治之方此蒼朮白虎湯治濕化為熱乃太陰陽明同治之方雖一味之轉旋其義各有微妙竹葉石膏湯治傷寒解後虛羸少氣氣逆欲吐者並治三陽合病脈浮大在關上但欲睡眠合目則汗亦治傷暑發渴脈虛竹葉二把石膏一斤半夏半升人參二兩麥冬一升甘草二兩粳米半升以水一斗煮取六升去滓納米煮米熟湯成去米溫服一升日三服竹葉石膏湯粳米麥冬半夏草人參三陽合病太陽頭項痛陽明目痛鼻乾少陽口苦咽乾脅痛一時並見謂之合病關脈大邪在陽明居多故關脈浮大寐則盜汗此能任三陽合病而盜汗出是胃火盛而肝火乘之也厥陰為里之闔陽明為表之闔二經有火則反開而不闔故盜汗出是方即人參白虎加減大清胃火以生津用竹葉瀉肝火半夏通陰陽引衛氣從陽入陰則開闔而汗即止傷寒病後留餘熱少氣虛煩吐逆尋此仲景治傷寒愈後調養之方也其法專於滋養肺胃之陰氣以復津液蓋大病之後必有餘熱留於肺胃之間總宜清解後人概用峻補以留其邪則元氣不能驟復愈補愈虛矣止嘔或加薑更效集驗載此方加生薑止嘔最良脈虛傷暑渴宜斟暑病有虛熱者宜之若吐逆瞀亂之證則誤矣附瀉黃散錢仲陽小兒藥證直訣治脾胃伏火口燥唇乾口瘡口臭煩渴易飢熱在肌肉石膏五錢藿香七錢防風四兩黑山梔一兩甘草三兩為末微炒香蜜酒調服瀉黃散甘草與防風石膏梔子藿香充炒香蜜酒調和服梔子石膏瀉肺胃之火藿香辟惡去臭甘草調中瀉熱重用防風者能發脾中之伏火又能於土中瀉木也諸藥微炒香則能皆入於脾用蜜酒調服則能緩於中上蓋脾胃伏火宜徐徐而瀉卻非比實火當急瀉也口臭唇瘡胃火沖煩渴易飢即中消證肌肉熱脾胃主肌肉脾中伏火併為功按脾中伏火何以不用黃連吳鶴皋謂惡其燥者非也乃惡其遏也蓋白虎湯治肺胃燔灼之火身大熱煩渴而有汗者此治脾胃鬱蒸之火肌肉熱煩渴而無汗者故加防風藿香兼取火鬱則發之義也附玉女煎張介賓新方八陳治水虧火盛六脈浮洪滑大少陰不足陽明有餘煩熱乾渴頭痛牙疼失血等證若大便溏者非宜生石膏三五錢熟地三五錢或一兩麥冬二錢知母牛膝各一錢半水一鍾半煎七分溫服或冷服玉女煎方熟地膝麥冬知母石膏集此寓補陰於清火之中瀉黃散用防風欲其火從上散此用牛膝欲其火從下達水虧火盛脈浮洪脈訣浮洪為虛火浮滑為痰熱煩熱渴干徵效必頭痛牙疼失血餘少陰不足陽明實失血之餘雖有煩熱渴乾等證總由陰虛火亢治之必須滋其陰氣若虛甚者加人參尤妙此方治少陰陰虛陽明火盛之法若少陰陽虛陽明胃實當用附子瀉心湯若然大便泄而溏此劑非宜臨證悉承氣湯類大承氣湯治傷寒陽明腑證熱邪入里胃實不大便潮熱譫語自汗出不惡寒反惡熱痞滿燥實堅全具雜病三焦大熱脈沉實滑數者及少陰病自利清水色純青心下結痛口乾舌燥者亦治陽明剛痙胸滿口噤臥不著席腳攣急必齘齒大黃四兩酒洗厚朴半斤炙枳實五枚炙芒硝三合以水一斗先煮朴實取五升去滓納大黃煮取二升去滓納芒硝更上微火一兩沸分溫再服得下止後服大承氣湯用芒硝枳實大黃厚朴饒大黃治大實芒硝治大燥大堅二味治有形血藥厚朴治大滿枳實治痞二味治無形氣藥蓋腸胃燥實氣必不通故攻積之劑必用氣分之藥其煎法先煮枳朴次納大黃再入芒硝取生則氣鋭而先行熟則氣純而和緩仲景欲使芒硝先化燥屎大黃繼通地道而後枳朴除其痞滿俾燥屎去地道通則陰氣上承故方名曰承氣救陰瀉熱功偏擅急下陽明有七條傷寒論陽明篇中雲急下之者共有七條當知奪陰者芒硝而通陰者亦芒硝故仲景既有下多亡陰之大戒而復著急下存陰之活法蓋陽明燥結日久腎中真水為熱邪吸引告竭甚急急瀉其熱正以急救其陰也痞滿燥實堅潮熱此用承氣之要訣胸悶不食為痞胸腹膨脹為滿大便乾結為燥腹滿痛不大便為實按之石硬為堅日晡發熱為潮熱雜病傷寒通治療有是證則用是方為千古心法熱利清水口乾燥凡口乾舌燥皆當作熱治下利而用硝黃是通因通用法剛痙腳攣齘齒要陽明之脈下行至足上入齒中腳攣齘齒是陽明邪火極盛加以胸滿口噤熱邪充斥三焦矣靈樞謂熱而痙者死而仲景云可與此湯乃死裡求生之法陰氣不盡為陽熱所劫因而得生者多矣病須過經乃可下病至七八日為過經下之若早語昏囂下早則引邪入里語言昏亂承氣原為燥屎設燥屎之證當詳標汗出譫語陽明本自汗出加以譫語胃中燥結矣不能食腸胃實極故穀食全不能入喘冒不臥舌乾焦下既不通必反上逆而為喘冒不得臥舌乾焦黑土燥水竭也脈滑數為有宿食而轉矢氣矢氣屁氣也燥糞下攻之徵此皆承氣湯宜調以上為用承氣之法惡寒病在表嘔噦病在上焦俱禁用直視喘高命不牢直視喘高陽氣欲脫雖不大便下之必死戒之小承氣湯治傷寒陽明腑證譫言便硬潮熱上中二焦痞滿不通大黃四兩厚朴二兩薑炒枳實三枚麩炒水四升煮取一升二合分溫服小承氣湯朴實黃胸腹痞硬上中強大承氣湯通治三焦小承氣湯不犯下焦調胃承氣湯不犯上焦犯治胃實故曰小大承氣湯破中焦竟犯下焦故稱曰大小承氣湯獨治胃實故曰小去硝恐令下焦傷不用芒硝者恐傷下焦真陰也潮熱譫言為胃家實不欲食為有宿食雖利仍為胃實殃下利而仍譫語不欲食乃燥屎宿食不因下利而去仍為胃實醫見下利遂不復敢議下豈未讀仲景書乎又有初硬後溏者若腹不滿不轉矢氣此但初頭硬後必溏不可攻之攻之必脹滿不能食也宜否之間好審量一則下利譫語仍宜攻下一則便硬腹不滿戒不可攻仲景立法詳審如此益以羌活名三化機要加羌活名三化湯中風閉實可消詳用承氣通二便加羌活散風邪中風體實者可偶用虛者不可輕投調胃承氣湯治熱邪結胃胸痛心煩口渴便祕譫語大黃四兩酒浸甘草二兩炙芒硝半升水三升煮一升納芒硝化服附當歸承氣湯劉完素素問病機氣宜保命集治裡熱火鬱或皮膚乾燥或咽燥鼻乾或便溺祕結或瘀血發狂當歸大黃各一兩甘草半兩芒硝九錢薑棗煎大黃甘草湯治食已即吐大黃四兩甘草一兩以水三升煮取一升分溫再服調胃承氣湯硝黃草甘緩微和將胃保用甘草緩硝黃留中泄熱微和胃氣勿令大泄下故曰調胃非惡硝黃傷胃而用甘草也胸痛熱邪已結不滿痛而不滿邪結在血分而不在氣分心中煩熱結在胃陰津燥故心煩也不用朴實傷上焦不用厚朴枳實恐傷上焦氤氳之氣且恐辛燥重劫胃津也中焦燥實服之好便祕膚燥瘀血發狂當歸承氣湯宜討加當歸入血潤燥與桃仁承氣同意金匱大黃甘草湯食已即吐義當考素問至真要大論曰諸逆衝上皆屬於火此食已即吐是有火也升而不降則當逆而折之引令下行故用此法若朝食暮吐仍然完穀是無火也忌服桃仁承氣湯治太陽病不解熱結膀胱少腹脹滿大便黑小便利燥渴忽忽如狂至夜發熱及瘀血胃痛血結胸中痛瘧疾實熱夜發痢疾畜血急痛並能治敗血留經通月事桃仁五十枚去皮尖桂枝二兩去皮大黃四兩芒硝甘草各二兩水七升煮二升半去滓納硝更上火微沸分溫三服當微利桃仁承氣湯五般奇甘草硝黃並桂枝硝黃甘草本皆入血之品即調胃承氣湯也熱甚搏血故加桃仁潤燥緩肝直達血所而攻之加桂枝者以表未解故耳熱結膀胱太陽之邪由經入腑結於膀胱之部小腹滿小腹中央為膀胱之部左右為肝之部凡胸腹脹滿按之不痛者為氣結痛者為血結如狂畜血最相宜心主血熱與血結則心神不寧故昏亂而如狂畜血之證大便黑熱極則黑血凝之色亦黑小便自利小便利而少腹仍滿故知為畜血蓋血病而氣化無病也脈沉遲血結則脈不流利故沉微而遲但欲漱水不欲咽津不上承故唇口乾燥畜血在中故不能容水與濕熱為病雖渴而不欲飲同但濕熱則舌有胎畜血則舌無胎為別此皆血證諦宜知以上皆畜血現證死血瘀凝胃脘痛脈必澀飲下作厄善飢胃火經閉血積並能醫小便不利膀胱有濕熱非畜血也肢寒者少腹滿手足寒此為冷結在膀胱關元也當用溫藥非關畜血莫輕施抵當湯及丸治傷寒畜血並治癥瘕追蟲攻毒甚佳水蛭熬虻蟲去翅足熬各三十枚桃仁二十枚大黃三兩酒浸水五升煮三升去滓溫服一升不下再服抵當丸方即以四味搗分為四丸以水一升煮一丸取七合服之晬時當下血不下更服抵當湯直抵當攻處破血攻堅仗鋭師虻蛭桃仁大黃制畜血久積真氣運行不入故草木不能獨治其邪必以靈動嗜血之蟲為之嚮導飛者走陽絡潛者走陰絡引領桃仁攻血大黃下熱破無情之血結誠有奇功毋懼乎藥之險也峻攻畜血效稱奇桃仁承氣治畜血之初結者此方治畜血之久瘀者病有淺深故攻有緩急婦人石瘕咸堪治對證投劑莫遲疑按石瘕之證因寒氣客於子門氣不得通惡血留止其始生也少腹有塊大如雞卵日以益大狀如懷子月事不以時下可導而下經有明文世醫治此證終不敢議導下但用養血和營以為穩當不知瘀血不去新血終不得生若徒養血適以添瘀是猶養虎為害也余嘗遇此證令服此丸下汙泥血塊升許其腹脹痛稍松附代抵當丸王肯堂證治準繩治畜血瘀血血痛大黃四兩酒洗桃仁六十枚生地歸尾穿山甲玄明粉各一兩桂三錢或五錢蜜丸代抵當丸水蛭即螞蝗虻蟲即蚊蟲因二物善食人血故用以治血積但性猛有毒人皆畏服故更制代抵當丸首大黃桃仁歸尾生地勷玄明肉桂穿山甲攻瘀可代抵當湯桃仁歸尾生地潤以通之桂心熱以動之大黃玄明粉苦寒咸以推蕩之加山甲引之以直達瘀所也大陷胸湯治傷寒發熱不發汗而反下之表熱乘虛入於胸中與不得為汗之水氣結而不散令心下至少腹石硬而痛不可近者名大結胸證其人身無大熱但頭汗出或潮熱燥渴脈沉而緊大黃六兩酒洗芒硝一升甘遂一錢匕水六升先煮大黃取二升去滓納芒硝煮一二沸納甘遂末溫服一升得快利止後服大陷胸丸治結胸項強如柔痙狀者並治陽明熱喘及水腫初起形實者大黃半斤葶藶子熬芒硝杏仁各半升去皮尖熬黑先搗葶藶大黃為末納杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮一升溫頓服之一宿乃下不下更服大陷胸湯治大結胸大黃滌熱蕩實芒硝軟堅破結甘遂逐水消飲從心腹石硬結胸之的證痛拒按心下至少腹石硬而痛不可近較承氣證為尤甚便祕焦煩燥渴供與承氣證同但頭汗出脈沉緊結胸因下早致熱與水結熱不外泄而但上蒸故頭有汗而身無汗脈沉緊者水遏熱伏陽病反見陰脈水結胸中治亦同結胸本無他物熱與水氣結也項若強如柔痙狀更加葶杏蜜丸攻名大陷胸丸結胸項強邪據太陽之高位矣故於前方加葶藶杏仁從高陷下其邪蜜丸者欲其緩攻於下也此泄水邪並熱實此陷胸湯丸之總訣太陰寒實勿相蒙寒實結胸治宜溫下誤服寒藥則死後人通變斯方治熱喘水腫有殊功按大陷胸丸王海藏以之治陽明熱喘柯韻伯以之治水腫初起形實者均收奇效可知古方貴於活用觸類旁通醫之能事畢矣麻仁丸治脾約大便難小便數關脈浮澀者此潤腸之主方大麻仁二升杏仁一斤去皮尖白芍半斤大黃一斤厚朴一尺炙枳實半斤為末煉蜜丸如桐子大飲服十丸日二服漸加以利為度麻仁丸方治脾約枳朴大黃麻杏芍土燥津亡大便難養液通幽蜜丸嚼脾約為脾土過燥胃液日亡故以麻杏潤脾燥白芍安脾陰而後以枳朴大黃承氣法勝之則下不亡陰法中用丸漸加者脾燥宜用緩法滋柔潤下以遂脾欲非比胃實當急下也大黃黃連瀉心湯治心下痞按之濡大便硬不惡寒反惡熱脈關上數者心火亢盛吐衄不止甚良大黃二兩黃連一兩以麻沸湯二升漬之須臾絞去滓分溫服此法之最奇者不取煎而取泡欲其輕揚清淡以滌上焦之邪附子瀉心湯治心下痞大便硬心煩不得眠而復惡寒汗出者大黃二兩酒浸黃連炒黃芩各一兩炒附子一枚去皮別煮取汁以麻沸湯二升漬三黃鬚臾絞去滓納附子汁分溫再服此法更精附子用煎三味用泡扶陽欲其熟而性重開痞欲其生而性輕也大黃附子湯治脅下偏痛脈弦大便難發熱惡寒大黃三兩附子三枚細辛二兩水五升煮二升分溫三服大黃黃連瀉心湯心痞惡熱乃堪嘗若心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞按之自濡為虛痞數脈在關上君火強瀉火通陰痞自化痞有不因誤下而成者關上脈數繫心火亢盛不得下交於陰而中宮受其燔灼氣失升降而為痞按之自濡是無形者也故獨任苦寒便可泄卻如大黃瀉營分之熱黃連泄氣分之熱且大黃有攻堅破結之能其泄痞之功即寓於瀉熱之內以麻沸湯漬絞其汁取其氣不取其味治虛痞不傷正氣也火炎吐衄最為良按吐衄之證世醫率用寒涼止血不知血得寒則凝血止之後必有瘀凝胃絡或為胸脅疼痛或至夜微熱不除而貽余患者多矣審其果為實火迫血妄行不若竟用此方瀉火通陰行瘀止血之為美備也更加黃芩與附子附子瀉心湯法彰惡寒汗出亡陽兆故用附子便硬心煩痞熱殃故用三黃痞乃熱邪寒藥治傷寒痞滿從外之內滿在胸而不在胃多屬熱邪故宜苦寒瀉之若雜病之痞從內之外則又宜辛散也陽虛加附始相當附子非瀉心之藥心下痞而復惡寒汗出陽氣外撤矣若但以苦寒瀉痞恐其虛寒驟脫故用三黃撤三焦而瀉熱即用附子徹上下以溫經三黃用麻沸湯漬附子別煮汁是取三黃之氣輕附子之力重其義仍在乎救亡陽也大黃附子湯同意溫藥下之妙異常主治脅疼脈弦緊便難寒熱互參詳按金匱要略腹滿寒疝宿食篇云脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜大黃附子湯又云趺陽脈微弦法當腹滿不滿者必便難兩脅疼痛此虛寒從下上也當以溫藥服之又曰寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也合三條觀之見脅下偏痛脈弦緊為陰寒成聚大便難發熱惡寒為陽氣被郁故以附子破陰寒細辛散浮熱大黃通便難共成溫下之功夫附子瀉心湯用芩連佐大黃以祛膈上之熱痞即兼附子之溫以散之大黃附子湯用細辛佐附子以攻脅下之寒結即兼大黃之寒導而下之寒則宜溫積宜下後人效法好商量許學士溫脾湯治寒積腹痛泄瀉即效仲景溫藥下之之法也大黃蟅蟲丸治五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡營衛氣傷內有乾血肌膚甲錯兩目暗黑者用此緩中補虛大黃十分蒸黃芩二兩杏仁桃仁各一升地黃十兩乾漆一兩虻蟲一升水蛭百枚蠐螬一升蟅蟲半升芍藥四兩甘草三兩蜜丸小豆大酒服五丸日三服蟅蟲丸蟅蟲破堅通絡行傷大有功效故方名表之治乾血勞喻嘉言醫門法律曰此乾血勞之良治也血結在內手足脈相失者宜之大黃從胃絡宣瘀潤燥地黃滋腎燥芩清肺衛杏潤心營桃補肝虛芍藥扶脾補虛甘草緩中解毒與乾漆破脾胃關節之瘀血虻蟲性升入陽絡破血水蛭性潛入陰絡逐瘀並蠐螬去脅下之堅血血既瘀干攻必潤潤補兼投瓊玉膏按五勞虛極痹而內成乾血者悉皆由傷而血瘀由瘀而為乾血假如食傷脾憂傷肺醉飲傷肝房室傷腎勞傷心飢傷胃是諸傷者總皆傷其經絡營衛之氣也細繹本文云腹滿不能飲食肌膚甲錯兩目暗黑明是不能納穀以通流營衛則營衛凝泣瘀積之血牢不可破即有新生之血亦不得暢茂條達惟有日漸羸瘦而成內傷乾血勞其有不死者幾希矣仲景另出手眼而制此方以緩中補虛緩者舒也綽也指方中寬舒潤血之品言也故喻嘉言醫門法律謂兼入瓊玉膏潤補之藥同用尤妙勿以耆術補中失卻寬舒胃氣之義仲景妙法得喻氏之言而益彰活人無算矣附百勞丸吳昆醫方考治一切勞瘵積滯未經藥壞者當歸乳香去油沒藥去油人參各一錢虻蟲水蛭各十四枚大黃四錢為細末煉蜜丸桐子大每服百丸五更用百勞水即甘瀾水以杓揚百遍者也下取下惡物為度服白粥十日一方有桃仁十四枚百勞丸用大黃歸虻蛭參桃乳沒揮乾血沉疴勞瘵服未經藥壞別從違百勞丸許州陳大夫流傳出自仲景方治一切勞瘵積滯未經藥壞者細繹是方無非氣血並補和營逐瘀其緩中補虛之義毫不相關較之金匱蟅蟲丸方卻遜一籌惟用百勞水不助腎邪以藥留頓中宮導去脾胃絡之瘀血使其納穀流通營衛亦乾血勞之良治大黃牡丹湯治大腸癰其候少腹腫痞按之即痛如淋小便自調發熱惡寒汗出其脈遲緊膿未成者可下之當有血脈洪數者膿已成不可下也大黃四兩牡丹皮一兩桃仁五十枚甜瓜子半升芒硝三合水六升煮取一升去滓納芒硝再煎沸頓服之有膿當下膿無膿當下血大黃牡丹湯下劑桃仁瓜子與芒硝少腹腫痞按之痛痛即如淋大腸之熱下注也小便調病不在小腸水道故小便自調身皮甲錯營血痹聚之故右足屈大腸癰初起便右足屈而不伸小腸癰則左足屈而不伸以此為區別大腸癰腫此能消脈沉緊者未成膿脈洪數者膿已饒膿未成斯宜下奪膿成排膿散排膿散另編甘桔湯類宜邀大腸癰者其人平素嗜醇酒炙煿濕熱鬱蒸肺氣不得宣通下結於大腸之頭氣血壅遏而成病在下者因而奪之故重用大黃芒硝開大腸之結桃仁丹皮下將敗之血瓜子清肺潤腸以肺與大腸為表裡也方後云服之當有血下未化膿之血也若膿已成形肉已壞又當用排膿散治之故曰膿已成不可下也附黃龍湯陶節庵傷寒六書治熱邪傳裡胃有燥屎心下硬痛身熱口渴譫語下利稀水色純青大承氣湯方內加人參當歸甘草桔梗薑棗煎黃龍湯即大承氣湯加人參歸甘桔比煎加薑棗治陽明證實體虛熱結利按體質氣血虛人而得陽明胃實之證或因病誤治致虛而燥屎猶未去者不下則邪氣壅實而死下之又恐正氣益虛而即脫此方攻補兼施庶幾不犯虛虛之禍曰黃龍者大黃得人參為佐則能神其功用如龍得云助升騰上下莫能測其變化也胃有燥屎心下堅譫語下利純清水按胃有燥屎何以又下清水陶氏傷寒六書曰此利非內寒而利乃日逐自飲湯藥而利也直急下之名曰結熱利證又曰庸醫妄謂漏底傷寒而便用熱藥止之猶如抱薪救火誤人死者多矣攻補兼施此法良老年除去芒硝餌老人氣血虛甚者去芒硝恐重劫其陰也附溫脾湯許叔微普濟本事方治痼冷在腸胃間泄瀉腹痛厚朴桂心附子乾薑甘草各半兩大黃四錢㕮咀取一兩水二鍾煎六分頓服附溫脾湯孫思邈千金要方治久痢赤白脾胃冷積臍腹絞結痛甚人參附子芒硝甘草各二兩大黃五兩當歸乾薑各三兩㕮咀以水七升煮取三升分服日三溫脾湯里大黃少桂附薑甘厚朴多許叔微此方仿仲景溫下之法以下腸胃之冷積夫冷積腹痛泄瀉而仍下之者以錮冷積滯久留腸胃而不去徒用溫補無益也今此方以乾薑桂附為君復入承氣湯法其大黃止用四錢更為有見蓋不用則溫藥必不能下而久留之積非攻不去多用則溫藥恐不能制而洞泄之勢或至轉增裁酌用之真足為法矣痼冷久留腸胃瀉宜先取去勿蹉跎許叔微普濟本事方曰痼冷在腸胃間連年泄瀉腹痛休作無時服諸藥不效宜先取去然後調治易瘥不可畏虛以養病也旭高按畏虛養病為千古之通弊叔微此語頂門一針醫當猛省或益參歸除桂朴亦號溫脾治不訛寒熱並行下寒積臍腹絞結痛難過千金此方重用大黃略兼溫補與本事方重用溫通略加大黃法有殊矣蓋本事方治冷積泄瀉故大黃宜少用此治滯下赤白是其始原由於熱積故重用大黃因痢久脾胃虛寒而積仍未去故加參甘薑附溫補中宮同一大黃而佐使君臣不同則治證亦因之而異後人烏得以古方輕於加減也按古方中多硝黃芩連與薑茱桂附寒熱並用者亦有參朮硝黃補瀉兼施者亦有大黃麻黃汗下同行者今人罕識其旨姑録數方於上以見治療之妙不一端也附檳榔丸聖濟總録治虙瘕積聚腹痛大便堅澀或時通者檳榔大黃炒枳殼各二兩麩炒桃仁去皮尖麩炒大麻仁木香各一兩蜜丸每服十丸溫酒下聖濟檳榔丸治虙瘕素問氣厥論曰小腸移熱於大腸為虙瘕腹中瘕痛時寬窄大腸熱結大便時堅虙者伏也瘕者瑕大腸為傳導之腑熱則氣結液耗腹痛便澀然或有時而通故腹雖有形聚散靡常是為虙瘕虙者伏也瘕與瑕通女病恆有之潤腸泄熱必通幽大黃枳殼無多寡木香桃仁大麻仁檳榔木香枳殼泄決大腸之氣大黃桃仁麻仁潤下大腸之熱與潤腸通幽二方同義宣通其腑奪其下治在腑者宣而通之病在下者因而奪之附木香檳榔丸張子和儒門事親治胸腹積滯痞滿結痛二便不通或泄瀉下痢裡急後重食瘧實積木香檳榔莪朮陳皮青皮黃柏各一兩黃連大黃各三兩香附黑牽牛各四兩為細末水丸如小豆大每服三十丸食後生薑湯送下一方有三稜枳殼芒硝水丸木香檳榔丸青陳皮三黃莪朮附香附牽牛一切實積能推蕩瀉痢食瘧用鹹宜此子和經驗方也善能推陳致新破結散積大人食積瘧痢黃疸腫脹小兒驚疳積熱皆可隨宜服之木香香附青陳利氣寬腸而牽牛檳榔下氣尤速氣行則無痞滿後重之患矣連柏燥濕清熱莪朮行氣破血硝黃去血中伏熱併為推堅峻品濕熱積滯去則二便調而三焦通泰矣蓋宿垢不淨清陽終不得升故必假此以推蕩之亦通因通用之法也附枳實導滯丸李東垣內外傷辨惑論治傷濕熱之物不得施化痞悶不舒腹中硬痛積滯泄瀉等證大黃一兩枳實麩炒神麯炒各五錢黃芩酒炒黃連酒炒白朮土炒茯苓各三錢澤瀉二錢研細末湯浸蒸餅為丸量服程玠松崖醫徑加檳榔木香名木香導滯丸治同枳實導滯丸首大黃芩連曲枳朮苓勷澤瀉蒸餅糊丸服濕熱積滯力能攘大黃枳實蕩滌實熱芩連燥濕清熱苓瀉利濕泄熱神麯消食和中白朮補脾濕熱積滯自化若還後重兼氣滯木香導滯丸加檳榔汪訒庵醫方集解引滑伯仁曰腸胃陽明燥金也後重之用木香檳榔行燥金之郁也附涼膈散太平惠民和劑局方治心火上盛中焦燥實煩躁口渴目赤頭眩口瘡唇裂吐血衄血大小便祕諸風瘛瘲胃熱發斑發狂及小兒急驚痘瘡黑陷連翹四兩大黃酒浸芒硝甘草各二兩黑山梔黃芩酒炒薄荷各一兩為末每服三錢加竹葉白蜜煎加青黛藍根名活命丹附轉舌膏李梃醫學入門治中風舌強不語即涼膈散加菖蒲遠志各一兩涼膈散硝黃梔子翹黃芩甘草薄荷饒竹葉蜜煎療膈上中焦燥實服之消此上中二焦瀉火藥也熱淫於內治以鹹寒佐以苦甘故以連翹黃芩竹葉薄荷升散於上而以大黃芒硝推蕩其中使邪熱上散下行而膈自清矣用甘草白蜜者病在膈甘以緩之也溫邪吐衄斑狂要幼稚驚風痘陷邀皆上中二焦之火為患減去硝黃加桔梗上焦風熱總堪調李東垣曰易老減硝黃加桔梗上浮之藥以治胸膈與六經之熱中風不語加菖遠此又名為轉舌膏喻嘉言曰中風證大勢風木合君相二火主病古方用涼膈散居多蓋風火上炎胸膈正燎原之地所以轉舌膏活命丹皆從而加味不可以宣通腸胃輕訾之也汪訒庵醫方集解曰轉舌膏散心經之蘊熱也活命丹散肝經之鬱火也附防風通聖散劉完素宣明論方治風熱壅盛氣血怫鬱表裡三焦皆實者並治瘡瘍腫毒防風連翹麻黃薄荷川芎當歸白芍大黃芒硝各五錢白朮荊芥黑山梔各一分黃芩石膏桔梗各一兩甘草二兩滑石三兩為末每服二錢加生薑煎汪訒庵醫方集解去大黃芒硝名雙解散防風通聖散即涼膈散去竹蜜兮更加闢此即涼膈散變法去竹葉白蜜而加發表和氣血藥麻桔荊防滑石膏芎歸術芍生薑益荊防麻黃薄荷發汗而散熱搜風梔子滑石硝黃利便而降火行水芩桔石膏清肺瀉胃川芎歸芍養血補肝連翹散氣聚血凝甘術能補中燥濕生薑通徹表裡汗不傷表下不傷里名曰通聖極言其用之效耳風熱壅盛此方通表裡交攻為效碩此為表裡氣血三焦通治之劑瘡瘍癰毒總能消瘡瘍腫毒亦由風熱壅盛氣血怫鬱而成除卻硝黃雙解亦去硝黃亦能雙解表裡大便不硬者宜此十棗湯類十棗湯治太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出頭痛心下硬滿引脅下痛乾嘔短氣汗出不惡寒者為表解里未和也並治飲後水流脅下咳唾引胸中痛謂之懸飲脈沉而弦不猝死至百日或一歲者芫花炒黑甘遂大戟等分大棗十枚各別搗為散以水一升半先煮大棗取八合去滓納余藥末強人服一錢虛人服五分得快利後糜粥自養附三花神祐丸劉完素宣明論方治實熱積痰翻胃噎膈濕熱腫滿十棗湯原方加大黃一兩黑牽牛二兩輕粉一錢滴水為丸十棗湯用芫遂戟峻攻水氣威靈赫下利胸脅痞硬痛汗出短氣乾嘔逆諸證皆水氣為患仲景利水之方種種不同此其最峻者也芫花甘遂大戟為決水之猛藥故用大棗甘以緩之欲其緩循經絡不欲其徑走腸胃也緩攻則從心及脅之水飲皆從二便出矣咳唾引胸脅痛為懸飲飲踞久必成囊癖搗囊破癖飲斯蠲懸飲者如懸物也水飲痰涎久踞經絡結成窠囊懸於脅下惟此三味能直達水飲窠囊隱僻之處非他藥所能及本論云懸飲不猝死至百日或一歲者宜十棗湯可知其證之來有漸矣羸弱虛人勿輕擲河間三花神祐丸大黃輕粉牽牛益善通壅塞劫痰涎牽牛大黃大瀉血氣之壅塞輕粉劫痰無竅不入積痰噎膈能開闢劉完素云積痰翻胃噎膈服此藥三丸後轉加痛悶者此痰涎壅塞頓攻不開再服自利也附控涎丹陳言三因極一病證方論治人忽患胸背手足腰項筋骨牽引釣痛走易不定或手足冷痹此乃痰涎在胸膈上下非風證也甘遂去心大戟去皮白芥子各等分為末糊丸每服五七丸加至十丸臨臥薑湯下控涎丹治痰之本痰之本水也濕也得氣與火則結為痰痰涎變證悉能醫李時珍本草綱目曰痰涎之為物隨氣升降無處不到入於心則迷竅而成癲癇妄言妄見入於肺則塞竅而成咳唾稠黏喘急背冷入於肝則留伏蓄聚而成脅痛乾嘔寒熱往來入於經絡則麻痹疼痛入於筋骨則頸項胸背腰脅手足牽引隱痛陳言三因方並以控涎丹主之殊有奇效走注麻痹牽引痛胸背腰項或四肢或噎或喘或癲癇癰腫瘰癧並主之臟腑水濕大戟泄經隧水濕甘遂推皮裡膜外消痰氣芥子之功信甚奇白芥子色白入肺而達上焦消皮裡膜外之痰甘遂色黃入脾而行中焦決經隧之水濕大戟色黑入腎而走下焦泄臟腑之水濕三者引經各異而令三焦之水濕痰涎流出於水道則同故復用成方惟善用者能收奇功也備急丸類備急丸治食停腸胃冷熱不調腹脹氣急痛滿欲死及中惡客忤猝暴諸疾病巴豆去皮心膜研如脂出油取霜大黃乾薑各一兩上藥各須精新先搗大黃乾薑為末納巴豆霜合治一千杵用為散蜜和丸亦佳密器中貯之以暖水苦酒服大豆許三四丸或不下捧頭起灌令咽須臾當瘥如未瘥更與三丸當腹中鳴即吐下便瘥若口噤亦須折齒灌之三物白散治寒實結胸無大熱者巴豆霜一分川貝母桔梗各三分研末納巴豆霜更杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯巴豆得熱則行得冷則止備急丸醫猝暴疾中惡欲死腹脹急大黃乾薑巴豆霜斬關奪門而直入大黃苦寒下熱結巴豆辛熱下寒結二藥性味相畏同用瀉人反緩更妙在乾薑之辛散引領巴黃內通神明外辟惡忤助其斬關奪門之勢而成撥亂反正之功神昏口噤齒不開折齒灌之猶可及中惡客忤神昏口噤折齒灌之立蘇寒實結胸與大結胸證相似但無熱渴煩躁見象蓋彼因熱實此屬寒實也三白散貝母桔梗巴霜翕貝母桔梗開提肺氣以消痰散結巴豆劫寒破實以開結胸作散服者欲其散中焦之寒實也藥不瞑眩疾不瘳此等諸方宜佩給預先修合佩帶在身以救倉猝之證附感應丸太平惠民和劑局方治冷積瀉痢之良方木香二兩半肉豆蔻二十個丁香一兩半乾薑炮一兩百草霜細研二兩杏仁一百四十粒去皮尖別研極爛如膏巴豆七十粒去心皮膜研如脂出油除巴豆粉百草霜杏仁外餘四味搗為細末共和合研令細用好蠟匱和先將黃蠟六兩溶化重絹濾去渣以好酒一升於砂鍋內煮數沸候酒冷蠟浮取蠟稱用凡春夏修合用清油一兩入銚熬熟取蠟四兩同化成汁就銚內和前藥末乘熱拌勻丸如豆大每服三十丸空心薑湯下感應丸肉蔻丁木香巴杏乾薑百草霜肉豆蔻逐冷消食丁香木香暖胃和脾杏仁消肉積而降氣乾薑逐痼冷而散痞巴豆善破沉寒奪門宣壅寒積深痼非此莫攻百草霜和中溫散亦能消積統計諸藥同成溫下之法蠟丸空腹薑湯下用黃蠟之義最精凡治積新病宜急下久病宜緩下此治久積痼冷乃緩下法也冷積瀉痢真奇方趙獻可醫貫曰此方妙不可言雖有巴豆不令人瀉其積自然消化李時珍本草綱目曰一老婦年六十餘病溏瀉已五年肉食油物生冷犯之即作痛服調脾升提止澀諸藥入腹則瀉反甚延余診之脈沉而滑此乃脾胃久傷冷積凝滯所致王太僕所謂大寒凝內久利溏泄愈而復發綿歷數年者法當以熱下之則寒去痢止遂以蠟匱巴豆丸藥五十丸與服二日大便不通亦不利其泄遂愈自是每用治泄痢積滯諸病皆不泄附太平丸張介賓新方八陳治胸腹疼痛脹滿及食積氣積血積蟲積氣疝血疝膨脹癥瘕邪實祕滯痛劇等證陳皮厚朴木香烏藥白芥子草豆蔻三稜莪朮煨乾薑牙皂炒澤瀉各三錢俱研細巴豆用滾湯泡去皮心膜稱足一錢先將巴豆用水一碗微火煮至半碗將巴豆撈起用乳鉢研極細仍將前湯攙入研勻然後量藥多少入蒸餅浸爛搗丸前藥如緑豆大每用三分或五分甚者一錢用熱薑湯下瀉多不止飲冷水一二口即止如未利再服太平丸莪朮芥三稜朴瀉薑陳牙皂朋烏藥木香草豆蔻些微巴豆力能勝此方借些微巴豆以行群藥之力去滯最妙如欲其峻須用巴豆二錢食蟲氣血諸停積脹痛難過總可憑按金匱備急丸治冷熱交結之積局方感應丸治寒凝之積景嶽此方治氣食停滯祕實之積其蟲積與血積乃藉以為治也隨證用湯為引下凡傷食停滯即以所傷之物煎湯送下婦人血氣痛當歸湯下氣實痛陳皮湯下疝氣茴香湯下寒氣生薑湯下氣濕實滯臌脹用燒酒加白糖少許送下蟲痛檳榔湯下利多飲冷效堪徵巴豆瀉人得冷則止故服巴豆丸散利多不止者飲冷粥一二口即止也柴胡湯類小柴胡湯治傷寒中風少陽病口苦咽乾目眩耳聾往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳或汗後餘熱不解或瘧發寒熱婦人傷寒熱入血室暮則讝語並治傷寒陽微結頭汗肢寒脈細便堅亦半表裡也柴胡半斤黃芩人參炙草生薑各三兩半夏半升大棗十二枚以水一斗二升煮取六升去滓再煎此方為和解之劑去滓再煎則藥性和合不相捍格矣取三升分溫三服柴胡加芒硝湯治陽明病潮熱大便溏小便利胸脅滿而不去先服小柴胡一劑乃進柴胡二兩十六銖黃芩炙草人參生薑各一兩半夏二十銖大棗四枚芒硝二兩水四升煮取二升去滓納芒硝更煮微沸分溫再服不解更作服小柴胡湯和解供少陽為半表半裡汗吐下皆在所禁法當和解此方主之半夏人參甘草從更用黃芩與薑棗少陽百病此為宗此和解少陽之主方柴胡升陽達表黃芩退熱和陰半夏和胃而通陰陽參甘薑棗補中氣調營衛經言交陰陽者必和其中是也往來寒熱太陽之寒熱寒時亦熱熱時亦寒少陽之寒熱寒已而熱熱已而寒故曰往來若陽明則但熱不寒以此為別胸脅滿少陽行身之側故胸脅苦滿喜嘔心煩木火上逆故煩而嘔嘔則木火兩舒故喜之也或眩聾少陽清氣不升故目眩耳聾或咳或悸或腹痛木邪干肺則咳犯心則悸侮脾則腹痛可見少陽有病三焦皆不得寧蓋少陽在人身為遊部凡表裡經絡之罅皆能隨其虛而見之故有或然之證咽乾口苦耳聾目眩口苦咽乾貼切少陽樞機病象白胎濃舌上白胎邪在半表半裡若全入里則焦黃矣諸證不必皆全具雜病風寒俱可庸傷寒論太陽篇云傷寒中風有柴胡證但見一證便是不必悉具太陽少陽並病略兼表合病一時俱見並病以次相傳陽明兼少陽但柴通少陽之外為太陽里為陽明而少陽居其間故少陽而兼太陽者用小柴胡微加桂枝以解表陽明而兼少陽者但用柴胡以和之邪氣從樞轉出矣服湯潮熱不止者才把芒硝入劑中名柴胡加芒硝湯服小柴胡湯潮熱不止者胃家實也故加芒硝通六腑積聚乃少陽陽明同治之方也熱入血室如瘧狀讝語硬滿如結胸血室為中焦營氣之所聚肝藏血心主血血因熱結而成瘀則肝氣與心經之氣亦凝故胸脅滿而神昏讝語日輕夜劇發作有如瘧狀小柴兼刺期門法期門在乳下第二肋端去乳頭約四寸肝募也厥陰陰維之會刺入四分蓋血結為有形之證湯劑一時難效更刺期門以瀉厥陰有餘之熱則尤親切而易散或益桃仁海蛤攻按王海藏治熱與血結之證每用此二味蓋海蛤鹹寒佐桃仁入血散瘀泄熱頗有奇功因附及之婦人傷寒經水適來適斷邪熱陷於血室胸脅及少腹滿痛至暮則譫語此證最多更參看葉天士溫熱論中治法益明又有柴胡疑似證醫當詳辨莫通融便堅脈細陽微結大便硬謂之結脈浮數能食曰純陽結脈沉細不能食曰純陰結此陽微結與陰結相似但頭汗出為有表證具如下文頭汗肢寒陽微結者熱雖結而不甚也陽氣不能四達而從上冒故手足冷而頭汗出胸滿同惟胸滿與柴胡證同頭汗知非少陰病此要訣也三陰脈不至頭其汗在身傷寒論少陰篇云脈陰陽俱緊反汗出者亡陽也法當咽痛吐利此不吐不利而大便硬則陽微結之汗與亡陽之汗大有別矣脈雖沉細勿相蒙程郊倩曰凡陽熱鬱結不舒雖手足冷脈沉細不得謂陰證可見陽氣一郁不但陽證似陰陽脈亦似陰矣此為有表復有里脈沉為里頭汗為表可與柴胡以建功此條為少陰少陽疑似證反復講明頭汗之義可與小柴胡而不疑凡審證皆當如此面赤氣喘溏泄者設教誤用反成凶面赤氣喘為陽氣上越之候若誤用柴胡以提之上越者因而外脫立見凶危大便溏因於虛寒者忌之否則不忌柴胡加龍骨牡蠣湯治傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不能轉側者柴胡四兩黃芩人參甘草生薑茯苓鉛丹龍骨牡蠣各一兩半大黃二兩半夏二合半大棗六枚水八升煮取四升納大黃更煮一二沸大黃只煮一二沸取其生而流利也去滓溫服一升一方有桂枝無甘草非蓋外無太陽之表證則不得用桂枝無甘草則不成和劑矣柴胡加龍骨牡蠣湯茯苓鉛丹大黃繼胸滿下後邪陷胸中煩驚熱邪擾亂神明讝語多熱邪入胃一身盡重少陽三焦氣機不利小便祕津液少現證錯雜藥亦雜墜痰鎮驚是主劑此方用柴胡湯全方治胸滿身重之半表裡加鉛丹龍牡以鎮煩驚茯苓以利小便大黃以止讝語心煩讝語而不去人參者以驚故也此乃正氣虛耗邪已入里而復外擾三陽故現證錯雜藥亦隨證施治肝膽驚痰用此方以治癲癇必有濟徐靈胎傷寒論類方曰此方能下肝膽之驚痰以之治癲癇必效柴胡桂枝幹薑湯治傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者並治瘧疾寒多微有熱或但寒不熱服一劑便效柴胡半斤桂枝黃芩各三兩乾薑牡蠣甘草各二兩花粉四兩水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈柴胡桂枝幹薑湯花粉芩甘牡蠣藏邪在三陽陽氣結從樞轉出易通陽揭出三陽經藥以名湯者病在少陽而太陽陽明猶未罷緣其津液內虧故陽氣結而不通用桂枝散太陽餘邪乾薑開陽明痞結之氣使以花粉佐牡蠣入陰分升津液以救三陽之熱重用柴芩草轉少陽之樞則三陽結邪一一從樞轉出矣胸痞乾薑頭汗桂枝牡蠣小便少甘草花粉寒熱往來柴胡黃芩煩渴將煩故去人參不嘔故去半夏渴故加花粉瘧發寒多微有熱風寒濕痹於肌表陽氣鬱伏於營血之中故瘧發寒多或但寒無熱也只消一劑妙非常瘧寒多微有熱顯然陰陽無爭營衛俱病故和陽即當和陰用柴胡和少陽之陽即用黃芩和里用桂枝和太陽之陽即用牡蠣和里用乾薑和陽明之陽即用花粉和里使以甘草調和陰陽和之得其當故一劑便效喻嘉言醫門法律曰柴胡本陰陽兩停之方可隨瘧邪之進退以為進退者加桂枝乾薑則進而從陽痹著之邪可以開矣更加牡蠣以軟其堅壘則陰陽豁然貫通而大汗解矣所以服一劑便效其加芩連以退而從陰即可以類推矣柴胡去半夏加栝蔞根湯治勞瘧口渴小柴胡湯原方去半夏加栝蔞根四兩柴胡去半夏加栝蔞湯止渴升清此方功效如此勞瘧瘳瘧不離乎少陽故用柴胡勞瘧陰虧口渴故去半夏加花粉勞瘧病緣中氣弱補中益氣亦相投遇勞即發名勞瘧中氣虛也後人用補中益氣湯治之亦效四逆散治少陰病四逆泄利下重其人或咳或悸或小便不利或腹中痛者柴胡白芍枳實甘草炙等分為末白飲和服方寸匕四逆散治少陰樞小柴胡湯少陽樞機之劑也四逆散少陰樞機之劑也枳實柴胡甘芍俱等分研和白飲服斂陰泄熱兩相須少陰為三陰之樞猶少陽為三陽之樞也此四逆散與小柴胡制方之義略同特以樞有陰陽之異故用藥亦分氣血之殊而其輔正逐邪和解表裡則兩方如一方也蓋彼用黃芩泄肺熱恐金勝木也此用枳實泄脾實恐土勝水也彼用人參補脾氣恐少陽之邪傳入於太陰也此用芍藥益肝陰恐少陰之邪傳入於厥陰也而樞機為病必以和解故柴胡甘草在所不易矣泄利下重枳實腹中痛芍藥甘草熱邪厥逆柴胡芍藥保無虞傷寒論厥陰篇曰陰陽氣不相順接便為厥厥者手足逆冷是也徐靈胎傷寒論類方曰此四逆乃少陰傳經之熱邪並無脈微惡寒等陰證即下利一端並非清穀而反下重故不得用溫熱大柴胡湯治傷寒發熱汗出不解熱結在裡心下痞硬嘔吐而下利復往來寒熱脈沉實或弦數者柴胡半斤半夏半升黃芩芍藥各三兩生薑五兩枳實四枚大棗十二枚以水一斗二升煮取六升去滓再煎取三升溫服一升日三服一方加大黃二兩若不加恐不為大柴胡也大柴胡湯芩夏芍枳實薑棗共煎嘗此小柴胡四逆散二方合用者也除去人參甘草者蓋熱邪已結在裡不可更實其脾也前小柴胡湯獨治陽樞故曰小此則陰陽二樞並治故稱曰大表有寒熱柴胡裡熱結黃芩枳實痞硬枳實微煩黃芩嘔半夏生薑利黃芩芍藥大棗良此下氣分無形之熱結故不用大黃或有加入大黃者表裡兼攻便祕將按前證下利是地道已通且不腹滿不口乾燥渴故原方不用大黃大黃乃王叔和所加必見煩渴譫語腹滿大便硬者方宜柴胡芒硝湯義亦爾仍有桂枝大黃湯見桂枝湯類按大柴胡加大黃乃合用小承氣小柴胡加芒硝乃合用調胃承氣皆少陽陽明同治之方桂枝加大黃湯為太陽陽明同治之方皆雙解表裡法也附柴胡飲子張子和儒門事親治肌熱蒸熱積熱汗後餘熱脈洪實弦數亦治瘧疾小柴胡湯去半夏加當歸白芍大黃柴胡飲子即小柴胡湯去夏加黃歸芍偕略施汗下兼攻補熱積三焦瘧亦佳此方治三焦積熱略施攻補深中肯綮附清鎮丸劉完素素問病機氣宜保命集治嘔吐脈弦頭痛及熱嗽小柴胡湯內人參加倍加青黛半兩麵糊丸生薑湯下清鎮丸治熱咳嗽嘔吐脈弦頭痛究弦為少陽之脈木火凌金則咳乘胃則嘔上衝則頭痛小柴胡湯青黛麵糊丸木火上衝功克奏木鬱則達之火鬱則發之則柴胡為要藥加青黛直折肝膽之火生薑湯衝開格拒以止嘔豁痰允稱良藥附一柴胡飲張介賓新方八陳凡感四時不正之氣或為發熱或為寒熱或因勞因怒或婦人熱入血室或産後經後因冒風寒以致寒熱如瘧等證但外有邪而內兼火者須從涼散宜此主之柴胡二三錢芍藥二錢黃芩生地陳皮各一錢半甘草八分水一鍾半煎七八分溫服一柴胡飲從寒散一為水數從寒散也地芍黃芩陳草贊內有火而外有邪四時不正皆能判此大柴胡變局也去半夏枳實薑棗加陳皮甘草調氣生地涼營分之熱如邪結在胸而痞滿者仍宜去生地加枳實為妙附二柴胡飲張介賓新方八陳凡遇四時外感或其人元氣充實臟氣素平無火或時逢寒勝之令本無內熱等證者皆不宜妄用涼藥以致寒滯不散則為害非淺宜此主之柴胡一錢半或二三錢陳皮一錢半半夏二錢厚朴一錢半生薑三五七片細辛一二錢甘草八分水一鍾半煎七八分溫服二柴胡飲散從溫二為火數從溫散也厚朴細辛陳夏存甘草生薑解外感內無熱渴此方尊此小柴胡變局也去人參黃芩大棗加陳皮厚朴細辛則和解之方轉為溫散之劑附三柴胡飲張介賓新方八陳凡人素稟陰分不足或肝經血少而偶感風寒者或感邪不深可兼補而散者或病後産後感冒有不得不從解散而血氣虛弱不能外達者宜此主之柴胡二三錢芍藥一錢半陳皮炙甘草各一錢生薑三五片當歸二錢溏泄者易以熟地水一鍾半煎七八分溫服三柴胡飲三為木三為木數從肝經血分也歸芍陳薑炙草六素稟陰虛外感因肝經血少咸宜服此從四逆散加減以生薑佐柴胡以當歸佐芍藥以陳皮佐甘草兼調氣血而散外邪亦和平之劑附四柴胡飲張介賓新方八陳凡人元氣不足或忍飢勞倦而外感風寒或六脈緊數微細正不勝邪等證必須培助元氣兼之散邪庶可保全宜此主之柴胡一二錢人參二三錢或五七錢酌而用之生薑三五七片當歸炙甘草一錢水二鍾煎七八分溫服如胸膈滯悶者加陳皮一錢四柴胡飲四為金四為金數從氣分也薑草當歸鬚用參加入陳皮寬膈滯氣虛外感此能任此亦小柴胡變局去黃芩半夏而加當歸陳皮本方雖治從氣分而略兼營分蓋氣虛者營血必不足故補氣亦必兼補血也附五柴胡飲張介賓新方八陳凡中氣不足而外邪有不散者宜此主之柴胡一二錢當歸二三錢熟地三五錢白朮二三錢芍藥一錢半炒用陳皮酌用或不必用炙甘草一錢水一鍾半煎七分食遠熱服五柴胡飲從脾胃五為土數從脾胃也地芍歸陳術草匯徒散外邪非善全兼培氣血斯為貴此逍遙散變方也去茯苓薄荷生薑加陳皮熟地則補多散少矣此與四柴胡飲相表裡但四柴胡飲調氣分之藥為多此則兼培氣血為異按以上五方皆出柴胡治例録出聊為加減成方之一助然畢竟後世之方總不免籠統之弊若病在太陽便用柴胡古有引賊入門之戒用者審之附清脾飲嚴用和濟生方治瘧疾熱多寒少口苦嗌乾小便短赤脈來弦數柴胡黃芩半夏甘草白朮厚朴青皮茯苓草果各等分水一盅生薑一片棗一枚煎八分熱減時服忌生冷油膩清脾飲用青朴柴芩半甘苓白朮偕更加草果兼薑棗熱多陽瘧服之佳夏月納涼飲冷過度先傷脾胃之陽寒氣藏於肌肉之間至秋復感涼風郁遏腠理引動伏邪而病為瘧發必先寒後熱所謂先傷於寒而後傷於風則先寒而後熱也雖瘧不離乎少陽而脾胃受傷者實多故嚴氏宗仲景小柴胡湯加減而立此方名曰清脾是明從脾胃論治方中苓朮夏草皆脾胃藥復以厚朴青皮草果蕩滌膜原之邪劫痰截瘧其治少陽惟柴芩二味而已瘧由痰積風寒作解表除痰永不差古云無痰不成瘧無積不成瘧然雖有痰積若不兼感風寒亦未必便成瘧疾故治瘧之方解表除痰每相須為用也此治瘧邪通用劑隨宜加減總堪諧此治瘧之通劑方中黃芩草果可隨寒熱以為進退勿拘陽瘧一端也外如石膏大黃桂枝附子人參熟地當歸白芍等皆可隨證加入如瘧久不止加常山烏梅截之瀉心湯類半夏瀉心湯治傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯若心下滿而不痛者此為痞柴胡不中與也宜此主之半夏半升洗黃連一兩黃芩人參炙甘草乾薑各三兩棗十二枚水一斗煮取六升去滓再煎取三升溫服一升日三服生薑瀉心湯治傷寒汗解後胃中不和心下痞硬乾嘔食臭脅下有水氣腹中雷鳴下利者半夏瀉心湯加生薑四兩乾薑只用一兩余同法甘草瀉心湯治傷寒中風誤下之後其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也宜此湯半夏瀉心湯去人參甘草加一兩余各同法半夏瀉心湯黃連芩乾薑甘草棗人參瀉心者實瀉胃也蓋胃居心下心下痞即胃痞也此實則瀉子之法但滿不痛為痞氣心下滿而硬痛者為結胸但滿而不痛者為痞氣法在降陽而和陰瀉心者必以苦故用芩連散痞者必以辛故用薑夏欲交陰陽通上下者必和其中故用參甘大棗生薑瀉心湯生薑入甘草瀉心湯甘草臨按半夏瀉心湯治寒熱交結之痞故苦辛平等生薑瀉心湯治水與熱結之痞故重用生薑以散水氣甘草瀉心湯治胃虛氣結之痞故加重甘草以補中氣而痞自除俗以甘草滿中為痞嘔禁用之藥蓋不知虛實之義者也痞硬雖同虛實異同一心下痞硬生薑瀉心證屬實甘草瀉心證屬虛腹鳴下利細推尋同一腹鳴下利生薑瀉心證則下利稀水而未至於日數十行甘草瀉心證則下利日數十行而穀不化虛實可別矣水氣故用生薑乾嘔必食臭胃中濁氣不降故食臭胃虛故用甘草乾嘔必煩心胃虛客氣上逆故心煩不安同一乾嘔而虛實不同又如此生薑辛散甘草補倒置人參疑誤深按生薑瀉心湯辛散破滯開痞痞由水氣而結乾嘔食臭為實邪則不當用人參甘草瀉心湯甘緩補虛化痞痞由兩次誤下而得且下利不止而穀不化中虛極矣正當用人參以輔甘草則甘草瀉心湯中無人參生薑瀉心湯反用人參兩方倒置疑必有誤三瀉心湯皆本柴胡立虛實之間法律森凡瀉心證皆已汗已下已吐之餘疾以上三湯總不離乎開結導熱益胃大半皆本於柴胡湯立法以乾薑易生薑以黃連易柴胡彼以和表裡此以徹上下故其所治之證多與柴胡證相同但加苦辛治痞之藥耳然其或虛或實有邪無邪處方之變則各有微妙攻補兼施寒熱互用內中有一藥治兩證者亦有兩藥合治一證者其藥性又與神農本草所載無處不合學者能於此等方講求其理而推廣之則操縱在我矣乾薑黃連黃芩人參湯治傷寒本自寒下醫復吐下之寒格食入口即吐者乾薑黃連黃芩人參各三兩水六升煮取二升去滓分溫服薑連芩參湯治嘔苦勝於心義宜剖並非寒熱平調之法乃治寒格拒熱之方寒熱格拒在中焦食入即吐緣斯咎寒格者寒與熱格也寒故用乾薑熱故用芩連因吐下而傷其中氣故用人參食入口即吐是火逆上衝故苦寒倍於辛熱不食則不吐是心下無水氣故不用半夏生薑要知寒熱相阻則為格寒熱相結則為痞故此方得瀉心之半源同而流異也宣陽乾薑宣陽散寒泄熱芩連通陰泄熱以和中人參補中和胃格拒通時吐自否嘔家挾熱此為良水飲寒痰嘔非偶按此格雖因於寒而嘔則因於熱蓋寒格於中則拒熱於上而為吐是宜大用苦寒泄去陽熱略用辛通開其寒格則嘔自止故凡嘔家挾熱不利於香砂橘半者此方最為合度若因於水飲寒痰而嘔者則宜純用辛溫此方又非所宜黃連湯治傷寒胸中有熱胃中有邪腹中痛欲嘔吐者濕家下之丹田有熱胸中有寒舌上如胎亦主之黃連乾薑炙草桂枝各三兩人參二兩半夏半升棗十二枚水一斗煮取六升去滓溫服一升日三服夜二服黃連湯內用乾薑半夏人參甘草藏更入桂枝兼大棗寒熱平調上下匡證因上下相格治亦寒熱並施熱在胸中寒在胃腹痛嘔吐保安康胸中熱欲嘔吐腹中痛者全因胃中有邪阻遏陰陽升降之機故用參甘薑夏大棗專和胃氣使飲入胃中聽胃氣上下敷布交通陰陽再用桂枝宣發太陽之氣載引黃連但從上焦陽分泄熱不使其入太陰有礙虛寒腹痛濕家舌上如胎者下熱上寒亦此湯此亦柴胡之變劑從中升降和陰陽前上熱下寒為嘔吐腹痛用此湯以升降陰陽固然矣而濕家下之舌上如胎者以丹田有熱胸中有寒亦用此湯何耶蓋傷寒分表里中三治表裡之邪俱盛則從中而和之故有小柴胡之和法至於丹田胸中之邪則在上下而不在表裡即變柴胡為黃連湯以桂枝易柴胡以黃連易黃芩以乾薑易生薑亦從中而和之法故不問上熱下寒上寒下熱皆可治之也表裡之邪柴芩使上下之邪連桂當表裡之邪則用柴胡黃芩上下之邪則用桂枝黃連表裡之邪則用生薑辛以散之上下之邪則用乾薑辣以開之仲景大法灼然矣又與瀉心湯法似諸瀉心法皆治心胃之間寒熱不調全屬裡證此方以黃芩易桂枝去瀉心之名而曰黃連湯乃表邪尚有一分未盡胃中邪氣尚當外達故加桂枝一味以和表裡則意無不到矣後人比類好推詳比類二字最為醫家之要旨如瀉心湯黃連湯皆柴胡之變法而一味轉旋便治證各異故不知比類則不能盡方之變又烏能盡病情之變哉附進退黃連湯喻嘉言醫門法律治關格黃連薑汁炒乾薑炮人參人乳拌蒸半夏薑製各一錢半桂枝一錢大棗二枚如格則吐逆用進法本方七味皆不制水三茶盞煎減半溫服如關則不得小便用退法除去桂枝加肉桂五分黃連減半如上逐味制服但空心服崔氏八味丸三錢方見醫方證治彙編歌訣半飢時服煎劑耳如關而且格者照全方制服進退黃連湯喻氏擬下關上格均堪治薑連參夏錢五分桂枝一錢棗二枚此即仲景黃連湯喻嘉言旁通其旨而加進退之法擬治關格獨超千古蓋關格之證上下不通其營衛陰陽各造其偏矣是惟求之於中和其胃氣以調營衛不偏陰偏陽聽胃氣自為敷布以漸透於上下乃始得協於平也格則吐逆用進法本方七味皆不制如格則吐逆則進桂枝和衛通陽俾陽氣由中漸透於上藥以生用而升關不小便退桂枝桂枝但能通上焦胸中之陽而不能啓腎關之祕故退法中不用之黃連減半薑汁製人參乳拌乾薑炮如關則不得小便則退桂枝減黃連俾陽氣由中漸透於下藥以熟用而降還加肉桂通關祕肉桂通下焦腎中之陽故退法加之關而且格用全方制服法兼進退例如關而且格則用全方制服俾陰陽由中而漸透於上下藥以生熟並用而兼進退之法若夫五志厥陽升進退桂枝在所忌若五志厥陽之火亢而為格則桂枝又不可用用之則以火濟火頭有汗而陽脫矣五志陽升何藥宜宜將資液救焚湯使資液救焚湯編入炙甘草湯類至於崔氏八味丸編入腎氣丸類退法之中所有事少陰主闔而為胃關少陰之氣不上胃之關必不開則小溲亦從何而出耶故必以八味丸蒸動腎陽而通胃關以利小便是則退法之中有不得不用之理矣生升熟降為進退進退次第義若此從中漸透於上下聽其胃氣為敷布營氣先通加意營衛氣先通加意衛不以才通而變法斯治關格之要旨營氣者陰氣也陰氣不通則為關衛氣者陽氣也陽氣不通則為格陰陽之氣俱不相通則為關格與之短期此百難愈一之證故治此證者必有堅確不拔之志庶幾十愈一二若營氣才通即求之於衛衛氣才通即求之於營是謂喜功生事終無益也關格從來治法稀云岐略示其端倪嘉言因是費經營擬此二方非得已聊與時師作樣看變化生心無定體關格之證自靈素以及難經仲景脈法皆深言之然無其方也惟宋云岐子有治關格九方用腦麝者十居六七不達成方之理漫圖弋獲不足為法喻氏必不得已擬此二方為治關格之榜樣至於病變無方生心化裁初非以是印定後人眼目也須善會之附左金丸朱震亨丹溪心法治肝經火鬱吞吐酸水左脅作痛少腹筋急為疝黃連六兩薑汁炒吳萸一兩鹽水炒水泛丸或蒸餅糊丸附左金加陳米湯汪氏方治噤口痢湯藥入口即吐黃連薑汁炒三錢吳萸鹽水泡五分陳倉米一撮水煎濃服但得三匙下咽即不復吐矣附戊己丸太平惠民和劑局方治熱瀉熱痢黃連吳萸白芍各五兩為細末麵糊為丸桐子大每服二十丸濃煎米飲下空心日三服附連附六一湯虞摶醫學正傳治胃脘痛黃連六錢附子一錢水煎左金丸茱連六一湯肝經火鬱吐吞酸吐酸者嘔吐酸水也吞酸者喉間沃沃然酸味刺心也吐酸屬熱吞酸屬寒吞吐俱酸熱與寒格也少腹筋急左脅痛厥陰肝脈布脅肋抵少腹絡陰器肝邪鬱結故筋急而痛開其鬱結直清肝此瀉肝火之正劑肝之子心也實則瀉子故用黃連為君直折其上炎之勢吳萸從類相求引熱下行並以辛溫開其鬱結懲其捍格故以為佐然必木實而土不虛者始宜左金者木從左而制從金也此乃瀉心之變法此瀉心之變法川連與乾薑同用瀉胃家之痞結令熱從中散與吳萸同用則瀉肝家之痞結令熱從下達逍遙散越鞠丸好相參此方與逍遙散越鞠丸可出入加減用之大凡雜證多肝病雜證之中肝病十居六七圖治還宜隨證觀肝之治有數種水衰而木無以生地黃丸乙癸同源是也土衰而木無以植參苓白朮散緩肝培土是也本經血虛有火用逍遙散清火血虛無火用歸脾湯養營至於補火之法亦下同乎腎而瀉火之治則上類乎心總而言之肝之體陰而用陽是故養肝之體必借酸甘泄肝之用苦辛為要或加陳米和胃氣名左金加陳米湯噤口痢疾服之安噤口痢由濕熱積滯於腸胃清濁混淆陰陽格拒所致黃連清熱燥濕厚腸為治痢之聖藥吳萸衝開格拒而止嘔加陳米和中養胃此噤口痢之良治戊己丸中加芍藥但逢熱痢盡宜餐糞色黃臭為熱痢戊為胃土己為脾土加芍藥瀉木使不剋土連附六一湯治胃痛寒因熱用理一般瀉心用黃連乾薑左金用黃連吳萸此用黃連附子皆寒因熱用陰陽相濟最得制方之妙附香連丸李絳兵部手集方治下痢白赤膿血相雜裡急後重黃連二十兩與吳茱萸十兩同炒去吳茱萸用木香四兩八錢忌見火醋糊丸米飲下附治痢四神丸治一切痢疾初作腹痛裡急後重推陳致新大有奇效香連丸加酒蒸大黃一斤檳榔八兩醋丸米飲下三十丸未效再服附治噤口痢方吳昆醫方考香連丸加石蓮子肉八兩水煎服附斷下丸治久痢香連丸加訶子龍骨烏梅香連丸治赤白痢茱炒黃連又木香治痢必用苦辛寒李絳此方得其義劉完素素問玄機原病式謂泄痢皆由濕熱甚於腸胃氣液不得宣通必用苦辛寒之藥微加辛熱開發腸胃之鬱結使氣液宣通如此方之類是已黃連苦燥澀大腸初痢宜通勿輕試初痢宜通久痢宜澀黃連味苦而燥能厚胃澀腸若痢方初起忌用晉注此注尚宜更改上八字系王君原舊自注甚然甚然黃連厚腸胃之説本經有誤不可從初痢胃口濕熱盛可用痢久而中虛忌用矣益以檳榔與大黃名治痢四神丸推陳逐垢斯無忌黃連與大黃同用則不澀故初痢亦可用噤口痢方加石蓮清心開胃其功異噤口痢由熱邪壅塞胃口心火亢而上逆故湯藥入口即嘔石蓮子清心火開胃口久痢滑脫澀之宜斷下丸烏龍訶子使烏梅龍骨訶子澀大腸以固其滑脫小陷胸湯治小結胸病正在心下按之則痛脈浮滑者黃連一兩半夏半升栝蔞大者一枚水六升先煮栝蔞取三升去滓納諸藥煮取二升去滓分溫三服解下黃涎便安也小陷胸湯泄痰熱黃連半夏及栝蔞程應旄傷寒論後條辨曰黃連滌熱半夏導飲栝蔞潤燥合之以開結氣亦名曰陷胸者攻雖不峻而一皆直泄胸中之實則邪亦從此奪矣王晉三古方選注曰僅陷中焦脈絡之邪不及下焦故曰小痛在心下小結胸病上不至心上下不及少腹必按之方痛非手不可近與大陷胸證迥別脈浮滑浮滑為痰熱少陽痞熱亦能瘳王海藏以此方治少陽熱痞甚有道理蓋黃連半夏本為瀉心散痞之藥栝蔞生於蔓草能入絡滌熱消痰痰消結散痞熱自清厚朴生薑甘草半夏人參湯治汗後腹脹滿厚朴炙生薑各八兩切半夏半升洗甘草二兩炙人參一兩水一斗煮取三升去滓溫服一升日三服朴薑夏草人參湯理氣調中補泄勷汗後虛邪為腹脹補虛泄滿此方良發汗後則邪氣已去而猶腹脹滿乃虛邪入腹故以厚朴生薑消脹滿余則補虛助胃和中也旋覆代赭湯治傷寒汗吐下解後心下痞硬噫氣不除者旋覆花三兩代赭石一兩生薑五兩切大棗十二枚人參二兩半夏半升甘草三兩炙水一斗煮六升去滓再煎取三升溫分日三服旋覆代赭湯人參半夏薑甘大棗臨重以鎮逆代赭石咸軟痞旋覆花痞硬噫氣力能禁靈樞口問篇曰寒氣客於胃厥逆從下上散復出於胃故為噫素問宣明五氣篇曰心為噫噫者上焦病聲也脾失升度肺失降度陰盛走於胃屬於心而為聲俗名噯氣故用旋覆咸降肺氣代赭重鎮心包絡之氣半夏以通胃氣生薑大棗以宣脾氣而以人參甘草奠安陽明俾陰陽升降合其常度則痞硬噯氣悉除矣噫氣俗名為噯氣若兼下利瀉心尋此與前諸瀉心法大略相近汪訒庵醫方集解引本草綱目云病解後痞硬噫氣不下利者用此湯下利者生薑瀉心湯鎮陰宣陽扶胃弱厄逆反胃並宜斟此鎮陰宣陽方也厄逆反胃皆上中二焦氣逆不降所致用此鎮其陰氣宣發胃陽則上中二焦皆得致和矣黃芩湯類黃芩湯治太陽與少陽合病自下利者黃芩三兩甘草炙芍藥各二兩大棗十二枚水一斗煮取三升去滓溫服一升日二服夜一服黃芩加半夏生薑湯治前證兼嘔者亦治膽咳咳嘔苦水如膽汁黃芩湯原方加半夏半升生薑三兩余同法黃芩湯用甘芍並二陽合利棗加烹按太少二陽合病何以不用太少兩經之藥蓋合病而兼下利是熱邪已入少陽之裡膽熱移脾故自下利則所重在裡矣故用黃芩酸苦泄少陽之熱甘芍大棗酸甘和太陰之氣使半里清而半表自解和解之法非一端也合病者謂有太陽之證頭項痛腰脊強又有少陽之證耳聾脅痛口苦寒熱往來也自利者不因攻下而泄瀉也成無己注解傷寒論曰太陽陽明合病自下利為在表當與葛根湯發汗陽明少陽合病自下利為在裡可與承氣湯下之此太陽少陽合病自下利為在半表半裡非汗下所宜故與黃芩湯以和解半表半裡之邪此方遂為治痢祖利泄瀉也痢滯下也後人加味或更名劉完素黃芩芍藥湯芍藥湯皆從此方化出遂為萬世治痢之祖方矣再加生薑與半夏名黃芩加半夏生薑湯下利兼嘔此能平下利即專於治利不雜以風寒表藥此亦急當救里之義若嘔亦即兼以止嘔之藥見證施治古人每不出此倘服藥後而本證愈續見他證則仍見證施治可推而知也亦治膽咳嘔苦汁胃氣逆則嘔膽汁熱則苦苦泄辛通法最精酸苦泄熱辛甘和胃胃氣和膽熱清咳而嘔苦自已附黃芩芍藥湯劉完素素問病機氣宜保命集治熱痢腹痛後重身熱膿血稠黏及鼻衄不止脈洪數者黃芩芍藥各一兩甘草五錢水煎溫服附白朮芍藥湯劉完素素問病機氣宜保命集治脾濕水瀉身重困弱芍藥白朮各一兩甘草五錢水煎溫服黃芩芍藥湯療熱痢火升鼻衄均能治熱痢鼻衄陽明火盛極矣黃芩色黃正清陽明腸胃之藥白芍專益陰氣赤芍兼和營血故熱痢後重宜用赤芍為良瀉痢腹痛屬太陰芍藥此是白芍甘草所必使若將白朮易黃芩名白朮芍藥湯脾濕水瀉身重餌劉完素素問病機氣宜保命集曰諸瀉痢久不止或暴下者皆太陰為病故不可離於芍藥若不受濕不能下痢故須用白朮又曰若四時下痢於芍藥白朮內春加防風夏加黃芩秋加厚朴冬加桂附附芍藥湯劉完素素問病機氣宜保命集治下痢膿血稠黏腹痛後重芍藥一兩歸尾黃芩黃連各五錢大黃三錢木香檳榔甘草炙各二錢桂一錢半每服五錢水煎服如血痢則漸加大黃附導滯湯劉完素方治前證兼渴者芍藥湯去桂甘草加枳殼芍藥湯中芍藥君重用芍藥為君瀉木安土香連芩草桂將軍大黃號曰將軍檳榔行氣歸行血滯下痢疾古稱滯下之方迥出群此治痢之專劑蓋本仲景黃芩湯而加行血調氣之藥後世治痢之方多從此昉也濕熱鬱蒸成膿血腹痛後重服之欣下痢皆屬濕熱赤為傷血白為傷氣膿血稠黏氣血兩傷也腹痛後重氣血皆滯也朱丹溪平治會萃曰行血則膿血自愈調氣則後重自除若兼渴者除甘桂枳殼加之導滯湯稱因渴故去桂因有滯故去甘草之滿中而加枳殼以破滯蓋濕熱鬱積腸胃不得宣通因成滯下故濕宜燥熱宜清郁宜散積宜消自當苦辛寒雜用稍佐溫而行之甘以和之治痢之法盡之矣痢久依然後重者去檳連枳入荷升此方今人多用之大法治痢以甘芍和中止腹痛熱痛加芩連寒痛加薑桂以木香檳榔行氣除後重氣分加枳殼滑石寬腸血分加當歸桃仁和血以秦艽皂角子祛腸風以黃芩黃連清熱毒以白朮陳皮調胃茯苓澤瀉滲濕大黃蕩積若氣虛加參耆血虛加芎歸阿膠黑薑柏葉痢久後重不解去檳榔黃連枳殼加荷葉升麻舉之附東風散薑體乾方治一切痢疾或赤或白或赤白相兼以及裡急後重腹痛噤口等證咸宜服之黃芩白芍當歸檳榔枳殼青皮炒厚朴炒各一錢木香煨五分甘草三分查炭一錢半水煎服加減法即編入歌中東風散東風和暢主生長萬物此劑和平而卻有起死回生之效故取以名方用芍甘青木枳檳查歸朴芩此即芍藥湯之變法此劑能醫一切痢痢剛初起急煎斟老年寒藥當煨制延久脾虛加朮參此方一切痢疾初起者服之立效惟老年衰弱者寒藥當用煨制如延久脾虛者亦然更宜加入人參白朮以補脾氣腹痛黃芩須酒炒柴胡又在瘧兼侵瘧痢並見加柴胡六分痢而熱甚黃連入痢而發熱甚者加黃連薑汁炒四分肢冷虛煩肉桂臨虛煩手足冷者加肉桂四分白痢橘紅香附使白痢加橘紅七分香附生研一錢若然紅痢地榆任澀滯還加桃紅引紅痢加地榆炭八分若紅痢澀滯者加桃仁一錢紅花酒洗三分赤白相兼兩法紝赤白兼見者如地榆香附等宜並用之純血膠薑連側柏下痢純血加阿膠以黃連末拌炒一錢炮薑三分側柏炒一錢舌黃後重大黃擒舌胎黃厚裡急後重者加酒炒大黃三錢假如孕婦投斯劑檳朴桃紅桂共禁如孕婦痢疾用此方宜去桃仁紅花檳榔厚朴肉桂以及半夏神麯等礙胎藥痢疾多由於濕熱誤投溫補禍延深痢疾之證惟夏末秋初最多多由於夏暑濕熱伏於腸胃蒸腐水穀之精氣而化為膿血治之必以苦辛寒藥此河間之要訣若初起誤投溫補致濕熱膠固不解必受其害延至月餘形體骨立不思飲食則難挽救此為薑氏傳心祕加減圓通仔細吟此方見香山吳濟亨家藏抄本中其徒張鏡如雲是華墅薑體乾先生所著未知果否然薑氏賢聲素著為常州府屬之名醫生平著述頗多惜未梓行於世附治痢奇方葉應昌袖中金治噤口下痢純血穢腐身熱脈大大孔如竹筒諸般惡證並可主之但恐服之已遲毒邪攻壞臟腑則難救耳黃連酒炒六分赤芍藥酒炒一錢木香煨三分青皮醋炒枳殼麩炒檳榔各八分山楂肉炒一錢半黃芩酒炒一錢地榆醋炒五分紅花酒洗三分桃仁去皮尖炒研一錢當歸酒洗五分厚朴薑汁炒八分甘草炙五分水煎服如痢初起在十日內外者諸藥俱不必制如半月以後者宜去檳榔加陳皮鹽水炒四分諸藥照方逐味制服如延至月餘脾胃虛弱者去楂肉青皮檳榔加人參五分白朮土炒五分如白痢去桃仁地榆加陳皮四分木香加三分治痢奇方出葉氏東風散里加紅花桃仁黃連地榆炭此方即東風散加味青出於藍尤足誇葉應昌即薑體干之門人著有袖中金下痢純紅兼噤口十天內外用無差方中若去桃紅地加木香陳白痢嘉或益大黃因澀滯澀滯後重必加大黃逐除腐穢以攻邪期逾半月宜加減炒法頻將酒醋拿酒以和之醋以斂之大熱脈洪雖忌款下痢身涼脈小為順易治若大熱脈洪大孔如竹筒為逆難治但投此劑莫驚訝此方治痢雖見諸般惡證若早治之亦能挽救惟經溫補難為效雖有奇方亦可嗟葉氏自云此方隨用輒效間不效者必其初投參術等補劑太早補塞邪熱在內久而正氣已虛邪氣獨盛纏綿不已欲補而澀之則助邪欲清而疏之則愈滑遂至於不可救藥雖有奇方亦無如之何矣此非溫補害之耶用者審之五苓散類五苓散治太陽病發汗後汗出惡寒脈浮小便不利微熱消渴及中風發熱六七日不解而煩有表裡證渴欲飲水水入即吐名曰水逆宜此主之通治水腫霍亂身疼胸中滿臍下悸吐涎頭眩等證此利水之祖方也豬苓茯苓白朮各十八銖澤瀉一兩六銖桂五錢為末以白飲和服方寸匕日三服多飲暖水汗出愈除桂名為四苓散附辰砂五苓散汪訒庵醫方集解治暑熱五苓散加硃砂附蒼朮五苓散治寒濕五苓散加蒼朮茵陳五苓散治黃疸五苓散加茵陳蒿附春澤湯汪訒庵醫方集解治無病而渴與病瘥後渴者五苓散加人參再加甘草亦名春澤湯五苓散治太陽腑王好古此事難知曰五苓散為下藥乃太陽里之下藥也太陽高則汗而發之下則引而竭之渴者邪入太陽本也當下之使從膀胱出腎燥膀胱熱小便不利五苓散主之小便利者不宜用桂術澤瀉豬茯苓多飲暖水取微汗雙解表裡煩渴清二苓澤瀉為利水之主藥用白朮者培土以制水也加桂枝者因表未全解也服後多飲暖水取其氣散營衛令得似汗而表裡雙解矣小便不利而渴飲飲蓄胸中水氣停胃中乾燥而渴飲此無水也與水則愈宜白虎湯小便不利而渴飲此蓄水也利水則愈宜五苓散水入即吐名水逆胸中有水則不能容水故水入則吐水入即吐名曰水逆宜五苓散食入即吐名曰寒格宜乾薑黃連黃芩人參湯二條合看益分明按五苓證一則曰傷寒脈浮小便不利微熱消渴一則曰中風發熱而煩渴欲飲水水入即吐二條合看益知五苓為利水而設非治煩渴也故用五苓散通水道不然煩渴豈堪烹水氣蒸騰為煩為渴與五苓以利水水去則煩渴自除此治病必求其本也若煩渴非因水氣者豈五苓所可治哉身疼霍亂分寒熱表裡陰陽辨別行霍亂身疼須分寒熱二證若熱多欲飲水者宜五苓散和太陽之表裡若寒多不用水者宜理中丸理中臟之陰陽若以桂枝更肉桂此本一方二法治傷寒用桂枝治雜病用肉桂乃有表無表之分吐涎眩悸水邪聽臍下悸吐涎沫水氣自下而上逆頭眩者精氣不布於上也惟利其水則眩悸吐涎悉愈水邪內著誠能卻外溢肌膚腫亦靈此方治內著之水誠為合度即里水外滲於肌肉而為腫滿者亦靈除桂名為四苓散無寒但渴服之寧周揚俊曰但小便不利而渴只用四苓足矣蓋外無惡寒發熱身痛之表證則不必用桂枝內無眩悸吐涎之裡證則不必用肉桂辰砂清熱蒼除濕黃疸茵陳不改名五苓散加辰砂清熱名辰砂五苓散加蒼朮勝濕名蒼朮五苓散加茵陳治疸名茵陳五苓散皆仍五苓之名春澤湯加參名便易病前病後渴能平五苓散加人參名春澤湯取古詩春水滿泗澤意明言此湯治胸中有蓄水之渴也一因無病而津氣先虛一因病後而津氣未復故加參以生津益氣五苓散利水之專劑作散方能布水精五苓為利水之專劑作散服者取其停留胸中緩循經絡以輸脾歸肺下達膀胱水精四布五經並行則水得盡去而津液不傷此仲景之微意也寧靜水邪從下竭小青龍治動而上逆之水故汗而散之五苓散治靜而不行之水故引而竭之變湯鮮效古來評徐靈胎蘭臺軌範曰此乃散方近人用以作湯往往鮮效終當從古法為是用者審之豬苓湯治陽明病脈浮發熱渴欲飲水小便不利者並治少陰病下利六七日咳而嘔渴心煩不得眠者豬苓去皮茯苓澤瀉滑石研阿膠各一兩水四升先煮四味取二升去滓納膠煬化溫服七合日三服豬苓湯內二苓全澤瀉阿膠滑石研利水育陰兼瀉熱此即五苓散去桂術加阿膠育陰滑石瀉熱以治陽明少陰二經之水熱寓育陰於利水之中為利小便之潤劑與五苓散利水雖同寒溫迥別惟明者知之溺祕心煩嘔渴痊心煩為熱小便不利屬濕濕熱鬱蒸則嘔而口渴汗多胃燥非宜用恐令亡津大便堅傷寒論陽明篇云汗多胃燥者不可與豬苓湯恐亡津液令大便硬也然則大便硬者豬苓湯更不可與明矣茯苓甘草湯治傷寒汗出厥而心下悸口不渴者茯苓桂枝各二兩甘草炙一兩生薑三兩水四升煮取二升分溫服茯苓甘草湯桂生薑泄水茯苓生薑扶陽桂枝甘草厥悸嘗水停心下則悸陽氣不布於四末則厥先治水而後治厥不然下利卻須防傷寒論厥陰篇曰傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也汗出厥悸口不渴亡陽輕證此能匡旭高按此方傷寒論一治厥悸一治汗出不渴諸家不知兩相綰照故注之多不得其理若能互文以會意則此方之義瞭然矣蓋汗出而厥為陽氣外亡悸而不渴為水氣停中猶幸脈不細微身不振惕此水氣亡陽之輕者也故用茯苓生薑散水氣桂枝甘草以扶陽若稍重者當與苓桂朮甘湯尤重者當與真武湯何以知之以三方同用茯苓知之蓋汗大泄必引腎水上泛非茯苓不能制之故亡陽之證必多汗若陽未全亡則用桂枝甘草以斂汗若陽已外亡必用附子以回陽而茯苓則為主藥此方與苓桂術甘及真武湯皆治水氣亡陽之證而分淺深次第以為治也嗟乎使非統會全經安能窺仲景之堂奧哉茯苓桂枝甘草大棗湯治傷寒發汗後其人臍下悸欲作奔豚者茯苓半斤桂枝四兩甘草二兩炙大棗十二枚以甘瀾水一斗先煮茯苓減二升納諸藥煮取三升溫服一升日三服苓桂甘草大棗湯草棗培土苓制水還加桂枝保心陽茯苓重用法先煮凡方中重用之藥法必先煮腎氣奔豚宜泄制王晉三古方選注云腎氣奔豚治宜泄之制之茯苓桂枝通陽滲泄保心氣以御水凌甘草大棗補脾土以制水泛則奔豚臍悸之勢緩是方即茯苓甘草湯惡生薑性升而去之其義深且切矣水邪臍悸力能攘按心下悸是水已凌心故茯苓甘草湯用生薑散心胸間水氣此臍下悸是水方上逆猶未至於凌心故去生薑之升散而加大棗之緩中以制其上逆之勢也凡水邪作悸茯苓為必用之藥人皆知之而仲景二方皆佐以桂枝者何也蓋下焦腎水必挾肝邪而後能上逆惟桂能伐木而又可以扶陽散寒故亦必用之也余友陸覲揚云治心下悸宜用桂枝臍下悸宜用肉桂其説甚是姑志之苓桂朮甘湯治心下有痰飲胸脅支滿目眩及傷寒吐下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓四兩桂枝白朮各三兩甘草二兩炙水六升煮取三升分溫三服苓桂術甘湯蠲飲劑崇脾以利膀胱氣膀胱氣鈍則水蓄脾不行津液則飲聚白朮甘草崇脾土以運津液茯苓桂枝利膀胱以布氣化則痰飲悉蠲矣飲邪上逆氣衝胸胸脅支滿眩暈既胸脅支滿頭目眩暈是痰飲之的證病痰飲者藥當溫病痰飲者當以溫藥和之此治痰飲要訣水飲旋從小便去金匱痰飲篇云夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之尤在涇金匱要略心典曰氣為飲抑則短欲引其氣必蠲其飲飲水類也治水必自小便去之趙以德金匱玉函經二注曰苓桂朮甘湯主飲在陽呼氣之短腎氣丸主飲在陰吸氣之短蓋呼者出心肺吸者出腎肝茯苓入手太陰桂枝入手少陰皆輕清之劑治其陽也地黃入足少陰出萸入足厥陰皆重濁之劑治其陰也一證二方豈無故哉誤汗動經身振搖陽虛輕者斯能御誤汗動經身振振搖此亦陽虛而挾水飲之證即真武證之輕者故此法亦仿真武之意附桂苓甘露飲劉完素宣明論方治中暑受濕引飲過多頭痛煩渴濕熱小便祕茯苓澤瀉各一兩豬苓白朮肉桂各五錢滑石四兩甘草石膏寒水石各二兩為末每服三錢溫酒下生薑湯尤良附桂苓甘露飲張子和儒門事親治伏暑煩渴渴欲飲水水入則吐脈虛者即河間方中去豬苓減三石一半加人參五錢乾葛一兩藿香五錢木香一分河間桂苓甘露飲五苓散加三石甘此即五苓散加滑石石膏寒水石甘草中暑煩渴小便祕清熱利濕所宜諳王晉三古方選注曰消暑在於消濕去熱故用五苓去濕三石解熱濕熱既去一若新秋甘露降而暑氣潛消矣三石減半豬苓去加參葛藿木香參此是子和桂苓甘露飲脈虛水逆水入則吐名曰水逆服之堪霍亂轉筋煩渴者益虛去濁用無慚程扶生曰吐瀉亡津煩渴法宜補脾胃生津液升清降濁分消濕熱此方最為合度喻嘉言醫門法律曰河間之桂苓甘露飲用五苓三石意在生津液以益胃之虛子和之桂苓甘露飲用人參葛根甘草藿香木香益虛之中又兼去濁附六一散劉完素傷寒標本心法類萃治暑邪表裡俱熱煩躁口渴小便不通砂淋石淋吐瀉瘧痢又能下乳滑胎解酒食毒滑石六兩甘草一兩為末每服三錢新汲水調下汪訒庵醫方集解加辰砂名益元散附清六散朱震亨丹溪心法治赤痢即六一散一料加紅曲五錢一云二兩半附溫六散吳昆醫方考治白痢即六一散一料加乾薑五錢附三生益元散吳昆醫方考治血淋即益元散三錢加生扁柏葉生車前生藕節汁各一杯調服六一散滑石同甘草取天一生水地六成之之義故名六一又名天水散解肌行水兼清燥統治表裡及三焦熱渴暑煩瀉痢保滑石氣輕能解肌質重能清降寒能勝熱滑能通竅淡能行水使肺氣降而下通膀胱故能祛暑止瀉解煩除渴而利小便加甘草者和其中氣又以緩滑石之寒滑也下乳通淋能滑胎皆取滑可去著之義津虧無熱非宜討河間此方統治表裡上下三焦濕熱然惟體盛濕多之人宜服之以解暑利水使濕熱從小便出若無濕熱之人而多服此則反耗其津液而渴轉甚又當服生脈散加辰砂號益元散滲泄而不損元氣故曰益元清心消暑尤為好辰砂清鎮心神則暑熱易卻紅曲清六散赤痢靈赤屬熱傷血分紅曲能調六腑之血乾薑溫六散白痢寶白屬熱傷氣分乾薑能散濕熱之氣三生益元散治血淋側柏車前藕節搗加入三味俱用鮮者佳搗汁調服有涼血止血通淋之功附大橘皮湯劉完素宣明論方治濕熱小便不利大便泄瀉及水腫等證滑石六兩甘草二錢赤苓一兩豬苓澤瀉白朮肉桂各五分陳皮一兩木香一分檳榔三錢加薑煎每服五錢大橘皮湯治濕熱五苓散六一散二方綴陳皮木香檳榔增能消水腫及瀉泄小水併入大腸致小便不利而大便泄瀉五苓散六一散二方皆行水瀉熱之藥加檳榔峻下陳皮木香理氣以利小便而實大便也水腫亦濕熱為病故皆治之理中湯類理中湯治太陰病自利不渴寒多而嘔腹痛脈沉而細以及中寒霍亂胃中寒飲喜唾涎沫並宜服之人參甘草炙白朮乾薑各三兩水八升煮取三升去滓溫服一升日三服加附子一枚名附子理中湯治證同上而手足厥冷者宜之理中湯主理中鄉理中者理中焦之氣以交於陰陽也甘草人參術乾薑人參甘草甘以和陰白朮乾薑辛以和陽辛甘相輔以處中則陰陽自然和順矣此溫補中焦之主方也嘔利腹痛脈沉細口無燥渴此為良以上皆中宮虛寒之證自利不渴者為寒若渴者為熱手足厥冷陰寒甚或加附子總扶陽手足厥冷陽氣虛而陰寒極矣故加附子以扶陽氣桂枝人參湯治太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者理中湯原方加桂枝四兩甘草加一兩以水九升先煮四味取五升納桂枝更煮取三升去滓溫服一升日二夜一服桂枝人參湯甘術薑太陽協熱利煎嘗必因數下傷中氣里已虛寒用此方此必因數下之後而傷中氣外雖協熱而里已虛寒故仍用溫補利不止而心下硬脈來微弱始相當下利不止脈微細弱中宮之陽氣虛矣雖心下痞硬亦屬虛痞先煎四味後煎桂溫補之中解表勷先煮四味後納桂枝欲其於溫補藥中越出於表以散餘邪此太陽太陰同治之方與桂枝加芍藥湯相表裡同治太陽誤下邪陷入於太陰之證亦觀其表證里證之孰多孰少故治各有別桂枝附子湯治傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而澀者桂枝四兩附子三枚甘草二兩生薑三兩大棗十二枚水六升煮取二升去滓分溫三服此即桂枝去芍藥加附子湯但彼桂枝用三兩附子用一枚以治下後脈促胸滿惡寒之證此桂枝加一兩附子加二枚以治風濕身疼脈浮澀之證彼編入桂枝湯類此入於理中湯類各有其理也一方而治病迥殊分兩之不可忽如此朮附湯治證同前而大便硬小便自利者宜此桂枝附子湯去桂枝加白朮四兩煎服法同初服其人身如痹半日許服三服盡其人如冒狀勿怪以朮附並走皮中逐水氣未得除故使然耳虛家及産婦宜減服之甘草附子湯治風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草炙白朮各二兩桂枝四兩附子二枚炮以水六升煮取三升去滓溫服一升日三服取微汗桂枝附子湯甘草薑棗煎之風濕嘗身重難於自轉側濕邪重著脈虛不渴內外之陽俱虛始相當風濕外持衛陽不振用此振陽氣而敵陰邪大便硬而小便利去桂加朮朮附湯桂枝通太陽之氣化白朮生腸胃之津液大便硬是腸胃之津液乾枯故加白朮小便利則太陽之氣化自利故去桂枝若除薑棗留桂術甘草附子湯名彰骨節煩疼濕滯關節並短氣濕滯於中惡風汗出風淫於表服之良風勝於濕桂附治濕勝於風朮附匡風濕俱勝宜甘附總之三法盡通陽王晉三古方選注謂桂枝附子湯治風勝於濕白朮附子湯治濕勝於風甘草附子湯治風濕俱勝雖非仲景心法然其説頗通姑志之甘薑苓朮湯一名腎著湯治腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病在下焦此身勞汗出衣里冷濕久久得之腰以下冷痛腹重如帶五千錢此湯主之並治胞痹少腹膀胱按之內痛若沃以湯澀於小便上為清涕甘草白朮炒各二兩乾薑炮茯苓各四兩水五升煮取三升分溫三服腰中即溫腎著甘薑苓朮湯濕傷脾腎此為良腰中冷痛食如故足見非關精氣傷身重腹重俱濕甚甘溫淡滲已能匡喻嘉言醫門法律曰腰冷如坐水中非腎之精氣冷也故飲食如故便利不渴且與腸胃之腑無涉況腎臟乎故但用甘溫通陽淡滲行水之藥足矣按腰為腎腑冷濕之邪著而不移是著痹也甘薑苓術暖土勝濕所以制水也宣明完素用治胞痹證少腹膀胱若沃湯小便不利鼻流涕通陽行水義當量按風寒濕邪客於胞中則太陽膀胱之氣不能化故水道不通按之若沃以湯形容小水脹極之情切著矣其上為清涕者足太陽經上絡額腦太陽經氣不得下行而但上入於腦流出於鼻故為清涕宣明論方用此湯治之固取其通陽行水究不若五苓散徹上徹下表裡兼施之為當也用者審之甘草乾薑湯治肺冷唾涎沫而不渴必遺尿小便數宜以此溫之並能回中焦之陽氣甘草四兩炙乾薑二兩炮水三升煮取一升半去滓分溫再服甘草乾薑湯溫肺氣唾涎唾涎沫者必有寒飲溲數氣化失令且遺尿膀胱不藏口無燥渴知非熱邪方宜服水冷金寒此劑司此方之治肺痿乃肺中有水飲寒邪者若火灼金傷之肺痿與此相反不可誤施陽氣溫和津自化陰自陽生津由氣化若陽氣不布陰津亦不得上供此乃溫陽氣以回津之法非真能救肺液枯痿也亡陽輕證亦堪施乾薑苦辛守而不走故君以甘草使辛從甘化則能守中復陽此得理中之半方是回中焦陽氣之輕劑吳茱萸湯治陽明胃寒食谷欲嘔及少陰吐利手足逆煩躁欲死者又厥陰乾嘔吐涎沫而頭痛者並主之吳茱萸一升洗人參三兩生薑六兩大棗十二枚水七升煮取二升去滓溫服七合日三服加附子一枚名吳茱萸加附子湯治寒疝腰痛牽引睪丸脈沉遲者吳茱萸湯人參棗重用生薑溫胃好吳萸生薑溫胃散寒人參大棗緩脾益氣亦中焦之治法食谷欲嘔必食而嘔受病在納穀之處吐涎沫胃中有寒飲厥利煩躁皆能保吐利而手足厥冷煩躁欲死少陰之陽並露矣吳茱萸為厥陰之主藥上可溫胃寒下可救腎陽故能統治以上諸證又吳萸加附子湯寒疝脈沉所宜搗疝為肝病故用吳萸以直溫肝經加附子以散寒溫腎附子粳米湯治腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子一枚炮甘草一兩大棗十枚半夏粳米各半升以水八升煮米熟湯成去滓溫服一升分三服附子粳米湯半甘棗益胃通陽溫腎好此益胃通陽溫腎之劑半夏甘草粳米大棗皆脾胃藥加入附子一味通徹上下上可散寒止嘔下可溫經定痛雷鳴切痛四字著眼腹中寒胸脅逆滿嘔能保腎虛寒動於中胃陽為寒凝窒故下為雷鳴切痛上為逆滿嘔吐大建中湯治心胸中大寒痛嘔不能飲食腹中滿上衝皮起出見有頭足上下痛而不可觸近者蜀椒二合炒去汗乾薑四兩人參二兩水四升煮取二升去滓納膠飴一升微火煎取一升半分溫兩服如一炊頃可飲粥二升溫覆之大建中湯建中陽大建中臟之陽以勝上逆之陰蜀椒乾薑溫中散寒參飴糖建立中氣心胸大寒痛嘔吐不能飲食腹滿膨陰寒氣盛中土無權上衝皮起有頭足陰凝成象痛不可近此能攘前附子粳米證尚未至於不能食胃氣未傷故只用甘棗粳米和胃氣半夏附子止嘔痛此證痛嘔而至於不能食脾胃大虛故用人參飴糖建立中氣蜀椒乾薑溫中散寒其證大段相同而此重於彼耳附吳茱萸湯聖濟總録治濁氣在上則生䐜脹吳茱萸洗炒官桂厚朴薑汁製乾薑炮各二兩蜀椒炒去汗陳皮去白白朮各五錢為末每服三錢水一大盞生薑三片同煎至八分空心去滓溫服聖濟吳萸湯術朴椒薑陳桂七般藥濁氣在上生䐜脹是亦陰陽之反作素問陰陽應象大論云寒氣生濁濁氣在上則生䐜脹是亦陰陽反作也宣布五陽驅濁陰濁降胃和脹自卻此溫散降濁之法吳萸入肝官桂入心乾薑入脾橘紅入肺蜀椒入腎皆氣厚性輕芳香開發之品用以宣布五陽驅散濁陰更以白朮厚朴溫中和胃濁降胃和䐜脹立已真有捷於影響之妙附連理湯汪訒庵醫方集解治傷暑瀉而作渴理中湯原方加黃連茯苓原注云外感盛暑內傷生冷者非此不可連理湯方即理中湯黃連更與茯苓充外傷盛暑內生冷瀉而作渴可為功理中湯治中氣虛寒之方也太陰病自利不渴為臟有寒固宜以此溫之若渴則為有熱矣乃連理湯但加黃連茯苓二味以治傷暑瀉而作渴觀原注云外感盛暑內傷生冷非此不可可知其義仍責重於中臟有寒故得用理中為主加黃連所以清暑茯苓所以滲濕殊非因渴而加也然則凡病渴者皆當作熱治而瀉而作渴者半屬亡津仍當主以甘溫生津止渴與夫本濕標熱雖渴而不欲飲者治宜苦辛雜用寒熱兼施均不得專恃苦寒也審矣且黃連性大寒而味極苦苦屬火而寒屬水以治水火相亂濕熱為病之渴則可若燥火之渴而過服黃連則火從苦發恐反益其燥矣故神農本草但云黃連主腸澼腹痛自利並未言及能止渴也或謂黃連因渴而加淺矣淺矣故余辨論若此附枳實理中丸太平惠民和劑局方治寒實結胸胸膈高起手不可近者理中湯原方加枳實麩炒一兩茯苓二兩水泛丸枳實理中丸茯苓參甘薑朮互調停寒痰凝結胸中痛破結通陽此法靈按寒實結胸無熱證者仲景用三物白散以溫下之惟體實者相宜若體虛者當先理氣此丸深中肯綮然觀是方補中散寒滌痰蠲飲具備以治脾胃虛寒痰飲並結於胸胸膈滿痛者必獲效驗用者知之附治中湯李東垣治憂思鬱結脾虛氣滯胸腹痞滿兼食積者理中湯加青皮陳皮各一兩更加厚朴名溫胃湯治同治中湯制自東垣鬱結能舒痞滿寬大法理中湯作主青陳破滯帶疏肝鬱結傷中則木來乘土胸中痞滿不思飲食是肝實脾虛也故用理中湯補土和中加青皮陳皮以破滯而平肝氣憂思氣結脾虛脹厚朴加之溫胃安厚朴溫胃氣消脹滿附理陰煎張介賓新方八陳治真陰不足脾腎虛寒等證若素多勞倦之人忽感寒邪不能解散用此溫托最良婦人經遲腹痛並效熟地三五七錢或一二兩當歸二三錢或五七錢乾薑炒黃色一二三錢炙甘草一二錢或加桂肉一二錢水二鍾煎七八分熱服若勞倦感寒可加麻黃甚則加細辛附子經遲腹痛加肉桂玄胡索若但加附子名附子理陰煎治命門火衰附六味回陽飲張介賓新方八陳治陰陽將脫垂危諸證人參一二兩或數錢製附子二三錢炮薑二三錢炙草一錢熟地五錢或一兩當歸身三錢如泄瀉者或血動者以冬朮易之多多益善水二鍾武火煎七八分溫服理陰煎歸草乾薑地此是理中之變義脾腎中虛陰又虧忌投剛燥宜斯治景嶽自云此理中之變方也凡脾腎中虛等證宜剛燥者當用理中六君之類宜溫潤者當用理陰大營之類欲知調補當先察此勞倦傷寒溫托良散邪加入麻辛使凡勞倦感寒邪不能散發熱身疼頭痛背心肢體畏寒但脈數無力或雖口渴亦是假熱之證若用寒涼攻之必死宜速用此方以溫補陰分托散表邪連進數劑使陰氣漸充則汗從陰達而寒邪不攻自散其效甚佳若寒凝陰勝而邪有難解者必加麻黃若在嚴寒之令更加細辛或再加附子此寒邪初感溫散第一方也但仲景溫散首重麻黃桂枝景嶽溫散即以理陰煎及大溫中飲為增減此雖一從陽分一從陰分其迹若異然一逐於外一托於內而用溫則一也當因所宜而酌用之經遲腹痛嘔因寒或益延胡肉桂餌延胡肉桂散營分之寒通月事止腹痛陰陽將脫證垂危六味回陽飲參附致人參附子以回陽氣四逆湯類四逆湯治少陰病下利清穀裡寒外熱手足厥冷汗出而厥及膈上有寒飲乾嘔者又治太陽發熱頭痛脈沉雖身疼痛當救其里又太陽病發汗後大汗出熱不去內拘急四肢疼下利厥逆而惡寒者均宜以此主之甘草二兩炙乾薑一兩半附子一枚生切水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩通脈四逆湯治證同上而脈微欲絶者宜此四逆湯原方乾薑用三兩加蔥九莖通脈四逆加豬膽汁湯治陰盛格陽手足厥冷脈微欲絶面赤咽疼煩躁者宜此通脈四逆湯加豬膽汁半合諸藥煎成去滓納膽汁和服四逆加人參湯治惡寒脈微而復利利止亡血也四逆湯原方加人參一兩茯苓四逆湯治發汗若下之病仍不解煩躁者四逆加人參湯內更加茯苓四兩四逆湯中薑附草四肢逆冷急煎嘗按方名四逆必以之治厥逆傷寒論厥陰篇云厥者陰陽氣不相順接手足逆冷是也臟寒吐利脈沉細上吐下利而脈沉細口不渴以其臟有寒故也溫之無疑飲邪乾嘔亦相當寒飲無實物溫之則寒散而飲去嘔止凡治飲皆用溫法身疼清穀先溫里凡病皆當先表后里惟下利清穀則以扶陽為急而表證為緩雖身疼痛亦當先救其里俟清穀止而身疼未除者仍從表治可也不論三陰與太陽王晉三古方選注曰四逆湯凡三陰一陽證中有厥者皆用之故少陰用以救元海之陽太陰用以溫臟中之寒厥陰薄厥陽欲立亡非此不救至於太陽誤汗亡陽亦用之者以太少為水火之主非交通中土之氣不能內復真陽故以生附子生乾薑徹上徹下開闢群陰迎陽歸舍交接於十二經反復以炙草監之者亡陽不至於大汗則陽未必盡亡故可緩制留中而為外召陽氣之良法表熱裡寒多汗出更兼煩躁厥須防多汗煩躁陽氣外亡最有厥脫之慮厥而脈絶加蔥白名通脈四逆湯蔥入營通脈面赤咽疼豬膽勷名通脈四逆加豬膽汁湯豬膽汁苦滑之極能引陽藥直達下焦所謂熱因寒用也亦有加入人參者名四逆加人參湯亡陽脫血此為良此亡陽而更脫血故加人參以生津益血更益茯苓療腎躁腎躁即陰躁也必引腎水上泛故加茯苓鎮之茯苓四逆湯名彰此即真武湯之變方重用茯苓鎮泄腎水白通湯治少陰病下利脈微惡寒蜷臥蔥白四莖乾薑一兩附子生切一枚水三升煮取一升去滓分溫兩服服後脈暴出者死微續者生暴出乃藥力所迫藥力盡則氣仍絶微續乃正氣自復故生白通加人尿豬膽汁湯治少陰病下利不止厥逆無脈乾嘔煩者白通湯內加入人尿五合豬膽汁一合沖和服白通湯薑附兼蔥白此四逆湯去甘草加蔥白少陰下利脈微給少陰下利脈微但用薑附扶陽止利蔥白通脈不用甘草監製薑附者欲其直至下焦急溫少陰之臟也厥逆無脈嘔且煩加入人尿豬膽汁無脈厥逆嘔而且煩則上下俱不通陰陽相格故加人尿之鹹寒豬膽之苦滑引辛熱之藥達於至陰而通之內經所謂反佐以取之是也熱因寒用妙義深陰盛格陽此宜緝陰寒內盛格陽於外者純與熱藥則寒氣格拒不得入必於熱劑中加寒藥以為引用使得入陰而回陽此類是已當歸四逆湯治手足厥寒脈細欲絶者並治寒入營絡腰股腿足痛甚良當歸桂枝芍藥細辛各三兩甘草木通各二兩大棗二十五枚水八升煮取三升去滓分溫三服當歸四逆加吳茱萸生薑湯治證同當歸四逆湯若其人內有久寒者宜此當歸四逆湯加吳茱萸二升生薑半斤以水六升清酒六升煮取五升去滓分溫五服當歸四逆湯桂枝芍細辛甘草木通著再加大棗治厥陰脈細陽虛由血弱此四逆乃太陽之邪傳入厥陰而表證猶未罷故用桂枝湯加當歸和肝血細辛散裡寒木通通陰陽利血脈周揚俊曰四逆湯全從回陽起見四逆散全從和解表裡起見當歸四逆湯全從養血通脈起見同名四逆而治各不同如此內有久寒加薑茱名當歸四逆加吳茱萸生薑湯發表溫中通脈絡吳茱萸溫中達下生薑溫中發表清酒和營通絡合入當歸四逆湯為溫經復脈之良劑不用附子及乾薑助陽過劑陰反灼當歸四逆不用薑附者陰血虛微恐反灼其陰也乾薑附子湯治下後復汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑一兩附子一枚生切水三升煮取一升去渣頓服當與茯苓四逆湯參看歌訣更當互編乾薑附子湯回陽劑晝躁夜安陰亦虧按陽虛有二證有喜陽者有畏陽者大抵陰亦虛者畏陽陰不虛者喜陽此證陽將欲亡陰無所依而亦虛故反畏陽也此證須知不嘔渴脈沉無熱始堪推王晉三古方選注曰此治太陽壞病轉屬少陰者由於下後復汗一誤再誤而亡其陽致陰躁而見於晝日是陽亡在頃刻矣當急用生乾薑助生附子純用辛熱走竄透入陰經比四逆之勢力尤峻方能驅散陰霾以復渙散真陽若猶豫未決必致陽亡而後已真武湯治少陰傷寒腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或嘔此湯主之又治太陽病發汗汗出不解仍發熱心下悸頭眩筋惕肉瞤振振欲劈地者茯苓芍藥生薑各三兩白朮二兩附子炮一枚水八升煮取三升去滓溫服七合日三服附子湯治少陰病身體痛手足寒骨節痛脈沉口中和背惡寒者附子二枚生切人參二兩茯苓芍藥各三兩白朮四兩水八升煮取三升去滓溫服一升日三服真武湯中用熟附茯苓朮芍生薑互崇土扶陽泄水邪少陰水逆陽虛故按腎之真陽盛則水皆內附而與腎氣同其蟄藏惟腎之陽虛不能制水則水得泛濫而為病苓朮芍薑皆脾胃藥崇土以鎮伏腎水附子以挽回陽氣方名真武蓋取固腎為義腹疼嘔利四肢沉皆脾胃病蓋水反侮土故也悸眩水氣凌心瞤惕陽氣欲亡兼能顧按真武主治在於崇土扶陽以泄水邪故不但里鎮少陰水泛兼可外御太陽亡陽又治虛寒附子湯此治虛寒證之主方其方大段同真武附子湯藥品與真武湯大段相同惟附子生熟分兩各異其補陽鎮陰之分岐只在參薑一味之轉旋於此等處大宜著眼但以人參易去薑溫散之功轉溫補真武湯用薑而不用參是溫散以逐水氣附子湯去薑而用參是溫補以壯元陽骨痛身疼手足寒脈沉不渴宜煎取純是少陰虛寒之證故一惟溫補附漿水散劉完素素問病機氣宜保命集治虛寒水瀉冷汗脈微甚則嘔吐此為急病夏暑暴瀉亡陽亦宜附子乾薑炙甘草官桂各五錢高良薑二錢半半夏二兩為細末每服三五錢漿水二盞煎至一盞去滓熱服河間漿水散治吐瀉脈微汗冷亡陽者附薑夏草桂良薑此即四逆湯加官桂佐附子加良薑佐乾薑加半夏佐甘草治上吐下瀉裡虛寒而外亡陽者頗有殊功地漿隨時為取捨須知漿水消暑邪暑瀉方宜加入寫按地漿水於牆陰處地下掘坎以水傾入攪混澄清用取其為陰中之陰能瀉陽中之陽以之治水土相混之病仍自還於清故伏暑濕熱吐瀉煩渴有奇效惟暑月吐瀉亡陽者用薑附等回陽藥宜以地漿水煎之若非暑月不宜用也須知之附回陽返本湯陶節庵傷寒六書治陰盛格陽煩躁附子乾薑人參麥冬五味子炙甘草臘茶水一鍾煎之臨服入蜜五匙頓冷服之取汗為效若面赤戴陽者加蔥白七莖黃連少許回陽返本湯陳皮四逆生脈二方披此四逆湯合生脈散回陽而兼復陰加陳皮以理氣也生脈散編炙甘草湯類臘茶白蜜加煎服茶甘寒蜜甘潤皆以監薑附燥熱也陰盛格陽煩躁宜陰盛格陽手足厥冷脈微欲絶身反不惡寒而煩躁是其候也戴陽傷寒論厥陰篇曰面赤戴陽下虛故也蔥白蔥白通上焦之陽下交於腎黃連入黃連與附子同用能交水火於頃刻但躁不煩不可醫內熱曰煩謂心中懊憹煩悶為有根之火故但煩不躁及先煩後躁者皆可治也外熱曰躁謂身體手足擾動欲坐臥裸衣入井為無根之火故但躁不煩及先躁後煩者皆不可治也附附薑白通湯喻嘉言醫門法律治猝暴中寒厥逆嘔吐瀉利色清氣冷肌膚凜栗無汗陰盛沒陽之證附子炮乾薑炮各五錢蔥白五莖取汁豬膽大者半枚水二大盞煎附薑二味至一盞入蔥汁豬膽汁和勻溫服再用蔥一大握以帶輕束切去兩頭留白二寸許以一面尉熱安臍上用尉斗盛炭火尉蔥白上面取其熱氣從臍入腹甚者連尉二三餅又甚者再用艾炷灸關元氣海各二三十壯內外協攻務在一時之內令得陰散陽回身溫不冷為善附附薑湯喻嘉言醫門法律治猝暴中寒其人腠理素疏自汗淋漓身冷手足厥逆或外顯假熱躁煩乃陰盛於內逼其陽亡於外即前方不用蔥白也附子炮乾薑炮各五錢水二大盞煎至一盞加豬膽汁一蛤殼和溫冷服不用蔥尉及艾灼附附薑歸桂湯喻嘉言醫門法律治中寒用附薑湯後第二服隨用此方繼之因寒邪入中必傷營血故用此兼理營分之寒附子炮乾薑炮當歸肉桂各二錢五分水二大盞煎減半入蜜一蛤殼溫服附附薑歸桂參甘湯喻嘉言醫門法律治陽氣將回陰寒少殺略有端緒第三服即用此方附子炮乾薑炮當歸肉桂各一錢半人參甘草炙各二錢水二大盞煨薑三片自汗不用大棗二枚煎至一盞入蜜三蛤殼溫服附辛溫平補湯喻嘉言醫門法律治中寒服前三方後陽已回身溫色活手足不冷吐利漸除第四方即用此平調臟腑營衛附子炮乾薑炮肉桂各五分當歸人參甘草炙黃耆蜜炙白朮土炒白芍酒炒各一錢五味子十二粒水二大盞煨薑三片棗二枚煎至一盞入蜜五蛤殼溫服附甘寒補氣湯喻嘉言醫門法律治中寒服前藥後諸證盡除但經絡間微有頑痰窒塞辛溫藥服之不能通快者第五方用此人參麥冬白芍酒炒各一錢黃耆蜜炙一錢二分生地黃二錢甘草炙七分丹皮八分淡竹葉七分水二大盞煎減半入梨汁少許熱服附薑白通湯治中寒吐瀉厥冷身無汗還須艾炷灸關元臍下一寸五分名氣海二寸名丹田三寸名關元少緩須臾必失算喻嘉言醫門法律曰寒中少陰行其嚴令埋沒微陽肌膚凍裂無汗而喪神守急用附子乾薑加蔥白以散寒加豬膽汁引入陰分然恐藥力不勝尉蔥灼艾外內協攻乃足破其堅凝少緩須臾必無及矣魄汗淋漓陽外亡但將附子乾薑喚名附薑湯此即前方除去蔥專主回陽勿兼散若其人腎陽素擾腠理素疏陰盛於內必逼其陽亡於外魄汗淋漓脊項強硬用附子乾薑豬膽汁即不可加蔥及尉灼蓋恐助其散令氣隨汗脫而陽無由內返也宜撲止其汗陡進前藥隨加固護腠理不爾恐其陽復越也寒邪入中必傷營當歸肉桂宜參贊名附薑歸桂湯附薑專主回陽而其所中寒邪必先傷營血故服附薑湯後即須當歸肉桂以驅營分之寒才得藥病相當也俾得陽和陰少衰附薑歸桂參甘湯灌服前方後陽氣將回陰寒少殺即須加入人參甘草調元轉餉收功帷幄不爾薑附之猛直將犯上無等必墮前功也利止身溫汗亦收辛溫平補湯宜按耆朮芍味入前方平補陰陽毋間斷服附薑歸桂參甘湯二三劑後覺其陽明在躬運動頗輕神情頗悅更加黃耆五味白芍白朮大隊陰陽平補不可歇手蓋重陰見睍浪子初歸斯時搖搖靡定若怠緩不為善後必墮前功也經絡之間微有痰休養其陰痰乃渙甘寒補氣湯麥參甘耆地芍丹梨竹爨用平補後已示銷兵放馬偃武崇文之意茲復有頑痰留積經絡但宜甘寒助氣開通不宜辛辣助熱壅塞蓋辛辣之味始先不得已而用其毒今陽既安堵即宜休養其陰故但宜甘寒補氣緩緩調之斯為善後之計耳次第編成共六方嘉言煞費深心纂長沙猝病論雖亡從此尋求思過半漢張仲景先師著傷寒論十卷治傳經陽病猝病論六卷治猝暴陰病生民不幸猝病論當世即已失傳嗣後英賢輩出從未有闡揚之者惟韓祗和於中寒一門微有發明誨人以用附子乾薑為急亦可為仲景之徒矣清季喻嘉言尚論仲景傷寒論凡於陰病見端當以回陽為治者一一表之乃復著陰病論並度金針暢言妙蘊觀其所訂六方次第精詳深合仲景心法且猝病論亡難以徵信然取傷寒金匱治虛寒之方繹之見治熱病雜病之虛寒者用藥且若此而治暴病中寒之説可深信不疑矣嗟乎猝中寒邪陽微陰盛最為危急之候設非薑附之猛斬關直入何以迅掃陰氛挽回陽氣百中能有一活耶邇年以來霍亂盛行頃即肢冷脈伏面青音啞旋見煩躁而死雖當夏暑詎非陰邪入中三陰之危證乎余有感於斯故纂喻氏方論約編歌訣表彰厥功以鑑世之得失且以自警也附益元湯陶節庵傷寒六書治面赤身熱不煩而躁飲水不入口名戴陽證附子炮乾薑艾葉黃連知母人參麥冬五味子甘草加入薑棗蔥白煎入童便三匙冷服益元湯艾附與乾薑麥味知連參草將薑棗蔥煎入童便薑附艾葉回陽協人參甘草補氣黃連以折泛上之火知母以滋在下之陰以靜其躁蓋陽無陰則孤陽無所附麗故扶陽亦兼和陰麥冬五味補肺清心合人參以生脈加童便冷服者熱因寒用也赤面肢寒名戴陽此虛火上越之候譬如燈將滅而復焰也附回陽救急湯陶節庵傷寒六書治三陰中寒初病身不熱頭不痛惡寒戰栗四肢厥冷引衣自蓋蜷臥沉重腹痛吐瀉口中不渴或指甲唇青口吐涎沫或無脈或沉遲無力附子炮乾薑肉桂人參白朮茯苓半夏陳皮甘草五味子水二鍾薑三片煎之臨臥入麝香三釐調服中病以手足溫和即止無脈者加豬膽汁一匙回陽救急湯用六君參苓朮草半夏陳皮名六君子湯桂附乾薑五味群加麝三釐或膽汁三陰寒厥見奇勳寒中三陰陰盛陽微故以附子薑桂辛熱之藥祛其陰寒而以六君子溫補之藥助其陽氣五味子合人參以生其脈加麝香者以通其竅加膽汁者熱因寒用也附四維散張介賓新方八陳治脾腎虛寒滑脫之甚或泄痢不止或氣虛下陷二陰血脫不能禁者無出此方之右人參一兩製附子二錢乾薑炒黃二錢甘草炙一二錢烏梅肉五分或一錢酌其味之微甚隨病人之意而用之或不用此即四味回陽飲也為末和勻以水拌濕蒸一飯頃取起烘乾再為末每服一二錢溫湯調下四維散治痢無休脾腎虛寒滑脫瘳參附烏梅薑炙草二陰脫血並堪投參附薑甘溫補脾腎加烏梅酸收以固滑脫也烏頭湯類烏頭湯治歷節不可屈伸疼痛烏頭五枚切以蜜二升煮一升即出烏頭麻黃芍藥黃耆甘草炙各三兩以水三升煮四味取一升去滓納蜜煎中更煎之溫服七合不知盡服之大烏頭煎治寒疝繞臍痛發則白汗出手足厥冷其脈沉緊者烏頭大者五枚用水三升煮取一升去滓納蜜二升煎令水氣盡取二升強人服七合弱人服五合不差明日更服不可一日服盡烏頭湯方用蜜煎麻黃耆芍甘草聯寒留關節難伸屈非此溫經不易痊按方中餘四味用水煮烏頭用蜜煎蜜煎則烏頭之性出而烏頭之氣不散正取其氣味俱全而雄入之勢更壯非徒以蜜能解烏頭之毒之謂也故以烏頭名方細剖其義耆芍甘草牽制麻黃之表散白蜜牽制烏頭以溫經無非欲使寒濕之邪從關節徐徐而解耳大烏頭煎治寒疝麻耆芍草盡除捐寒疝發則汗出手足厥冷陰寒極矣故以烏頭一味單行不加監製乃足破其陰霾之氣而寒疝可除矣烏頭赤石脂丸治心痛徹背背痛徹心烏頭炮一分蜀椒乾薑各一兩附子炮五錢赤石脂一兩為末煉蜜丸梧子大先食服一丸日三服不知稍加之烏頭石脂丸金匱蜀椒附子乾薑配寒邪從背注於心背痛徹心心徹背經曰寒氣客於背俞之脈其俞注於心故相引而痛也散寒填孔安心神胸背相引痛斯退烏頭附子椒薑振陽氣逐寒邪赤石脂安心氣填塞厥氣橫衝之孔道俾胸背之氣各不相犯其患乃除栝蔞薤白湯類栝蔞薤白白酒湯治胸痹喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數者栝蔞實一枚搗薤白半升白酒七升同煮取二升分溫再服栝蔞薤白半夏湯治胸痹不得臥心痛徹背者栝蔞實一枚搗薤白三兩半夏半升白酒一斗同煮取四升溫服一升日三服枳實薤白桂枝湯治胸痹心中痞氣氣結在胸胸滿脅下逆搶心枳實厚朴各四兩薤白半升桂枝一兩栝蔞實一枚搗以水五升先煮枳朴取二升去滓納諸藥煮數沸分溫三服若虛者宜人參湯主之栝蔞薤白白酒湯辛溫滑利以通陽薤白滑利通陽栝蔞潤下通陰佐以白酒熟谷之氣上行藥性助其通經活絡而痹自開胸痹喘咳胸背痛脈緊沉遲用此良胸中陽也而反痹則陽不用矣陽不用則氣上下不相順接其津液必凝滯而為痰故喘息咳唾胸背痛短氣等證見矣脈緊沉遲為陽虛之驗故主以通陽若兼不臥半夏入名栝蔞薤白半夏湯蠲飲開痹力更強胸痹而至於不得臥其痹為尤甚矣所以然者有痰飲以為之援也故於前方加半夏逐其痰飲氣逆搶心胸脅滿非但氣結陽微而陰氣並上逆矣枳朴栝薤桂枝勷名枳實薤白桂枝湯枳朴先破陰氣桂枝之辛佐薤白栝蔞實行陽開痹虛者人參湯主治人參湯即理中湯方人參湯即理中湯也按枳實薤白桂枝湯是急通其痹急之氣人參湯是速復其不振之陽蓋去邪之實即以安正養陽之虛即以逐陰是在審其病之久暫虛實而用之喻嘉言醫門法律曰蓋胸中如太空其陽氣所過如離照當空曠然無外設地氣一上則窒塞有加故知胸痹者陽不主事陰氣上逆之候也仲景微則用薤白白酒以通其陽甚則用附子乾薑以消其陰諸家之習用豆蔻木香呵子三稜神麯麥芽等藥坐耗其胸中之陽者亦相懸矣當歸羊肉湯類當歸生薑羊肉湯治寒疝腹中痛及脅痛裡急者並治産後腹中㽱痛虛勞不足當歸三兩生薑五兩羊肉一斤以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加陳皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之附當歸羊肉湯孫思邈千金要方一名歸薑參耆羊肉湯治産後發熱自汗身痛名曰蓐勞黃耆一兩人參當歸各七錢生薑五錢羊肉一斤煮汁去肉入前藥煎服若惡露不盡加桂惡露下多加川芎附羊肉湯孫思邈千金要方川芎當歸白芍熟地羊肉桂薑甘草當歸生薑羊肉湯産後腹痛蓐勞匡蓐草蓐也産後發熱自汗身痛因坐蓐致病因名蓐勞腹中㽱痛者瘀血未盡兼下焦有寒也虛勞寒疝皆堪治痛嘔陳皮白朮勷王晉三古方選注曰寒疝為沉寒在下由陰虛得之陰虛則不得用辛熱燥烈之藥重劫其陰故仲景另立一法以當歸羊肉辛甘重濁溫暖下元而不傷陰佐以生薑五兩加至一斤隨血肉有情之品引入下焦溫散沍寒若痛多而嘔加陳皮白朮奠安中氣以禦寒逆本方三味非但治疝氣逆沖移治産後下焦虛寒亦稱良劑亦有加入參耆者名當歸羊肉湯蓐勞身痛汗多良身痛汗多表氣虛矣故加參耆兼補其氣千金羊肉湯四物湯桂薑甘草治證同附羊肉湯韓祇和傷寒微旨論治傷寒汗下太過亡陽失血惡人蜷臥時戰如瘧及産婦血去過多而厥脫者當歸白芍牡蠣煅各一兩龍骨煅五錢附子炮二個桂枝二分每服二兩用羊肉四兩生薑二兩蔥白五寸同銼爛煮服羊肉湯方出韓氏採取仲景方法制此即仲景當歸生薑羊肉湯合桂枝龍骨牡蠣救逆湯白通湯三方合一歸芍龍蠣附桂薑亡陽脫血稱良劑汪訒庵醫方集解引韓祇和曰亡陽脫血若止救逆效必遲矣與羊肉湯為效甚速病人色雖見陽是熱客上焦中下二焦陰氣已盛若調得下焦有陽則上焦陽氣下降丹田知所歸宿矣附天真丸喻嘉言醫門法律治一切亡血過多形稿肢羸飲食不進腸胃滑泄津液枯竭久服生血益氣暖胃駐顏精羊肉七斤去筋膜脂皮批開入後藥當歸十二兩酒洗鮮山藥十兩去皮肉蓯蓉十兩去甲水浸淡灑干天冬去心焙一斤後四味共搗烘燥磨末安羊肉內裹縛用無灰酒四瓶煮令盡再入水二升煮候羊肉糜爛再入黃耆末五兩人參末三兩白朮末二兩用熟糯米飯焙乾作餅將前後藥末和丸梧子大一日二三次服三百丸溫酒下如難丸用蒸餅五七枚焙乾入臼中杵千下丸之天真丸用天門冬當歸山藥肉蓯蓉為末安於羊肉內無灰酒煮爛堪舂為丸加入參耆朮如若難丸蒸餅充精虛味補形溫氣此藥堪為補法宗經云形不足者溫之以氣精不足者補之以味養形補精以全神故名天真人參黃耆白朮養其形也當歸山藥羊肉補其精也肉蓯蓉暖腎中之陽引精氣以歸根天門冬保肺中之陰致高源於清肅嘗按古方溫燥藥中必復滋陰保肺亦恐未得補陽之功先傷肺中陰氣爾喻嘉言力贊此方可謂長於用補其製法尤精允為補方之首附羊肉粥陳直養老奉親書補衰弱壯筋骨老人常服甚宜人參二兩黃耆生茯苓各一兩大棗五枚羊肉二斤去脂皮取精肉四兩切細餘一斤十二兩以水五大盞入參耆等煎汁三盞去滓粳米三合入羊肉汁內煮粥臨熟入精羊肉四兩生薑少許胡桃三枚去殼衣以解膻氣空心服羊肉粥出養老書參耆茯棗粳米俱補弱扶陽壯筋骨十劑云補可去弱人參羊肉之屬是也衰年常服保無虞此古人服食之方存之以備養老之一助防己湯類防己茯苓湯治皮水脈浮四肢跗腫按之沒指不惡風其腹如鼓不渴水氣在皮膚中四肢聶聶動者防己黃耆生桂枝各三兩茯苓六兩甘草二兩水六升先煮茯苓減二升去滓納諸藥煮取二升分溫三服防己黃耆湯治風濕脈浮身重汗出惡風亦治風水脈浮其人頭汗出表無他病但腰以下當腫及陰難以屈伸又治濕痹麻木防己一兩甘草炙半兩白朮七錢半黃耆一兩一分銼麻豆大每抄五錢匕生薑四片大棗一枚水盞半煎八分去滓溫服良久再服服後當如蟲行皮中從腰下如冰暖坐被上又以一被繞腰下令微汗瘥以被繞腰接令取汗以通陽氣是外護之法防己茯苓湯桂枝更兼甘草與黃耆脈浮浮為表腹滿四肢腫滿腫為水濕皮水陽虛不渴宜不渴為津液未亡水在皮中陽必汩宣陽泄水是方推水在皮膚衛陽必虛而汩沒故用桂枝宣衛陽以解肌君茯苓泄皮中水氣黃耆益衛氣生用亦能達表治風注膚痛漢防己大辛苦寒通行十二經開腠理泄濕熱此治皮水之主方也里無水氣故不須白朮以固里防己黃耆湯除桂茯再加白朮棗薑隨此治風水與諸濕身重為濕汗出濕邪多汗傷於風者必自汗出惡風吹風在表故惡風按風水惡風皮水不惡風為別四肢麻木氣虛濕滯腰髀痛參用前方效乃奇王晉三古方選注曰漢防己太陽經入里之藥泄腠理療風水通治風濕皮水二證金匱汗出惡風者佐白朮水氣在皮膚中聶聶動者佐桂枝一以培土一以和陽同治表邪微分標本蓋水濕之陽虛因濕滯於裡而汗出故以白朮培土加薑棗和中胃不和再加芍藥皮水之陽虛因風水襲於表內合於肺故用桂枝解肌散邪兼固陽氣不須薑棗以和中也黃耆湯方下云服藥當如蟲行皮中從腰下如冰可知其汗僅在上部而不至於下即用白朮內治其濕尤必外用被圍腰下接令取汗以通陽氣也余治太陽腰髀痛審證參用兩方如鼓應桴並識之木防己湯治膈間支飲喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈者木防己三兩石膏如雞子大二枚桂枝二兩人參四兩水六升煮取二升溫服虛者即愈實者三日復發復與不愈者去石膏加茯苓四兩芒硝三合煬化微利則愈木防己湯治支飲咳逆倚息不得臥其形如腫謂之支飲喘滿痞堅脈沉緊支飲上入於膈阻其氣則逆於肺間而為喘滿阻其血則雜揉心下而為痞堅面色黧黑為血凝腎氣上應其色黑血凝之色亦黑先從肺衛求其診此方姑緩心腎之治而先治其肺俾肺之氣行則飲不能逆而俱解矣定喘補肺石膏參散飲開痞桂防迅桂枝防己一苦一辛並用能行水散結而痞堅之處必有伏陽吐下之餘定無完氣故又加石膏除熱人參益氣邪留氣分此能平若連血分還宜訊可把原方去石膏加入芒硝茯苓進消痰破血後方強淺深次第醫當審支飲在氣分者服木防己湯即愈若飲在血分深連下焦必愈而復發以其既散復聚則有堅物留作澼囊故去石膏氣分之藥加芒硝消痰結破血癖合之茯苓去心下堅且伐腎邪也此治支飲淺深次第之法醫宜細審防己椒目葶藶大黃丸治腹滿口舌乾燥腸間有水氣之證防己椒目葶藶大黃各一兩為末蜜丸如梧子大先食飲服一丸日三服稍增以知為度防椒葶藶大黃丸水客腸間口舌乾水聚於下而不上潮則口舌反乾燥腹滿如囊為湧水湧水之候腹滿不堅疾行則鳴濯濯如囊裹漿是水在大腸也從腸泄水此方安肺與大腸為表裡腸間水氣不行於下以致肺氣膹鬱於上而燥熱之甚用防己療水氣椒目治腹滿葶藶瀉氣閉大黃瀉血閉急決大腸之水以救肺金之膹郁不治上而治下故用丸劑也按聖濟湧水十三方亦有從大腸溫下者然內用牽牛大黃太峻不若此方為穩防己地黃湯治病如狂狀妄行獨語不休無寒熱其脈浮者防己甘草各一分桂枝防風各三分以酒一杯漬之絞取汁用生地黃二斤㕮咀蒸之如斗米飯久以銅器盛其汁更絞地黃汁和分再服煮法奇防己地黃湯桂枝防風甘草五般施桂草二防俱酒漬地黃蒸汁沖服之桂草二防酒漬絞汁取其輕清歸於陽分以散血中之風生地甘寒熟蒸使歸於陰以除血中之熱蓋藥生則散邪熟則補虛此等煮法最宜細玩妄行獨語如狂狀邪並於陽則狂而妄行並於陰則獨語此即癡病之屬無熱無寒病不在表故無寒熱浮脈司浮為風為虛風入心經營氣熱疏風涼血此方奇心主血而藏神風入心包絡中則營氣熱而心神矇昧故古稱癡病為心風癲疾此方重用地黃涼血補陰略用疏風之藥以酒引入血分大有巧妙此係金匱附方人多不識故特表而出之蓋風行必燥凡疏風必兼涼血余嘗以此湯借治風濕之病過服溫燥之藥而化為熱腿足或遍體肌膚忽發紅暈疼痛如遊火之狀者甚效並識之附防己飲汪訒庵醫方集解治濕熱腳氣足脛腫痛憎寒壯熱防己木通檳榔生地酒炒川芎白朮炒蒼朮鹽水炒黃柏酒炒甘草梢犀角磨沖食前服濕熱腳氣防己飲黃柏檳榔與木通生地川芎蒼白朮草梢犀角用磨沖防己蒼朮白朮川芎行血燥濕生地黃柏草梢犀角涼血清熱木通通關節利濕熱檳榔下行疾速墜諸藥入下焦消腫痛也腳氣宜通忌補塞清熱燥濕此為功腳氣無不由濕熱而成其證憎寒發熱狀類傷寒但足脛腫痛為異耳此病忌用補劑以濕熱得補增劇也亦不宜大瀉以傷元氣但喜通而惡塞若腳氣衝心喘急嘔吐者死水凌火故也又分干濕二種若足腫而痛者名濕腳氣宜燥濕為主清熱佐之若不腫而痛者名乾腳氣宜清熱為主燥濕佐之清熱燥濕四字是治腳氣之大法也甘桔湯類甘桔湯一名桔梗湯治少陰病咽喉痛者甘草生二兩桔梗一兩水三升煮取一升分溫再服附紫苑湯陳實功治肺癰濁唾腥臭五心煩熱壅悶喘嗽甘草桔梗紫苑川貝母杏仁水煎甘草甘涼桔梗辛名甘桔湯咽喉疼痛此為珍此治咽痛之主方非獨治少陰咽痛也甘草生用則涼故可泄熱解毒緩痛佐以桔梗苦辛載引甘草於上清利咽喉則鬱熱散而痛自平矣肺癰濁唾痰腥臭亦熱鬱上焦之所致紫苑湯加貝杏仁紫苑降氣貝母潤肺杏仁消痰合甘桔散風泄熱蓋肺癰始作多從風熱壅遏而成此方輕平和穩治初起者有效排膿散枳實十六枚赤芍藥六分桔梗二分杵為散取雞子黃一枚以藥散與雞子黃相等揉和令相得飲和服之日一服排膿湯甘草二兩桔梗三兩生薑一兩大棗十枚以水三升煮取一升溫服五合日再服排膿散湯方有二湯草棗薑散芍枳其中桔梗二方俱可知排膿先提氣氣不開提血不通一言説破瘍科祕排斥也膿血肉所化也前方枳實赤芍佐以桔梗直從大腸泄氣破血斥逐其膿後方甘桔薑棗仍從上焦開提肺氣調和營衛俾氣行而膿自下素問生氣通天論曰營氣不從逆於肉理乃生癰疽故欲消其腫必先行血欲排其膿必先提氣舉此以推瘍科之要可知矣附甘草黑豆湯蘇頌圖經本草解百藥毒兼治陰莖挺長脹痛不堪此名筋疝甘草黑大豆甘豆湯解百藥毒性味和平功足録重修政和經史證類備用本草引蘇頌曰孫思邈稱大豆解百藥毒嘗試之不效乃加甘草為甘豆湯其驗更速陰莖脹痛亦能醫此名筋疝由淫欲筋疝陰莖挺長掣痛由肆於淫欲得之用此方者亦取其解毒甘草當用梢以梢能徑達莖中也百合湯類百合地黃湯治百合病百合病者百脈一宗悉致其病也意欲食復不能食常默然欲臥不能臥欲行不能行飲食或有美時或有不欲聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅淅然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月後見者各隨證治之若未經吐下發汗病形如初者此方主之百合七枚生地黃汁一升先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓納地黃汁煎取一升五合分溫再服中病勿更服大便當如漆百合知母湯治百合病發汗後者百合七枚煎同前法知母三兩別以泉水兩升煮取一升二汁各去滓合和共煎之取一升五合分溫再服百合滑石代赭湯治百合病下之後者百合七枚煎同前法滑石三兩碎綿包代赭石如彈丸大一枚碎綿包以泉水二升煮二石取一升去滓和百合汁重煎至一升五合溫服百合雞子黃湯治百合病吐之後者百合七枚雞子黃一枚先煮百合如前法了納雞子黃攪勻煎至五分溫服百合洗方治百合病一月不解變成渴者百合一升以水一斗漬之一宿以洗身洗已食煮餅勿以咸豉也栝蔞牡蠣散治百合病渴不瘥者栝蔞牡蠣熬等分為細末飲服方寸匕日三服百合地黃湯泉水煎甘寒清肺熱邪宣此治百合病正法百合清肺經氣分之熱地黃清心經營分之熱地之泉水猶人之血脈甘寒清冽能沁心肺經脈之熱邪服後大便如漆熱除之驗也熱邪散漫於百脈百脈屬心會太淵太淵肺經脈也按諸脈皆屬於心而大會於肺熱邪散漫百脈悉致其病故百脈不可治而可治其心肺且心主營而肺主衛營行脈中衛行脈外一理貫通故余以百合病指心營肺衛為解王晉三專主肺説詳具下文其證口苦小便赤脈微數而形默然欲食不食臥不能如寒無寒熱無熱按百合病惟口苦小便赤脈微數為定證余則欲食不能食欲臥不能臥如寒熱而無寒熱全屬恍惚難憑良以百脈悉病熱邪散漫無統故無循經現證可據爾因是病名為百合即將百合治之痊李士材云行止坐臥不定謂之百合病仲景以百合治之是亦清心安神之效歟按士材又以百合病指心説百合一味為君藥按百合色白入肺其形象心性味甘寒能清熱生津入心肺二經然則百合病為心肺鬱熱所致無疑矣余則隨機為轉旋若經汗後加知母名百合知母湯按傷寒誤汗則亡陽熱病誤汗則亡陰葉天士溫熱論云救陰不在血而在津與汗故加知母以養津液下後滑石代赭添名百合滑石代赭湯傷寒誤下則亡陰熱病誤下則亡陽溫熱論云熱病救陰猶易通陽最難通陽不在溫而在利小便故加滑石利竅復入代赭石者晉三所謂重鎮心經之氣是也吐後雞子黃參入名百合雞子黃湯誤吐傷膻中之陰故以雞子黃補心安神主方百合地黃專未經汗吐下者此方主之渴者栝蔞牡蠣散栝蔞苦寒生津止渴牡蠣鹹寒引熱下行更有百合洗方傳皮毛為肺之合外洗皮毛亦可內除其渴洗已食煮餅勿啖咸豉恐鹹味耗水而增渴也王晉三古方選注曰通章言百合病百脈一宗不但主於營衛而手足六經悉能致其病汗吐下皆非所宜本文云百脈一宗明言病歸於肺君以百合甘涼清肺即可療此疾故名百合病再佐以各經清解絡熱之藥治其病所從來當用先後煎法使不悖於手足經各行之理期以六十日六經氣復而自愈若太陰太陽無病惟少陰少陽厥陰陽明四經為病期以四十日愈若僅屬厥陰陽明二經為病期以二十日愈讀未經汗吐下條治以百合地黃湯中病勿更服大便如漆熱邪已泄再服恐變證也論證以溺時頭痛為辨蓋百脈之所重在少陰太陽以太陽統六經之氣其經上循巔頂下通水道氣化不行乃下溺而上頭痛少陰為生水之源開闔澀乃溺而淅然若誤汗傷太陽者溺時頭痛以知母救肺之陰使膀胱水臟知有母氣救肺即所以救膀胱是陽病救陰之法也誤下傷少陰者溺時淅然以滑石上通肺下通太陽之陽恐滑石通腑利竅仍蹈出汗之弊乃復代赭石重鎮心經之氣使無汗泄之虞救膀胱之陽即所以救肺之陽是陰病救陽之法也誤吐傷陽明者以雞子黃救厥陰之陰以安胃氣救厥陰即所以奠陽明救肺之母氣是亦陽病救陰之法也以百合一味引伸諸方總不外乎補陰補陽之理舉此可以類推學者宜自得之旭高按王氏此論於病愈之期並救陰救陽之理明晰入細為諸解所莫能及故備録之黃連阿膠湯類黃連阿膠湯治少陰病得之二三日心中煩而不得臥者黃連四兩黃芩芍藥各二兩阿膠三兩雞子黃二枚水六升先煮芩連芍三味取二升去滓納阿膠煬盡俟小冷納雞子黃小冷而納雞子黃則不致凝結而相和攪令相得溫服七合日三服附黃連阿膠湯醫方集解引王好古方治傷寒熱毒入胃下利膿血者黃連炒四兩黃柏阿膠炒各一兩山梔五錢每服四錢水煎服附駐車丸孫思邈千金要方治冷熱不調下利赤白裡急後重臍腹疼痛口燥煩渴小便不利此濕熱鬱於大腸故為此證黃連六兩阿膠炒三兩乾薑炮二兩當歸炒一兩水泛丸空朝米飲下三錢仲景黃連阿膠湯黃芩芍藥雞子黃少陰心煩不得臥傳經熱灼致陰傷酸甘鹹苦收陰氣君火清寧煩自康此少陰傳經之熱邪擾動少陰之陰氣故心煩不得臥以芩連直折少陰之熱阿膠雞子黃滋少陰之陰交合心腎第四者沉陰滑利恐不能留戀中宮故再佐芍藥之酸斂從中收陰而後清熱止煩之功得建此酸甘鹹苦收攝欲亡之陰與四逆湯收攝亡陽一水一火為不同矣好古黃連阿膠湯連膠梔子柏下利膿血堪煎嘗連柏阿膠鹹苦堅陰山梔清熱毒也駐車丸治冷熱痢連膠當歸與乾薑此以黃連阿膠堅陰止痢當歸和血少佐乾薑之苦辛炮黑則能去瘀攝血前二方治熱迫傷陰動血此治濕熱瘀積久而陰傷故佐使加減不同炙甘草湯類炙甘草湯一名復脈湯治傷寒脈結代心動悸者又虛勞不足汗出而悶脈結心悸雖行動如常不出百日若危急者十一日死矣又治肺痿涎唾多心中溫溫液液者炙甘草四兩生薑三兩人參二兩生地黃一斤桂枝三兩麥冬半斤阿膠二兩大棗三十枚大麻仁半升以清酒七升水八升先煮八味煮取三升水酒煎去五分之四即今所謂膏子藥矣去滓納膠煬盡溫服一升日三服炙甘草湯參薑桂麥冬生地大麻仁大棗阿膠加酒服虛勞凡虛勞脈結心悸而更汗出陰氣消亡孤陽無附故雖行動如常斷云不出百日若復危急則過十日必死知其陰亡而陽絶也肺痿此與陰虛火旺之肺痿不同如陰虛火旺咳血音啞不得復用薑桂此涎唾多乃肺中冷也故得與是湯不可誤也效堪誇傷寒心悸脈結代此傷寒邪盡之後氣血兩虛故現此證王叔和脈經云脈來緩時一止復來者名曰結又曰陰盛則結脈來動而中止不能自還因而復動者名曰代幾動一息亦曰代皆血氣兩虛經隧不通陰陽不交之故益血生津復脈遵王晉三古方選注曰此湯仲景治心悸王燾治肺痿孫思邈治虛勞三者皆是津涸燥淫之證至真要大論云燥淫於內金氣不足治以甘辛也第藥味不從心肺而主乎肝脾者是陽從脾以致津陰從肝以致液各從心肺之母以補之也人參麻仁之甘以潤脾津生地阿膠之鹹苦以滋肝液重用地冬濁味恐其不能上升故君以炙甘草之氣厚桂枝之輕揚載引地冬上潤肺燥佐以清酒芳香入血引領地冬歸心復脈仍使以薑棗和營衛則津液悉上供於心肺矣喻嘉言曰此仲景傷寒門中之聖方也仲景方每多通利於此處特開門戶重用生地再借用麥冬手經藥者麥冬與地黃人參氣味相合而脾胃與心經亦受氣相交脈絡之病取重心經故又名復脈湯附生脈散治熱傷元氣倦怠口乾出汗人參五錢麥冬三錢五味子三錢水二鍾煎八分隨時服生脈散麥味與人參保肺清心治暑淫李東垣曰夏月火旺剋金當以保肺為主清晨服此能益氣而祛暑也徐靈胎蘭臺規範曰此治傷暑之後存其津液庸醫即以之治暑病誤甚觀方下治證並無一字治暑邪者近人不論何病每用此方收住邪氣殺人無算氣少汗多兼口渴病危脈絶急煎斟汪訒庵醫方集解曰人有將死脈絶者服此能復生之其功甚大柯韻伯曰仲景治傷寒有通脈復脈二法少陰病裡寒外熱下利清穀脈微欲絶者制通脈四逆湯溫補以扶陽厥陰病外寒內熱心動悸脈結代者制復脈湯涼補以滋陰同是傷寒同是脈病而寒熱異治者一挽坎陽之外亡一清相火之內熾也生脈散本復脈立法外無寒故不用薑桂之辛散熱傷無形之氣未傷有形之血故不用地黃阿膠麻仁大棗且不令其泥膈而滯脈道也心主脈而苦緩急食酸以收之故去甘草而加五味矣脈資始於腎資生於胃而會於肺仲景二方重任甘草者全賴中焦穀氣以通之復之非有待於生也此欲得下焦天癸之元氣以生之故不借甘草之緩必取資於五味之酸矣王晉三古方選注曰凡曰散者留藥於胃徐行其性也脈者主於心而發源於肺然脈中之氣所賴以生者尤必資借於腎陰故以麥冬清肺經治節之司五味收先天癸水之源人參引領麥冬五味都氣於三焦歸於肺而朝百脈故曰生脈附資液救焚湯喻嘉言醫門法律治五志厥陽之火亢而為關格者生地黃三錢取汁麥冬二錢取汁人參一錢五分人乳拌蒸甘草炙阿膠胡麻仁各一錢炒研柏子仁七分炒五味子四分紫石英打碎滑石打碎寒水石各一錢打碎犀角三分磨沖生薑汁二匙西黃五釐研末除四汁及阿膠西黃共八味用泉水四茶杯緩火煎至一杯半去渣入四汁及阿膠再上火略煎至膠煬化斟出調入西黃末日中分二三次熱服清晨先服崔氏八味丸方見醫方證治彙編歌訣三錢資液救焚湯喻氏五志陽升關格餌生脈復脈二方兼除卻桂枝加柏子寒水滑石紫石英犀角西黃薑汁使清晨先服八味丸八味丸編腎氣丸類陸晉笙注全書二十四類無腎氣丸類然則此書為類不止二十四類尚非全帙也日中泉水煎斟此此即復脈湯合生脈散去桂枝加余藥方中大意資液救焚四字足以該之而佐以八味丸者取其通腎關之閉也余義詳見前進退黃連湯然愚嘗謂此方治上焦火炎液涸諸證皆為合式不特關格一端也
