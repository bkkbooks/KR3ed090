front:
  text: 序退思集類方歌注醫方證治彙編歌訣二書吾邑王旭高先生所著也先生名泰林字旭高晚號退思居士江陰柳寶詒嘗選刊先生醫案稱先生讀書上自軒岐下迄清季諸家無不精心灌注於古書則研求古訓於後人書則必分別疑似所著有西溪書屋夜話録醫方歌訣串解環溪草堂醫案諸書均未梓行雲今醫案經方君耕霞柳君寶詒選刊流行於世其餘數書屢求不得乙卯冬華君松岩惠余稿本一束云已藏棄多年先是東房橋有先生之門人年老忽發狂易以鈔録各書沉之水中華君僅撈得方歌二種殘缺不完余不諳詩韻乃郵寄魯省陸君晉笙處托為補正據謂首尾尚幸完善僅少梔子豉湯前一頁即照傷寒金匱方補之詳閲退思集類方本徐靈胎氏傷寒類方化裁編輯以金匱方後人方附麗之分為二十四類其醫方歌訣亦本蘭臺軌範通治方而作故所注多遵徐書而博採群書間有先生新注及自制數方附見去取頗屬審慎注釋亦極明白余尤佩其雖一以仲聖方為宗而能集仲聖以下醫方之長絶不拘泥一家言觀其治案可知也惟此書尚非定本故上有王先生所批此方宜入某類宜改從某注某方可刪語又如麻黃湯類之神朮散注云又有太無神朮散叔微神朮散俱編入平胃散類瀉心湯類之進退黃連湯注云崔氏八味丸編入腎氣丸類今無此二類梔子豉湯下注有余義見卷四雜説云云亦經散佚又小青龍湯下注尚著有古方餘論則不止柳氏所謂三種可知年愈遠而書愈有闕惜哉惜哉乃蓄意訪求知先生故里去余家僅數十武先生裔孫某君云高祖昆季五人旭高最少享高壽無嗣故歿後無紹其業者門弟子各走一方無從追考其著述六十年來散佚無一存矣則是二書雖非全璧亦足覘王先生學問之一斑也道咸之間固享名於蘇浙者何其著述竟無存耶且此本得之沉水之餘字迹有剝落之處急謀付梓以廣流傳復以少時録存先生所編著之西溪書屋夜話録醫方歌括及增訂醫方歌訣薛氏濕熱論歌訣各一卷合為一册洵屬醫學家之要書不可再使抱殘守缺湮沒不彰此付刊之舉不容或緩者已庚申冬月無錫周鎮小農別署伯華謹識於惜分陰軒
